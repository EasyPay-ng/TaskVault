<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CashClique Dashboard</title>
    
    <link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-main: #FF8C42;
            --orange-dark: #E67A35;
            --orange-light: #FFF0E6;
            --silk-bg: #FDFBF7;
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-light: #888888;
            --shadow-sm: 0 2px 6px rgba(255, 140, 66, 0.06);
            --shadow-md: 0 4px 12px rgba(255, 140, 66, 0.1);
            --shadow-lg: 0 8px 24px rgba(255, 140, 66, 0.15);
            --gradient-orange: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==================== APP CONTAINER ==================== */
        .app-container {
            width: 100%;
            height: 100dvh;
            max-width: 430px;
            background-color: var(--silk-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .app-container {
                height: 92dvh;
                max-height: 850px;
                border-radius: 24px;
                box-shadow: 0 0 40px rgba(0,0,0,0.12);
            }
        }

        /* ==================== SCROLLABLE CONTENT ==================== */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .scroll-content::-webkit-scrollbar {
            width: 2px;
        }
        .scroll-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-content::-webkit-scrollbar-thumb {
            background: var(--orange-light);
            border-radius: 2px;
        }

        /* ==================== HEADER ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px 10px;
            background: var(--white);
            flex-shrink: 0;
        }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--gradient-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            box-shadow: 0 3px 10px rgba(255, 140, 66, 0.25);
            flex-shrink: 0;
        }

        .greeting-text h1 {
            font-size: 10px;
            color: var(--text-light);
            font-weight: 400;
        }

        .greeting-text h2 {
            font-size: 14px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .notification-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--orange-light);
            color: var(--orange-main);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            flex-shrink: 0;
        }

        .notification-btn:hover {
            background: var(--orange-main);
            color: white;
        }

        .notification-btn .badge {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            border: 2px solid var(--orange-light);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.6); }
            50% { box-shadow: 0 0 0 4px rgba(255, 68, 68, 0); }
        }

        /* ==================== BALANCE CARD ==================== */
        .balance-section {
            padding: 10px 20px 14px;
        }

        .balance-card {
            background: var(--gradient-orange);
            border-radius: 18px;
            padding: 20px 18px;
            color: var(--white);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .balance-card::after {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: -15px;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        .balance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .balance-label {
            font-size: 10px;
            opacity: 0.85;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .balance-icon {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.12);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .balance-amount .currency {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.85;
        }

        .balance-footer {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

        .stat-pill {
            background: rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-pill i {
            font-size: 8px;
        }

        /* ==================== QUICK ACTIONS ==================== */
        .quick-actions {
            padding: 0 20px 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .action-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .action-icon.deposit {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
        }
        .action-icon.withdraw {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
        }
        .action-icon.transfer {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
        }
        .action-icon.history {
            background: linear-gradient(135deg, #EC4899 0%, #DB2777 100%);
        }

        .action-btn span {
            font-size: 9px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* ==================== SECTION HEADERS ==================== */
        .section-header {
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title i {
            color: var(--orange-main);
            font-size: 12px;
        }

        /* ==================== DAILY CLAIM CARD ==================== */
        .claim-card {
            background: var(--white);
            margin: 0 20px 14px;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 140, 66, 0.06);
        }

        .claim-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .claim-badge {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .claim-info h3 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .claim-info p {
            font-size: 10px;
            color: var(--text-light);
        }

        .claim-reward {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
            margin-bottom: 12px;
        }

        .claim-reward .amount {
            font-size: 24px;
            font-weight: 800;
            color: var(--orange-main);
        }

        .claim-reward .label {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gradient-orange);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--orange-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-disabled {
            background: #E8E8E8;
            color: #AAAAAA;
            cursor: not-allowed;
            box-shadow: none;
        }

        .claim-status {
            text-align: center;
            margin-top: 10px;
            font-size: 10px;
            color: var(--orange-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* ==================== ACTIVITY SECTION ==================== */
        .activity-section {
            padding: 0 20px 12px;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .activity-item {
            background: var(--white);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 140, 66, 0.04);
            box-shadow: var(--shadow-sm);
        }

        .activity-item:hover {
            transform: translateX(2px);
            box-shadow: var(--shadow-md);
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .activity-icon.claim {
            background: var(--orange-light);
            color: var(--orange-main);
        }
        .activity-icon.deposit {
            background: #DBEAFE;
            color: #3B82F6;
        }
        .activity-icon.withdraw {
            background: #FEE2E2;
            color: #EF4444;
        }
        .activity-icon.referral {
            background: #D1FAE5;
            color: #10B981;
        }

        .activity-details {
            flex: 1;
            min-width: 0;
        }

        .activity-details h4 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .activity-details p {
            font-size: 9px;
            color: var(--text-light);
            margin-top: 1px;
        }

        .activity-amount {
            font-size: 11px;
            font-weight: 700;
            color: var(--orange-main);
            flex-shrink: 0;
        }

        .activity-amount.negative {
            color: #EF4444;
        }

        .empty-state {
            text-align: center;
            padding: 24px 16px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 28px;
            color: var(--orange-light);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 11px;
        }

        /* ==================== MODERN BOTTOM NAV ==================== */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 9px;
            gap: 3px;
            transition: all 0.3s ease;
            padding: 6px 14px;
            border-radius: 14px;
            font-weight: 500;
            position: relative;
        }

        .nav-item i {
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .nav-item.active {
            color: var(--orange-main);
            background: var(--orange-light);
        }

        .nav-item.active i {
            transform: translateY(-2px) scale(1.1);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -2px;
            width: 16px;
            height: 3px;
            background: var(--orange-main);
            border-radius: 2px;
            opacity: 0;
            animation: dotIn 0.3s ease forwards;
        }

        @keyframes dotIn {
            to { opacity: 1; top: 2px; }
        }

        .nav-item:hover {
            color: var(--orange-dark);
        }

        /* ==================== TOAST ==================== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--white);
            color: var(--text-dark);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            border: 1px solid rgba(255, 140, 66, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            top: 22px;
        }

        .toast.success { border-left: 3px solid #10B981; }
        .toast.error { border-left: 3px solid #EF4444; }
        .toast.info { border-left: 3px solid var(--orange-main); }

        /* ==================== LOADING ==================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--silk-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            gap: 12px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--orange-light);
            border-top: 3px solid var(--orange-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loader-text {
            font-size: 11px;
            color: var(--text-light);
            font-weight: 600;
            letter-spacing: 2px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== ANIMATIONS ==================== */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }
    </style>
</head>

        <!-- MODERN BOTTOM NAV -->
        <nav class="bottom-nav">
            <a href="menu.html" class="nav-item">
                <i class="fa-solid fa-bars-staggered"></i>

            <a href="deposit.html" class="nav-item">

                <span>Profile</span>

        </nav>
    </div>

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                const displayName = user.email ? user.email.split('@')[0] : 'User';
                document.getElementById('userEmail').textContent = displayName;
                document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
                fetchUserData(user.uid);
                fetchActivityFeed(user.uid);
            } else {
                auth.signInAnonymously().catch((error) => {
                    console.error("Auth Error:", error);
                    showToast("Authentication Failed", "error");
                    hideLoading();
                });
            }
        });

        async function fetchUserData(uid) {
            const userRef = db.collection('users').doc(uid);
            try {
                const doc = await userRef.get();
                if (doc.exists) {
                    userData = doc.data();
                    updateUI();
                } else {
                    const newProfile = {
                        balance: 0.00,
                        lastClaimDate: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await userRef.set(newProfile);
                    userData = newProfile;
                    updateUI();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('balanceDisplay').innerText = "0.00";
                hideLoading();
            }
            hideLoading();
        }

        async function fetchActivityFeed(uid) {
            const activityList = document.getElementById('activityList');
            try {
                const snapshot = await db.collection('users').doc(uid)
                    .collection('activities')
                    .orderBy('timestamp', 'desc')
                    .limit(10)
                    .get();

                if (snapshot.empty) {
                    renderEmptyState(activityList);
                    return;
                }

                activityList.innerHTML = '';
                snapshot.forEach(doc => {
                    renderActivityItem(activityList, doc.data());
                });
            } catch (error) {
                renderEmptyState(activityList);
            }
        }

        function renderActivityItem(container, activity) {
            const item = document.createElement('div');
            item.className = 'activity-item';
            const iconConfig = getActivityIcon(activity.type);
            const amountClass = activity.amount < 0 ? 'activity-amount negative' : 'activity-amount';
            const amountPrefix = activity.amount < 0 ? '-' : '+';
            const timeAgo = formatTimeAgo(activity.timestamp);

            item.innerHTML = `
                <div class="activity-icon ${iconConfig.class}">
                    <i class="fa-solid ${iconConfig.icon}"></i>
                </div>
                <div class="activity-details">
                    <h4>${activity.title || 'Activity'}</h4>
                    <p>${timeAgo}</p>
                </div>
                <div class="${amountClass}">${amountPrefix}$${Math.abs(activity.amount || 0).toFixed(3)}</div>
            `;
            container.appendChild(item);
        }

        function getActivityIcon(type) {
            const icons = {
                claim: { icon: 'fa-gift', class: 'claim' },
                deposit: { icon: 'fa-arrow-down', class: 'deposit' },
                withdraw: { icon: 'fa-arrow-up', class: 'withdraw' },
                referral: { icon: 'fa-user-plus', class: 'referral' },
                bonus: { icon: 'fa-star', class: 'claim' },
                default: { icon: 'fa-circle-check', class: 'claim' }
            };
            return icons[type] || icons.default;
        }

        function renderEmptyState(container) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <p>No activity yet. Start by claiming your daily reward!</p>
                </div>
            `;
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'Recently';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        async function logActivity(type, title, amount) {
            if (!currentUser) return;
            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('activities')
                    .add({
                        type: type,
                        title: title,
                        amount: amount,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                fetchActivityFeed(currentUser.uid);
            } catch (error) {
                console.error("Error logging activity:", error);
            }
        }

        function updateUI() {
            animateValue('balanceDisplay', 0, userData.balance, 800);
            checkClaimStatus();
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = start + (end - start) * easeOut;
                obj.innerText = current.toFixed(3);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function checkClaimStatus() {
            const btn = document.getElementById('claimBtn');
            const statusText = document.getElementById('claimStatus');
            if (!userData.lastClaimDate) {
                enableClaimButton(btn, statusText);
                return;
            }
            const lastClaim = userData.lastClaimDate.toDate ? userData.lastClaimDate.toDate() : new Date(userData.lastClaimDate);
            const now = new Date();
            const diffMs = now - lastClaim;
            const diffHours = diffMs / (1000 * 60 * 60);
            if (diffHours < 24) {
                disableClaimButton(btn, statusText);
                const remaining = Math.ceil(24 - diffHours);
                statusText.innerHTML = `<i class="fa-solid fa-clock"></i><span>Next claim in ${remaining}h</span>`;
            } else {
                enableClaimButton(btn, statusText);
            }
        }

        function enableClaimButton(btn, statusText) {
            btn.classList.add('btn-primary');
            btn.classList.remove('btn-disabled');
            btn.innerHTML = '<i class="fa-solid fa-gift"></i> Claim Now';
            btn.disabled = false;
            statusText.style.display = "none";
        }

        function disableClaimButton(btn, statusText) {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-disabled');
            btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Claimed';
            btn.disabled = true;
            statusText.style.display = "flex";
        }

        async function claimDaily() {
            if (!currentUser) {
                showToast("Please login first!", "error");
                return;
            }
            const btn = document.getElementById('claimBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                const newBalance = (parseFloat(userData.balance) || 0) + 0.001;
                await userRef.update({
                    balance: newBalance,
                    lastClaimDate: firebase.firestore.FieldValue.serverTimestamp()
                });
                userData.balance = newBalance;
                userData.lastClaimDate = new Date();
                await logActivity('claim', 'Daily Claim Reward', 0.001);
                updateUI();
                showToast("Successfully claimed $0.001!", "success");
            } catch (error) {
                console.error("Claim error:", error);
                showToast("Error claiming. Try again.", "error");
                btn.innerHTML = '<i class="fa-solid fa-gift"></i> Claim Now';
                btn.disabled = false;
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = 'toast ' + type;
            let icon = 'fa-circle-info';
            if (type === 'success') icon = 'fa-circle-check';
            if (type === 'error') icon = 'fa-circle-xmark';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> ${message}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = 'Welcome Back';
            if (hour < 12) greeting = 'Good Morning';
            else if (hour < 17) greeting = 'Good Afternoon';
            else greeting = 'Good Evening';
            document.getElementById('greetingText').textContent = greeting;
        }

        document.addEventListener('DOMContentLoaded', () => {
            setGreeting();
            const currentPage = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-item').forEach(item => {
                const href = item.getAttribute('href');
                if (href === currentPage || (currentPage === '' || currentPage === 'index.html') && href === 'profile.html') {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
