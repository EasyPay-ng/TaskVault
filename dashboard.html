<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font (Montserrat) -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase SDK (modular v9) -->
<script type="module">
  // -----------------------------------------------------------------
  // 👉 1️⃣ REPLACE THE OBJECT BELOW WITH YOUR OWN Firebase config  // -----------------------------------------------------------------
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID",
    measurementId:     "YOUR_MEASUREMENT_ID"
  };

  // Initialise Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, collection, getDocs, query, where
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const app   = initializeApp(firebaseConfig);
  const auth  = getAuth(app);
  const db    = getFirestore(app);
  // -----------------------------------------------------------------  // 🎨 Theme constants (silk‑white‑orange)
  // -----------------------------------------------------------------  const THEME = {
    primary:   "#ff8c00",   // orange – button, highlights
    primaryD:  "#e07a00",   // darker orange
    white:     "#ffffff",
    mutedBg:   "#f5f5f5",
    text:      "#333333",
    textMuted: "#777777",
    font:      "'Montserrat', sans-serif"
  };
</script>

<!-- Chart.js (for the revenue line) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  :root {
    --color-primary:  var(--primary, #ff8c00);
    --color-primary-dark: var(--primaryD, #e07a00);
    --color-bg:       #ffffff;        /* white background */
    --color-muted-bg: #f5f5f5;        /* soft gray for panels */
    --color-text:     var(--text, #333333);
    --color-muted:    var(--textMuted, #777777);
    --font-family:    var(--font, 'Montserrat', sans-serif);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-family);
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.6;
  }

  /* -----------------------------------------------------------------
     Header
   ----------------------------------------------------------------- */
  .header {
    background: var(--color-primary);
    color: #fff;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-weight: 600; font-size: 1.4rem; }
  .logout-btn {
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    padding: .5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .logout-btn:hover { background: var(--color-primary-dark); }

  /* -----------------------------------------------------------------     Layout (sidebar + main)
   ----------------------------------------------------------------- */
  .dashboard {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 1.5rem;
    padding: 1.5rem 2rem;
  }
  .sidebar {
    background: var(--color-muted-bg);
    border-right: 2px solid var(--color-primary);
    padding: 1.5rem 0;
  }
  .sidebar nav .nav-item {
    padding: .75rem 1.5rem;
    cursor: pointer;
    color: var(--color-text);
  }
  .sidebar nav .nav-item:hover,
  .sidebar nav .nav-item.active {
    background: var(--color-primary);
    color: #fff;
  }
  .sidebar nav .nav-item a {
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .content {
    background: var(--color-bg);
    border: 1px solid var(--color-muted-bg);
    border-radius: 8px;
    padding: 2rem;
    box-shadow: 0 2px 5px rgba(0,0,0,.05);
  }

  .welcome { font-size: 1.2rem; margin-bottom: 2rem; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--color-bg);
    border: 1px solid var(--color-muted-bg);
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .stat-card h3 { color: var(--color-muted); margin-bottom: .5rem; font-size: 1rem; }
  .stat-card .value { font-size: 1.8rem; font-weight: 600; color: var(--color-primary); }

  .chart-container {
    position: relative;
    height: 260px;
    background: var(--color-bg);
    border: 1px solid var(--color-muted-bg);
    border-radius: 8px;
    padding: 1rem;
  }

  /* -----------------------------------------------------------------
     Silk texture (subtle pattern) – transparent‑textures.com
   ----------------------------------------------------------------- */
  .silk-bg {
    position: relative;
    background-color: var(--color-bg);
    background-image: url('https://www.transparenttextures.com/patterns/silk.png');
    background-repeat: repeat;
    background-size: 100% auto;
  }

  /* -----------------------------------------------------------------     Responsive (mobile)
   ----------------------------------------------------------------- */
  @media (max-width: 900px) {
    .dashboard { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>

<body>
  <!-- --------------------- Header --------------------- -->
  <header class="header silk-bg">
    <h1>Silk Dashboard</h1>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </header>

  <!-- --------------------- Layout --------------------- -->
  <aside class="dashboard silk-bg">
    <!-- Sidebar -->
    <section class="sidebar">
      <nav>
        <a href="#" class="nav-item active" data-route="home">Home</a>
        <a href="#" class="nav-item" data-route="stats">Stats</a>
        <a href="#" class="nav-item" data-route="reports">Reports</a>
        <a href="#" class="nav-item" data-route="settings">Settings</a>
      </nav>
    </section>

    <!-- Main Content -->
    <section class="content silk-bg">
      <div class="welcome" id="welcomeMsg">Welcome, <span id="userName"></span>!</div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <h3>Total Orders</h3>
          <div class="value" id="totalOrders">--</div>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <div class="value" id="totalRevenue">$0</div>
        </div>
        <div class="stat-card">
          <h3>Active Users</h3>
          <div class="value" id="activeUsers">0</div>
        </div>
      </div>

      <div class="chart-container">
        <h3 style="margin-bottom: .5rem; color: var(--color-primary);">Revenue Over Time</h3>
        <canvas id="revenueChart"></canvas>
      </div>
    </section>
  </aside>

  <!-- ====================== SCRIPT (auth + UI) ====================== -->
  <script type="module">
    // -----------------------------------------------------------------
    //  Auth state listener    // -----------------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          // Signed in → show dashboard
          $('#welcomeMsg').style.display = 'block';
          $('#statsGrid').style.display = 'grid';
          $('#logoutBtn').style.display = 'inline-block';
          await renderUserInfo(user);
          await loadUserStats(user.uid);
        } else {
          // Not signed in → show tiny sign‑in form
          showSignInForm();
        }
      });

      // -----------------------------------------------------------------
      //  Logout button
      // -----------------------------------------------------------------
      $('#logoutBtn').addEventListener('click', async () => {
        await signOut(auth);
      });

      // -----------------------------------------------------------------
      //  Simple Sign‑In form (shown only when not logged in)
      // -----------------------------------------------------------------
      async function showSignInForm() {
        const body = document.body.innerHTML; // keep original markup as fallback

        // Insert sign‑in UI (replace the whole <body> to keep things tidy)
        document.body.innerHTML = `
          <style>
            .auth-card {
              max-width: 380px;
              margin: 6rem auto;
              background: var(--color-bg);
              border: 1px solid var(--color-muted-bg);
              border-radius: 8px;
              padding: 2rem;
              box-shadow: 0 2px 5px rgba(0,0,0,.05);
            }
            .auth-card h2 { text-align:center; color:var(--color-primary); margin-bottom:1.5rem; }
            .auth-card label { display:block; margin-top:.75rem; }
            .auth-card input {
              width:100%; padding:.75rem; margin-top:.4rem;
              border:1px solid #ccc; border-radius:4px; font-family:inherit;
            }
            .auth-card button {
              width:100%; margin-top:1rem; padding:.75rem;
              background:var(--color-primary); color:#fff;
              border:none; border-radius:4px; cursor:pointer;
            }
            .auth-card button:hover { background:var(--color-primary-dark); }
          </style>
          <section class="auth-card silk-bg">
            <h2>Sign In</h2>
            <form id="signInForm">
              <label for="email">Email</label>
              <input type="email" id="email" required>
              <label for="pwd">Password</label>
              <input type="password" id="pwd" required>
              <button type="submit">Sign In</button>
            </form>
          </section>
        `;

        // Sign‑in handler        $('#signInForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = $('#email').value;
          const pwd   = $('#pwd').value;
          try {
            await signInWithEmailAndPassword(auth, email, pwd);
          } catch (err) {
            console.error(err);
            alert('Sign‑in failed: ' + err.message);
          }
        });
      }

      // -----------------------------------------------------------------
      //  Render user name and show dashboard elements (if hidden)
      // -----------------------------------------------------------------
      async function renderUserInfo(user) {
        $('#userName').textContent = user.displayName || user.email.split('@')[0];
        // hide sign‑in UI if it exists (we keep the layout as original)
        const signInDiv = document.getElementById('signInDiv');
        if (signInDiv) signInDiv.style.display = 'none';
      }

      // -----------------------------------------------------------------
      //  Load user data from Firestore and populate UI + chart
      // -----------------------------------------------------------------
      async function loadUserStats(uid) {
        try {
          // ---- 1️⃣ Pull the summary document from `users/UID` ----------
          const userRef = doc(db, 'users', uid);
          const uSnap = await getDoc(userRef);
          if (!uSnap.exists()) {
            console.warn('User document not found for UID:', uid);
            return;
          }
          const uData = uSnap.data();

          // ---- 2️⃣ Fill the three statistic cards -----------------------
          $('#totalOrders').textContent = uData.totalOrders ?? '--';
          $('#totalRevenue').textContent = uData.totalRevenue
            ? `$${uData.totalRevenue.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`
            : '$0';
          $('#activeUsers').textContent = uData.activeUsers ?? '--';

          // ---- 3️⃣ Pull revenue history for the last 12 months -----------
          const now = new Date();
          const start = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate());

          const revenueCol = collection(db, 'revenue');
          const revenueQ = query(
            revenueCol,
            where('uid', '==', uid),
            where('date', '>=', start)
          );

          const revSnap = await getDocs(revenueQ);

          // Prepare data for Chart.js (sorted by date asc)
          const raw = revSnap.docs.map(d => {
            const dData = d.data();
            // Expect `date` to be a Firestore Timestamp
            const ts = dData.date?.toDate?.() || new Date(dData.date?.seconds * 1000);
            return { date: ts, amount: Number(dData.amount ?? 0) };
          });

          // If the same month appears more than once we sum it
          const bucket = {};
          raw.forEach(r => {
            const monthKey = r.date.toLocaleString(undefined, { month: 'short', year: 'numeric' });
            bucket[monthKey] = (bucket[monthKey] ?? 0) + r.amount;
          });

          const labels = Object.keys(bucket).sort(); // chronological order
          const values = labels.map(l => bucket[l]);

          // ---- 4️⃣ Render the line chart --------------------------------
          createRevenueChart(labels, values);
        } catch (err) {
          console.error('Error while loading user stats:', err);
        }
      }

      // -----------------------------------------------------------------
      //  Chart.js line chart (Revenue Over Time)
      // -----------------------------------------------------------------
      function createRevenueChart(labels, values) {
        const ctx = $('#revenueChart').getContext('2d');

        // Destroy previous instance (if any)
        if (window.revenueChart) window.revenueChart.destroy();

        window.revenueChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Revenue ($)',
              data: values,
              borderColor: '#ff8c00',
              backgroundColor: 'rgba(255,140,0,0.2)',
              tension: 0.3,
              fill: true,
              pointRadius: 3,
              pointHoverRadius: 6,
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => `$${ctx.parsed.y.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: v => `$${v}`
                }
              },
              x: {
                ticks: { maxTicksLimit: 12 }
              }
            }
          }
        });
      }
    });

    // -----------------------------------------------------------------
    //  Helper to find an element – short alias
    // -----------------------------------------------------------------
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
  </script>
</body>
</html>
