<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskVault Dashboard</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f5f6fa;display:flex;}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#fff;
  height:100vh;
  padding:25px 20px;
  box-shadow:2px 0 15px rgba(0,0,0,0.04);
  position:fixed;
  display:none;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:40px;
}

.logo img{
  width:40px;
}

.logo span{
  font-weight:600;
  font-size:18px;
  color:#ff7a00;
}

.menu a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  text-decoration:none;
  color:#444;
  transition:.3s;
}

.menu a:hover{
  background:#fff5ec;
  color:#ff7a00;
}

/* MAIN */
.main{
  flex:1;
  width:100%;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  background:#fff;
}

.user-info{
  font-size:14px;
  color:#555;
}

.profile{
  font-size:26px;
  color:#ff7a00;
}

/* BALANCE */
.balance-card{
  margin:20px;
  padding:25px;
  border-radius:16px;
  background:linear-gradient(135deg,#ff7a00,#ff9a3c);
  color:white;
}

.balance-card h1{
  font-size:32px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:0 20px 20px;
}

.stat{
  background:white;
  padding:15px;
  border-radius:12px;
  font-size:14px;
}

/* NAV MOBILE */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:15px 0;
}

.bottom-nav i{
  font-size:22px;
  color:#aaa;
}

.bottom-nav .active{
  color:#ff7a00;
}

/* DESKTOP */
@media(min-width:768px){
  .sidebar{display:block;}
  .main{margin-left:240px;}
  .stats{grid-template-columns:repeat(4,1fr);}
  .bottom-nav{display:none;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg">
    <span>TaskVault</span>
  </div>

  <div class="menu">
    <a href="#"><i class="fas fa-home"></i> Dashboard</a>
    <a href="#"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="#"><i class="fas fa-users"></i> Referrals</a>
    <a href="#"><i class="fas fa-trophy"></i> Leaderboard</a>
    <a href="#"><i class="fas fa-cog"></i> Settings</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div class="user-info" id="userEmail">Loading...</div>
    <i class="fas fa-user-circle profile"></i>
  </div>

  <div class="balance-card">
    <h3>Total Balance</h3>
    <h1 id="balance">0 TVC</h1>
  </div>

  <div class="stats">
    <div class="stat">Earned: <span id="earned">0</span> TVC</div>
    <div class="stat">Referrals: <span id="referrals">0</span></div>
    <div class="stat">Pending: <span id="pending">0</span> TVC</div>
    <div class="stat">Rank: <span id="rank">#0</span></div>
  </div>

</div>

<!-- MOBILE NAV -->
<div class="bottom-nav">
  <i class="fas fa-home active"></i>
  <i class="fas fa-gamepad"></i>
  <i class="fas fa-wallet"></i>
  <i class="fas fa-user"></i>
</div>

<!-- ✅ FIREBASE LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
  authDomain: "taskvault-412a0.firebaseapp.com",
  projectId: "taskvault-412a0",
  storageBucket: "taskvault-412a0.firebasestorage.app",
  messagingSenderId: "420716701831",
  appId: "1:420716701831:web:c987d91f7f4c8684eb7022",
  measurementId: "G-93JG3LB08B"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("userEmail").innerText = user.email;

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const d = snap.data();

    document.getElementById("balance").innerText = (d.balance || 0) + " TVC";
    document.getElementById("earned").innerText = d.earned || 0;
    document.getElementById("referrals").innerText = d.referrals || 0;
    document.getElementById("pending").innerText = d.pending || 0;
    document.getElementById("rank").innerText = "#" + (d.rank || 0);
  }
});
</script>

</body>
</html>
