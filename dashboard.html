<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskVault Dashboard | Your Gaming Earnings Hub</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --primary-light: #FF9E7D;
            --secondary: #0F172A;
            --secondary-light: #1E293B;
            --accent: #8B5CF6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --light: #FFFFFF;
            --gray: #F8FAFC;
            --dark-gray: #64748B;
            --text: #334155;
            --text-light: #94A3B8;
            
            --coin-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            --coin-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.25);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 25px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) rotate(0deg); 
            }
            50% { 
                transform: translateY(-15px) rotate(5deg); 
            }
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
            }
            50% { 
                transform: scale(1.08); 
                box-shadow: 0 15px 40px rgba(255, 107, 53, 0.5);
            }
        }

        @keyframes coinSpin {
            0% { 
                transform: rotateY(0) scale(1); 
            }
            50% { 
                transform: rotateY(180deg) scale(1.1); 
            }
            100% { 
                transform: rotateY(360deg) scale(1); 
            }
        }

        @keyframes slideInLeft {
            from { 
                opacity: 0; 
                transform: translateX(-50px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        @keyframes slideInRight {
            from { 
                opacity: 0; 
                transform: translateX(50px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        @keyframes shimmer {
            0% { 
                background-position: -1000px 0; 
            }
            100% { 
                background-position: 1000px 0; 
            }
        }

        @keyframes bounce {
            0%, 100% { 
                transform: translateY(0); 
            }
            50% { 
                transform: translateY(-10px); 
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-pulse {
            animation: pulse 3s ease-in-out infinite;
        }

        .animate-bounce {
            animation: bounce 2s ease-in-out infinite;
        }

        .animate-slide-left {
            animation: slideInLeft 0.8s ease-out forwards;
            opacity: 0;
        }

        .animate-slide-right {
            animation: slideInRight 0.8s ease-out forwards;
            opacity: 0;
        }

        /* ===== DESKTOP SIDEBAR ===== */
        .desktop-sidebar {
            display: none;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            border-right: 2px solid rgba(255, 107, 53, 0.3);
            padding: 35px 25px;
            position: fixed;
            top: 0;
            left: 0;
            width: 300px;
            height: 100vh;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 10px 0 40px rgba(0, 0, 0, 0.4);
            animation: slideInLeft 0.8s ease-out;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
            text-decoration: none;
            padding: 0 10px;
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: var(--coin-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--secondary);
            box-shadow: var(--coin-shadow);
            animation: coinSpin 15s linear infinite;
            overflow: hidden;
            border: 3px solid var(--primary);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .user-profile-sidebar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 107, 53, 0.2);
            transition: var(--transition);
            animation: fadeIn 1s ease-out 0.3s forwards;
            opacity: 0;
        }

        .user-profile-sidebar:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .avatar-sidebar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--coin-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: var(--secondary);
            border: 3px solid var(--primary);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .avatar-sidebar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .user-info p {
            color: var(--text-light);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 20px 25px;
            text-decoration: none;
            color: var(--text-light);
            border-radius: 18px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 6px;
            background: var(--primary);
            transform: scaleY(0);
            transition: var(--transition);
            border-radius: 0 10px 10px 0;
        }

        .nav-item:hover {
            background: rgba(255, 107, 53, 0.15);
            color: var(--light);
            transform: translateX(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2) 0%, rgba(255, 107, 53, 0.1) 100%);
            color: var(--light);
            border: 2px solid rgba(255, 107, 53, 0.3);
        }

        .nav-item.active::before {
            transform: scaleY(1);
        }

        .nav-item i {
            font-size: 1.4rem;
            width: 30px;
            text-align: center;
            transition: var(--transition);
        }

        .nav-item:hover i {
            transform: scale(1.2);
        }

        .nav-badge {
            margin-left: auto;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        /* ===== MOBILE BOTTOM NAV ===== */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            padding: 20px 10px;
            z-index: 1000;
            border-top: 2px solid rgba(255, 107, 53, 0.3);
            box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.4);
            animation: slideInLeft 0.8s ease-out;
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-light);
            transition: var(--transition);
            padding: 18px 20px;
            border-radius: 20px;
            min-width: 85px;
            position: relative;
        }

        .mobile-nav-item i {
            font-size: 1.8rem;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .mobile-nav-item span {
            font-size: 1rem;
            font-weight: 600;
        }

        .mobile-nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            transform: translateY(-20px);
            box-shadow: 0 15px 35px rgba(255, 107, 53, 0.5);
            animation: bounce 2s ease-in-out infinite;
        }

        .mobile-nav-item.active i {
            transform: scale(1.3);
        }

        .mobile-nav-item:not(.active):hover {
            color: var(--primary);
            transform: translateY(-10px);
            background: rgba(255, 107, 53, 0.1);
        }

        .mobile-nav-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger);
            color: white;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 15px;
            min-width: 22px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 40px;
            padding-bottom: 140px;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header with Profile */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out 0.2s forwards;
            opacity: 0;
        }

        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--light) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header-right {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .notification-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 107, 53, 0.3);
            color: var(--light);
            font-size: 1.4rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-btn:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 15px 35px rgba(255, 107, 53, 0.4);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(135deg, var(--danger) 0%, #DC2626 100%);
            color: white;
            font-size: 0.9rem;
            padding: 5px 12px;
            border-radius: 15px;
            min-width: 25px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .profile-dropdown {
            position: relative;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 107, 53, 0.3);
            padding: 15px 25px;
            border-radius: 50px;
            color: var(--light);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .profile-btn:hover {
            background: rgba(255, 107, 53, 0.2);
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .profile-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--coin-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            border: 3px solid var(--primary);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-weight: 700;
            font-size: 1.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .profile-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 107, 53, 0.3);
            border-radius: 20px;
            padding: 20px;
            min-width: 250px;
            display: none;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            margin-top: 15px;
            animation: fadeIn 0.3s ease-out;
        }

        .profile-dropdown:hover .profile-dropdown-menu {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            text-decoration: none;
            color: var(--text-light);
            border-radius: 15px;
            transition: var(--transition);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .dropdown-item:hover {
            background: rgba(255, 107, 53, 0.15);
            color: var(--light);
            transform: translateX(10px);
        }

        .dropdown-item i {
            width: 25px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius);
            padding: 35px;
            border: 2px solid rgba(255, 107, 53, 0.2);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .stat-card:nth-child(1) { animation-delay: 0.3s; }
        .stat-card:nth-child(2) { animation-delay: 0.4s; }
        .stat-card:nth-child(3) { animation-delay: 0.5s; }

        .stat-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--coin-gradient);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: rgba(255, 107, 53, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--primary);
            border: 2px solid rgba(255, 107, 53, 0.3);
            transition: var(--transition);
        }

        .stat-card:hover .stat-icon {
            background: var(--primary);
            color: white;
            transform: rotate(15deg) scale(1.1);
        }

        .stat-trend {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(16, 185, 129, 0.15);
            border: 2px solid rgba(16, 185, 129, 0.3);
        }

        .trend-up {
            color: var(--success);
        }

        .trend-down {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .stat-value {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .coin-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: var(--coin-gradient);
            border-radius: 50%;
            color: var(--secondary);
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: var(--coin-shadow);
            animation: coinSpin 10s linear infinite;
            border: 3px solid var(--primary);
        }

        .stat-label {
            color: var(--text-light);
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 107, 53, 0.2);
            border-radius: var(--border-radius);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: var(--light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .action-btn:nth-child(1) { animation-delay: 0.6s; }
        .action-btn:nth-child(2) { animation-delay: 0.7s; }
        .action-btn:nth-child(3) { animation-delay: 0.8s; }
        .action-btn:nth-child(4) { animation-delay: 0.9s; }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.2), transparent);
            transition: 0.8s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:hover {
            background: rgba(255, 107, 53, 0.15);
            border-color: var(--primary);
            transform: translateY(-10px) scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .action-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--primary);
            transition: var(--transition);
            border: 2px solid rgba(255, 107, 53, 0.3);
        }

        .action-btn:hover .action-icon {
            background: var(--primary);
            color: white;
            transform: scale(1.2) rotate(15deg);
            box-shadow: 0 15px 35px rgba(255, 107, 53, 0.4);
        }

        .action-text {
            text-align: center;
        }

        .action-text h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .action-text p {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Recent Activity */
        .activity-section {
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius);
            padding: 35px;
            border: 2px solid rgba(255, 107, 53, 0.2);
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-out 1s forwards;
            opacity: 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 800;
        }

        .view-all {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            font-size: 1.1rem;
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid rgba(255, 107, 53, 0.3);
            background: rgba(255, 107, 53, 0.1);
        }

        .view-all:hover {
            color: var(--light);
            background: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.3);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            animation: slideInRight 0.8s ease-out forwards;
            opacity: 0;
        }

        .activity-item:nth-child(1) { animation-delay: 1.1s; }
        .activity-item:nth-child(2) { animation-delay: 1.2s; }
        .activity-item:nth-child(3) { animation-delay: 1.3s; }
        .activity-item:nth-child(4) { animation-delay: 1.4s; }

        .activity-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(15px);
            border-color: rgba(255, 107, 53, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .activity-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: var(--transition);
        }

        .activity-icon.win {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 2px solid rgba(16, 185, 129, 0.3);
        }

        .activity-icon.deposit {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent);
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .activity-icon.withdraw {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 2px solid rgba(239, 68, 68, 0.3);
        }

        .activity-icon.tournament {
            background: rgba(255, 107, 53, 0.15);
            color: var(--primary);
            border: 2px solid rgba(255, 107, 53, 0.3);
        }

        .activity-item:hover .activity-icon {
            transform: scale(1.2) rotate(15deg);
        }

        .activity-details {
            flex: 1;
        }

        .activity-details h4 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .activity-details p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .activity-amount {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .amount-positive {
            color: var(--success);
        }

        .amount-negative {
            color: var(--danger);
        }

        .tournaments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;

            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;

        .tournament-card:nth-child(1) { animation-delay: 1.5s; }

        .tournament-card:nth-child(3) { animation-delay: 1.7s; }

        .tournament-card:hover {

        .tournament-badge {

            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);

        .tournament-icon {

            font-size: 28px;
            color: var(--primary);
            border: 2px solid rgba(255, 107, 53, 0.3);
            transition: var(--transition);
        }

            color: white;
            transform: rotate(15deg) scale(1.1);
        }
