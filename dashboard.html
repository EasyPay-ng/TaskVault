<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== THEME VARIABLES ==================== */
        :root {
            --orange-main: #FF8C42;
            --orange-dark: #E67A35;
            --orange-light: #FFF0E6;
            --silk-bg: #FDFBF7;
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-light: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        /* Mobile App Container - responsive for both mobile and desktop */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--silk-bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
            border-radius: 20px;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* Desktop larger view */
        @media (min-width: 768px) {
            .app-container {
                max-width: 500px;
                margin: 40px auto;
                min-height: auto;
                max-height: 90vh;
                overflow-y: auto;
            }
        }

        /* ==================== HEADER ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--white);
            border-bottom: 1px solid rgba(255, 140, 66, 0.1);
            border-radius: 20px 20px 0 0;
        }

        .user-info h2 {
            font-size: 18px;
            color: var(--text-dark);
            font-weight: 600;
        }

        .user-info p {
            font-size: 12px;
            color: var(--text-light);
        }

        .notification {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--orange-light);
            color: var(--orange-main);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            position: relative;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
        }

        /* ==================== BALANCE CARD ==================== */
        .balance-section {
            padding: 20px 24px;
        }

        .balance-card {
            background: linear-gradient(135deg, var(--orange-main) 0%, #FF6B35 100%);
            border-radius: 20px;
            padding: 25px 20px;
            color: var(--white);
            box-shadow: 0 10px 20px rgba(255, 140, 66, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .balance-card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .balance-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .currency {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* ==================== ACTION CARDS ==================== */
        .card {
            background: var(--white);
            margin: 0 24px 20px 24px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(255, 140, 66, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-icon {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            background: var(--orange-light);
            color: var(--orange-main);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            font-size: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Daily Claim Specifics */
        .claim-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--orange-main);
            margin-bottom: 15px;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--orange-main);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:hover {
            background: var(--orange-dark);
        }

        .btn-disabled {
            background: #E0E0E0;
            color: #9E9E9E;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Referral Specifics */
        .ref-box {
            display: flex;
            align-items: center;
            background: var(--silk-bg);
            border: 1px dashed var(--orange-main);
            border-radius: 10px;
            padding: 5px 5px 5px 15px;
            margin-top: 10px;
        }

        .ref-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 13px;
            color: var(--text-dark);
            outline: none;
        }

        .btn-copy {
            background: var(--orange-main);
            color: var(--white);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: var(--orange-dark);
        }

        /* ==================== BOTTOM NAVIGATION ==================== */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 22px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.08);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 11px;
            gap: 4px;
            transition: 0.3s ease;
            padding: 5px 10px;
            border-radius: 10px;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: var(--orange-main);
        }

        .nav-item:hover {
            color: var(--orange-dark);
        }

        .nav-item.active i {
            transform: translateY(-2px);
        }

        /* ==================== TOAST NOTIFICATION ==================== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 2000;
            text-align: center;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            top: 40px;
        }

        /* ==================== LOADING OVERLAY ==================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 251, 247, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--orange-light);
            border-top: 4px solid var(--orange-main);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="app-container">
        <!-- HEADER -->
        <div class="header">
            <div class="user-info">
                <h2>Welcome Back</h2>
                <p id="userEmail">Loading...</p>
            </div>
            <div class="notification" onclick="showToast('No new notifications')">
                <i class="fa-regular fa-bell"></i>
                <div class="badge"></div>
            </div>
        </div>

        <!-- MAIN BALANCE -->
        <div class="balance-section">
            <div class="balance-card">
                <div class="balance-title">Main Balance</div>
                <div class="balance-amount">
                    <span id="balanceDisplay">0.00</span> <span class="currency">TVC</span>
                </div>
            </div>
        </div>

        <!-- DAILY CLAIM -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon"><i class="fa-solid fa-gift"></i></div>
                <div class="card-title">Daily Claim</div>
            </div>
            <p style="font-size: 13px; color: var(--text-light); text-align: center; margin-bottom: 10px;">
                Claim your free TVC tokens every 24 hours.
            </p>
            <div class="claim-amount">+0.01 TVC</div>
            <button id="claimBtn" class="btn btn-primary" onclick="claimDaily()">
                <i class="fa-solid fa-gift"></i> Claim Now
            </button>
            <p id="claimStatus" style="text-align: center; font-size: 12px; color: var(--orange-main); margin-top: 10px; display: none;">
                <i class="fa-solid fa-clock"></i> Next claim available tomorrow.
            </p>
        </div>

        <!-- REFERRAL PROGRAM -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon"><i class="fa-solid fa-users"></i></div>
                <div class="card-title">Referral Program</div>
            </div>
            <p style="font-size: 13px; color: var(--text-light);">
                Invite friends and earn bonus TVC! Share your unique link:
            </p>
            <div class="ref-box">
                <input type="text" id="refLink" class="ref-input" value="Loading..." readonly>
                <button class="btn-copy" onclick="copyReferral()">
                    <i class="fa-solid fa-copy"></i> Copy
                </button>
            </div>
            <p style="font-size: 11px; color: var(--orange-main); text-align: center; margin-top: 10px;">
                Earn 0.005 TVC per referral!
            </p>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <a href="menu.html" class="nav-item">
                <i class="fa-solid fa-bars"></i>
                <span>Menu</span>
            </a>
            <a href="deposit.html" class="nav-item">
                <i class="fa-solid fa-arrow-down-to-line"></i>
                <span>Deposit</span>
            </a>
            <a href="withdraw.html" class="nav-item">
                <i class="fa-solid fa-arrow-up-from-bracket"></i>
                <span>Withdraw</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast">Message</div>

    <!-- FIREBASE SDK SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

    <script>
        // ==========================================
        // 🔥 PASTE YOUR FIREBASE DETAILS HERE 🔥
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userData = null;

        // ==========================================
        // AUTHENTICATION & DATA FETCHING
        // ==========================================
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userEmail').textContent = user.email || 'Anonymous User';
                fetchUserData(user.uid);
            } else {
                // Auto sign-in anonymously for testing
                auth.signInAnonymously().catch((error) => {
                    console.error("Auth Error:", error);
                    showToast("Authentication Failed");
                    hideLoading();
                });
            }
        });

        async function fetchUserData(uid) {
            const userRef = db.collection('users').doc(uid);
            
            try {
                const doc = await userRef.get();
                if (doc.exists) {
                    userData = doc.data();
                    updateUI();
                } else {
                    // Create new user profile
                    const newProfile = {
                        balance: 0.00,
                        referralCode: generateRefCode(uid),
                        referralCount: 0,
                        lastClaimDate: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await userRef.set(newProfile);
                    userData = newProfile;
                    updateUI();
                }
            } catch (error) {
                console.error("Error fetching data: ", error);
                document.getElementById('balanceDisplay').innerText = "0.00";
                hideLoading();
            }
            hideLoading();
        }

        // ==========================================
        // UI UPDATES & LOGIC
        // ==========================================
        
        function updateUI() {
            document.getElementById('balanceDisplay').innerText = userData.balance.toFixed(2);
            
            const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
            document.getElementById('refLink').value = `${baseUrl}?ref=${userData.referralCode}`;

            checkClaimStatus();
        }

        function checkClaimStatus() {
            const btn = document.getElementById('claimBtn');
            const statusText = document.getElementById('claimStatus');
            
            if (!userData.lastClaimDate) {
                // Never claimed - enable button
                enableClaimButton(btn, statusText);
                return;
            }

            const lastClaim = userData.lastClaimDate.toDate ? userData.lastClaimDate.toDate() : new Date(userData.lastClaimDate);
            const now = new Date();
            const diffHours = Math.ceil(Math.abs(now - lastClaim) / (1000 * 60 * 60));

            if (diffHours < 24) {
                disableClaimButton(btn, statusText);
                // Calculate remaining time
                const remaining = 24 - diffHours;
                statusText.innerHTML = `<i class="fa-solid fa-clock"></i> Next claim in ${remaining}h`;
            } else {
                enableClaimButton(btn, statusText);
            }
        }

        function enableClaimButton(btn, statusText) {
            btn.classList.add('btn-primary');
            btn.classList.remove('btn-disabled');
            btn.innerHTML = '<i class="fa-solid fa-gift"></i> Claim Now';
            btn.disabled = false;
            statusText.style.display = "none";
        }

        function disableClaimButton(btn, statusText) {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-disabled');
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Claimed';
            btn.disabled = true;
            statusText.style.display = "block";
        }

        // ==========================================
        // ACTIONS (CLAIM & COPY)
        // ==========================================

        async function claimDaily() {
            if (!currentUser) {
                showToast("Please login first!");
                return;
            }

            const btn = document.getElementById('claimBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                const newBalance = (parseFloat(userData.balance) || 0) + 0.01;
                
                await userRef.update({
                    balance: newBalance,
                    lastClaimDate: firebase.firestore.FieldValue.serverTimestamp()
                });

                userData.balance = newBalance;
                userData.lastClaimDate = new Date();
                
                updateUI();
                showToast("🎉 Successfully claimed 0.01 TVC!");

            } catch (error) {
                console.error("Claim error:", error);
                showToast("❌ Error claiming. Try again.");
                btn.innerHTML = '<i class="fa-solid fa-gift"></i> Claim Now';
                btn.disabled = false;
            }
        }

        function copyReferral() {
            const refInput = document.getElementById('refLink');
            refInput.select();
            refInput.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(refInput.value).then(() => {
                showToast("✅ Referral link copied!");
            }).catch(() => {
                // Fallback for older browsers
                document.execCommand('copy');
                showToast("✅ Referral link copied!");
            });
        }

        // ==========================================
        // HELPER FUNCTIONS
        // ==========================================

        function generateRefCode(uid) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = 'TVC';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Highlight active nav based on current page
        document.addEventListener('DOMContentLoaded', () => {
            const currentPage = window.location.pathname.split('/').pop();
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (href === currentPage || 
                    (currentPage === '' || currentPage === 'index.html') && href === 'profile.html') {
                    item.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
