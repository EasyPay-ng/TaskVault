<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>TaskVault – Vault Defender</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --white: #ffffff;
      --gray-900: #111827;
      --gray-800: #1f2937;
      --gray-700: #374151;
      --gray-600: #4b5563;
      --gray-500: #6b7280;
      --green: #10b981;
      --red: #ef4444;
      --gold: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(180deg, var(--gray-900) 0%, #0f172a 100%);
      color: var(--white);
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    /* HEADER */
    .game-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      padding: .5rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3);
      height: 50px;
    }
    .game-header .timer {
      font-size: 1.3rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: rgba(0,0,0,0.2);
      padding: .2rem .6rem;
      border-radius: 6px;
      min-width: 50px;
      text-align: center;
    }
    .game-header .score {
      font-size: 1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .game-header .bullets {
      font-size: .9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    /* CANVAS */
    #gameCanvas {
      position: fixed;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 160px;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 50%, #1e293b 100%);
      cursor: crosshair;
    }

    /* JOYSTICK */
    .joystick-zone {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 160px;
      height: 160px;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .joystick-base {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
    }
    .joystick-knob {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
      transition: transform .05s;
    }
    .joystick-knob::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }

    /* FIRE BUTTON */
    .fire-btn {
      position: fixed;
      bottom: 40px;
      right: 30px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #dc2626);
      border: 3px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 1.5rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(239,68,68,0.4);
      transition: transform .1s, box-shadow .1s;
    }
    .fire-btn:active {
      transform: scale(0.92);
      box-shadow: 0 2px 12px rgba(239,68,68,0.3);
    }
    .fire-btn.empty {
      background: var(--gray-700);
      box-shadow: none;
    }

    /* CHARACTER SELECT BAR */
    .char-bar {
      position: fixed;
      bottom: 0;
      left: 160px;
      right: 0;
      height: 60px;
      background: linear-gradient(180deg, var(--gray-800) 0%, var(--gray-900) 100%);
      border-top: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: 0 1rem;
      z-index: 100;
    }
    .char-btn {
      padding: .4rem .8rem;
      background: linear-gradient(135deg, var(--gray-700) 0%, var(--gray-800) 100%);
      border: 2px solid var(--gray-600);
      border-radius: 8px;
      color: var(--white);
      cursor: pointer;
      font-size: .75rem;
      font-weight: 700;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: .4rem;
      white-space: nowrap;
    }
    .char-btn:hover { border-color: var(--orange); }
    .char-btn.selected {
      border-color: var(--orange);
      background: rgba(249,115,22,0.15);
      box-shadow: 0 0 12px rgba(249,115,22,0.2);
    }
    .char-btn .emoji { font-size: 1.1rem; }

    /* FLOATING TEXT */
    .float-text {
      position: absolute;
      font-weight: 800;
      font-size: .85rem;
      pointer-events: none;
      animation: floatUp .8s ease-out forwards;
      z-index: 300;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .float-text.green { color: var(--green); }
    .float-text.red { color: var(--red); }
    .float-text.gold { color: var(--gold); }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-35px) scale(1.1); }
    }

    /* START SCREEN */
    .start-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
    }
    .start-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .start-card h1 {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: .5rem;
    }
    .start-card p {
      color: var(--gray-500);
      font-size: .85rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .char-select {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .char-option {
      padding: 1rem;
      background: var(--gray-800);
      border: 2px solid var(--gray-700);
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .char-option:hover { border-color: var(--orange); }
    .char-option.selected {
      border-color: var(--orange);
      background: rgba(249,115,22,0.1);
    }
    .char-option .emoji { font-size: 2rem; display: block; margin-bottom: .3rem; }
    .char-option .name { font-size: .8rem; font-weight: 700; }
    .char-option .bullets { font-size: .7rem; color: var(--gray-500); margin-top: .2rem; }
    .start-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* GAME OVER */
    .game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .game-over.show { opacity: 1; pointer-events: all; }
    .game-over-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: popIn .4s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .game-over-card h2 {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: .5rem;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .final-score {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--white);
      margin: .5rem 0;
    }
    .score-breakdown {
      text-align: left;
      background: var(--gray-800);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: .8rem;
    }
    .break-item {
      display: flex;
      justify-content: space-between;
      padding: .3rem 0;
      border-bottom: 1px solid var(--gray-700);
    }
    .break-item:last-child { border-bottom: none; }
    .break-item .val.green { color: var(--green); }
    .break-item .val.red { color: var(--red); }
    .break-item .val.gold { color: var(--gold); }
    .game-over-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: .5rem;
    }

    /* SOUND TOGGLE */
    .sound-toggle {
      position: fixed;
      top: 60px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--gray-600);
      border-radius: 8px;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      font-size: 1.1rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="start-card">
    <div style="font-size:2.5rem;margin-bottom:.5rem;">🛡️</div>
    <h1>Choose Your Defender</h1>
    <p>Select a character. Move left/right to aim, fire to shoot. Protect the vault above!</p>
    <div class="char-select" id="charSelect">
      <div class="char-option selected" data-char="freelancer" onclick="selectChar('freelancer')">
        <span class="emoji">👨‍💻</span>
        <span class="name">Freelancer</span>
        <span class="bullets">∞ Bullets</span>
      </div>
      <div class="char-option" data-char="manager" onclick="selectChar('manager')">
        <span class="emoji">👔</span>
        <span class="name">Manager</span>
        <span class="bullets">150 Bullets</span>
      </div>
      <div class="char-option" data-char="ceo" onclick="selectChar('ceo')">
        <span class="emoji">👑</span>
        <span class="name">CEO</span>
        <span class="bullets">80 Bullets</span>
      </div>
      <div class="char-option" data-char="bot" onclick="selectChar('bot')">
        <span class="emoji">🤖</span>
        <span class="name">Bot</span>
        <span class="bullets">200 Bullets</span>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">START DEFENDING</button>
  </div>
</div>

<!-- GAME HEADER -->
<div class="game-header" id="gameHeader" style="display:none;">
  <div class="timer" id="timer">60</div>
  <div class="score">
    <i class="ri-trophy-fill" style="color:var(--gold);"></i>
    <span id="scoreDisplay">0</span>
  </div>
  <div class="bullets">
    <i class="ri-fire-fill" style="color:var(--red);"></i>
    <span id="bulletDisplay">∞</span>
  </div>
</div>

<!-- SOUND TOGGLE -->
<button class="sound-toggle" id="soundToggle" style="display:none;" onclick="toggleSound()">
  <i class="ri-volume-up-fill" id="soundIcon"></i>
</button>

<!-- CANVAS -->
<<canvas id="gameCanvas" style="display:none;"></canvas>

<!-- JOYSTICK -->
<div class="joystick-zone" id="joystickZone" style="display:none;">
  <div class="joystick-base" id="joystickBase">
    <div class="joystick-knob" id="joystickKnob"></div>
  </div>
</div>

<!-- FIRE BUTTON -->
<button class="fire-btn" id="fireBtn" style="display:none;">
  <i class="ri-fire-fill"></i>
</button>

<!-- CHARACTER BAR -->
<div class="char-bar" id="charBar" style="display:none;">
  <button class="char-btn selected" data-char="freelancer" onclick="switchChar('freelancer')">
    <span class="emoji">👨‍💻</span> Freelancer
  </button>
  <button class="char-btn" data-char="manager" onclick="switchChar('manager')">
    <span class="emoji">👔</span> Manager
  </button>
  <button class="char-btn" data-char="ceo" onclick="switchChar('ceo')">
    <span class="emoji">👑</span> CEO
  </button>
  <button class="char-btn" data-char="bot" onclick="switchChar('bot')">
    <span class="emoji">🤖</span> Bot
  </button>
</div>

<!-- GAME OVER -->
<div class="game-over" id="gameOver">
  <div class="game-over-card">
    <h2 id="endTitle">TIME'S UP!</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <button class="game-over-btn" onclick="submitScore()">SUBMIT SCORE</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
  import {
    getFirestore, doc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
    authDomain: "taskvault-412a0.firebaseapp.com",
    projectId: "taskvault-412a0",
    storageBucket: "taskvault-412a0.firebasestorage.app",
    messagingSenderId: "420716701831",
    appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ========== AUDIO SYSTEM ==========
  let audioCtx = null;
  let soundEnabled = true;
  let bgmOscillator = null;
  let bgmGain = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playSound(type) {
    if (!soundEnabled || !audioCtx) return;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    switch(type) {
      case 'shoot':
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
        break;
      case 'hit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
        break;
      case 'kill':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
        break;
      case 'vaultHit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
        break;
      case 'empty':
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
        break;
      case 'gameOver':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
        break;
    }
  }

  function startBGM() {
    if (!soundEnabled || !audioCtx) return;
    if (bgmOscillator) stopBGM();

    bgmOscillator = audioCtx.createOscillator();
    bgmGain = audioCtx.createGain();
    bgmOscillator.connect(bgmGain);
    bgmGain.connect(audioCtx.destination);

    bgmOscillator.type = 'sine';
    bgmOscillator.frequency.setValueAtTime(110, audioCtx.currentTime);
    
    // Simple arpeggio pattern
    const notes = [110, 130.81, 164.81, 196, 220, 196, 164.81, 130.81];
    let noteIdx = 0;
    
    const interval = setInterval(() => {
      if (!bgmOscillator || !soundEnabled) {
        clearInterval(interval);
        return;
      }
      bgmOscillator.frequency.setValueAtTime(notes[noteIdx], audioCtx.currentTime);
      noteIdx = (noteIdx + 1) % notes.length;
    }, 250);

    bgmGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    bgmOscillator.start();
  }

  function stopBGM() {
    if (bgmOscillator) {
      try { bgmOscillator.stop(); } catch(e) {}
      bgmOscillator = null;
    }
    if (bgmGain) {
      try { bgmGain.disconnect(); } catch(e) {}
      bgmGain = null;
    }
  }

  window.toggleSound = function() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundIcon').className = soundEnabled ? 'ri-volume-up-fill' : 'ri-volume-mute-fill';
    if (soundEnabled) {
      initAudio();
      startBGM();
    } else {
      stopBGM();
    }
  };

  // ========== CHARACTERS ==========
  const CHARACTERS = {
    freelancer: {
      emoji: '👨‍💻',
      name: 'Freelancer',
      bullets: Infinity,
      fireRate: 150,
      damage: 25,
      speed: 5,
      color: '#3b82f6',
      bulletSpeed: 10
    },
    manager: {
      emoji: '👔',
      name: 'Manager',
      bullets: 150,
      fireRate: 200,
      damage: 35,
      speed: 4,
      color: '#8b5cf6',
      bulletSpeed: 9,
      spread: true
    },
    ceo: {
      emoji: '👑',
      name: 'CEO',
      bullets: 80,
      fireRate: 300,
      damage: 80,
      speed: 3,
      color: '#f59e0b',
      bulletSpeed: 8,
      splash: true
    },
    bot: {
      emoji: '🤖',
      name: 'Bot',
      bullets: 200,
      fireRate: 100,
      damage: 15,
      speed: 4.5,
      color: '#10b981',
      bulletSpeed: 11,
      rapid: true
    }
  };

  // ========== GAME STATE ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let gameRunning = false;
  let timeLeft = 60;
  let score = 0;
  let selectedChar = 'freelancer';
  let player = null;
  let bullets = [];
  let enemies = [];
  let particles = [];
  let floatingTexts = [];
  let vault = { hp: 100, maxHp: 100 };
  let kills = 0;
  let combo = 0;
  let maxCombo = 0;
  let vaultHits = 0;
  let bulletsFired = 0;

  let lastFire = 0;
  let spawnTimer = 0;
  let gameLoopId = null;
  let timerInterval = null;

  // Joystick - HORIZONTAL ONLY, REDUCED SENSITIVITY
  let joystick = { active: false, dx: 0, startX: 0, startY: 0 };
  let firePressed = false;
  const JOYSTICK_SENSITIVITY = 0.25; // Further reduced from 0.4
  const PLAYER_Y_POSITION = 0.88; // Player at 88% down the screen (below vault)

  // Auth
  let currentUser = null;
  let entryId = sessionStorage.getItem('vdEntryId');
  let roundId = sessionStorage.getItem('vdRoundId');

  onAuthStateChanged(auth, (user) => {
    if (!user) { location.href = 'login.html'; return; }
    currentUser = user;
    if (!entryId || !roundId) location.href = 'game-lobby2.html';
  });

  // ========== RESIZE ==========
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 50 - 160;
  }

  // ========== CHARACTER SELECTION ==========
  window.selectChar = function(char) {
    selectedChar = char;
    document.querySelectorAll('.char-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.char === char);
    });
  };

  window.switchChar = function(char) {
    if (!gameRunning) return;
    selectedChar = char;
    const charData = CHARACTERS[char];
    player.bullets = charData.bullets === Infinity ? Infinity : charData.bullets;
    player.fireRate = charData.fireRate;
    player.damage = charData.damage;
    player.speed = charData.speed;
    player.color = charData.color;
    player.emoji = charData.emoji;
    player.bulletSpeed = charData.bulletSpeed;
    player.spread = charData.spread || false;
    player.splash = charData.splash || false;
    player.rapid = charData.rapid || false;

    document.querySelectorAll('.char-btn').forEach(el => {
      el.classList.toggle('selected', el.dataset.char === char);
    });
    updateBulletDisplay();
  };

  // ========== START GAME ==========
  window.startGame = function() {
    initAudio();
    if (soundEnabled) startBGM();

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameHeader').style.display = 'flex';
    document.getElementById('gameCanvas').style.display = 'block';
    document.getElementById('joystickZone').style.display = 'flex';
    document.getElementById('fireBtn').style.display = 'flex';
    document.getElementById('charBar').style.display = 'flex';
    document.getElementById('soundToggle').style.display = 'flex';

    resize();

    const charData = CHARACTERS[selectedChar];
    player = {
      x: canvas.width / 2,
      y: canvas.height * PLAYER_Y_POSITION,
      w: 40, h: 40,
      bullets: charData.bullets === Infinity ? Infinity : charData.bullets,
      maxBullets: charData.bullets,
      fireRate: charData.fireRate,
      damage: charData.damage,
      speed: charData.speed,
      color: charData.color,
      emoji: charData.emoji,
      bulletSpeed: charData.bulletSpeed,
      spread: charData.spread || false,
      splash: charData.splash || false,
      rapid: charData.rapid || false
    };

    gameRunning = true;
    startTimer();
    setupJoystick();
    setupFireButton();
    gameLoop();
  };

  function startTimer() {
    timerInterval = setInterval(() => {
      if (!gameRunning) return;
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      if (timeLeft <= 10) document.getElementById('timer').style.color = '#ef4444';
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  // ========== JOYSTICK - HORIZONTAL ONLY ==========
  function setupJoystick() {
    const zone = document.getElementById('joystickZone');
    const base = document.getElementById('joystickBase');
    const knob = document.getElementById('joystickKnob');

    function handleStart(e) {
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      const rect = base.getBoundingClientRect();
      joystick.active = true;
      joystick.startX = rect.left + rect.width / 2;
      joystick.startY = rect.top + rect.height / 2;
    }

    function handleMove(e) {
      if (!joystick.active) return;
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      const dx = touch.clientX - joystick.startX;
      const dy = touch.clientY - joystick.startY;
      const dist = Math.hypot(dx, dy);
      const maxDist = 35;

      if (dist > 0) {
        const scale = Math.min(dist, maxDist) / dist;
        // HORIZONTAL ONLY - ignore Y movement
        joystick.dx = ((dx / dist) * Math.min(dist, maxDist) / maxDist) * JOYSTICK_SENSITIVITY;
        // joystick.dy is always 0 - no vertical movement
        knob.style.transform = `translate(calc(-50% + ${dx * scale}px), calc(-50% + ${dy * scale * 0.3}px))`;
        // Visual feedback only for Y, no actual movement
      }
    }

    function handleEnd(e) {
      e.preventDefault();
      joystick.active = false;
      joystick.dx = 0;
      knob.style.transform = 'translate(-50%, -50%)';
    }

    zone.addEventListener('touchstart', handleStart, { passive: false });
    zone.addEventListener('touchmove', handleMove, { passive: false });
    zone.addEventListener('touchend', handleEnd, { passive: false });
    zone.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
  }

  // ========== FIRE BUTTON ==========
  function setupFireButton() {
    const btn = document.getElementById('fireBtn');

    function startFire(e) {
      e.preventDefault();
      firePressed = true;
    }
    function stopFire(e) {
      e.preventDefault();
      firePressed = false;
    }

    btn.addEventListener('touchstart', startFire, { passive: false });
    btn.addEventListener('touchend', stopFire, { passive: false });
    btn.addEventListener('mousedown', startFire);
    btn.addEventListener('mouseup', stopFire);
  }

  // ========== GAME LOOP ==========
  function gameLoop() {
    if (!gameRunning) return;
    gameLoopId = requestAnimationFrame(gameLoop);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBackground();
    drawVault();
    updatePlayer();
    updateBullets();
    updateEnemies();
    updateParticles();
    updateFloatingTexts();
    spawnEnemies();

    if (firePressed) tryFire();
  }

  function drawBackground() {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
  }

  // ========== VAULT AT TOP ==========
  function drawVault() {
    const x = canvas.width / 2 - 40;
    const y = 15;
    const w = 80;
    const h = 28;

    ctx.shadowColor = 'rgba(249,115,22,0.6)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(249,115,22,0.3)';
    ctx.fillRect(x - 5, y - 5, w + 10, h + 10);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#f97316';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#ea580c';
    ctx.fillRect(x + 3, y + 3, w - 6, h - 6);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('🔒 VAULT', canvas.width / 2, y + 19);

    const hpPct = vault.hp / vault.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y + h + 4, w, 6);
    ctx.fillStyle = hpPct > 0.5 ? '#10b981' : hpPct > 0.25 ? '#f59e0b' : '#ef4444';
    ctx.fillRect(x, y + h + 4, w * hpPct, 6);
  }

  // ========== PLAYER BELOW VAULT - HORIZONTAL ONLY ==========
  function updatePlayer() {
    if (!player) return;

    // HORIZONTAL MOVEMENT ONLY
    player.x += joystick.dx * player.speed * 3;
    // Y is fixed - no vertical movement
    player.y = canvas.height * PLAYER_Y_POSITION;

    // Clamp X only
    player.x = Math.max(25, Math.min(canvas.width - 25, player.x));

    // Draw player
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(player.emoji, player.x, player.y);

    // Gun pointing UP
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - 6, player.y - 28, 12, 16);

    // Muzzle flash
    if (firePressed && Date.now() - lastFire < 100) {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(player.x, player.y - 34, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function tryFire() {
    const now = Date.now();
    if (now - lastFire < player.fireRate) return;
    if (player.bullets !== Infinity && player.bullets <= 0) {
      showFloat(player.x, player.y - 30, 'EMPTY!', 'red');
      playSound('empty');
      return;
    }

    lastFire = now;
    if (player.bullets !== Infinity) player.bullets--;
    bulletsFired++;
    updateBulletDisplay();
    playSound('shoot');

    if (player.spread) {
      for (let i = -1; i <= 1; i++) {
        bullets.push({
          x: player.x, y: player.y - 30,
          vx: i * 2, vy: -player.bulletSpeed,
          damage: player.damage,
          color: player.color,
          splash: player.splash
        });
      }
    } else if (player.rapid) {
      bullets.push({
        x: player.x - 6, y: player.y - 30,
        vx: 0, vy: -player.bulletSpeed,
        damage: player.damage,
        color: player.color
      });
      bullets.push({
        x: player.x + 6, y: player.y - 30,
        vx: 0, vy: -player.bulletSpeed,
        damage: player.damage,
        color: player.color
      });
    } else {
      bullets.push({
        x: player.x, y: player.y - 30,
        vx: 0, vy: -player.bulletSpeed,
        damage: player.damage,
        color: player.color,
        splash: player.splash
      });
    }
  }

  function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;

      ctx.fillStyle = b.color;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(b.x - 2, b.y + 4, 4, 8);

      if (b.y < -10 || b.x < -10 || b.x > canvas.width + 10) {
        bullets.splice(i, 1);
        continue;
      }

      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + 4) {
          e.hp -= b.damage;
          playSound('hit');

          if (b.splash) {
            enemies.forEach(ne => {
              if (ne !== e && Math.hypot(ne.x - e.x, ne.y - e.y) < 50) {
                ne.hp -= b.damage * 0.5;
              }
            });
            for (let k = 0; k < 12; k++) {
              particles.push({
                x: e.x, y: e.y,
                vx: (Math.random() - .5) * 8,
                vy: (Math.random() - .5) * 8,
                life: 20,
                color: '#f59e0b',
                size: 4
              });
            }
          }

          if (e.hp <= 0) {
            killEnemy(e, j);
          } else {
            showFloat(e.x, e.y, `-${b.damage}`, 'red');
          }

          bullets.splice(i, 1);
          break;
        }
      }
    }
  }

  function killEnemy(enemy, index) {
    const reward = enemy.reward;
    kills++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    const comboMult = Math.min(combo, 10);
    const points = reward + (comboMult * 5);
    score += points;

    playSound('kill');
    showFloat(enemy.x, enemy.y, `+${points}`, 'green');
    if (combo >= 3) {
      showFloat(enemy.x, enemy.y - 25, `${combo}x COMBO!`, 'gold');
    }

    for (let i = 0; i < 15; i++) {
      particles.push({
        x: enemy.x, y: enemy.y,
        vx: (Math.random() - .5) * 6,
        vy: (Math.random() - .5) * 6,
        life: 25,
        color: enemy.color,
        size: 3
      });
    }

    enemies.splice(index, 1);
    updateScore();
  }

  function spawnEnemies() {
    spawnTimer++;
    const spawnRate = Math.max(30, 90 - (60 - timeLeft));

    if (spawnTimer >= spawnRate) {
      spawnTimer = 0;

      let type = 'notification';
      const elapsed = 60 - timeLeft;
      const rand = Math.random();

      if (elapsed > 20 && rand < 0.25) type = 'scroll';
      if (elapsed > 40 && rand < 0.08) type = 'dragon';

      const types = {
        notification: { hp: 40, speed: 1.5, reward: 50, radius: 14, color: '#ec4899', emoji: '🔔' },
        scroll: { hp: 80, speed: 1.0, reward: 80, radius: 18, color: '#06b6d4', emoji: '📜' },
        dragon: { hp: 300, speed: 0.5, reward: 200, radius: 28, color: '#ef4444', emoji: '🐉', boss: true }
      };

      const t = types[type];
      enemies.push({
        x: Math.random() * (canvas.width - 60) + 30,
        y: canvas.height + 40,
        vx: (Math.random() - .5) * 0.5,
        vy: -t.speed,
        hp: t.hp + (elapsed * 2),
        maxHp: t.hp + (elapsed * 2),
        reward: t.reward,
        radius: t.radius,
        color: t.color,
        emoji: t.emoji,
        boss: t.boss || false
      });
    }
  }

  function updateEnemies() {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx;
      e.y += e.vy;

      if (e.x < e.radius || e.x > canvas.width - e.radius) e.vx *= -1;

      ctx.font = e.boss ? '32px sans-serif' : '22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(e.emoji, e.x, e.y);

      const barW = e.boss ? 50 : 30;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(e.x - barW / 2, e.y - e.radius - 10, barW, 5);
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - barW / 2, e.y - e.radius - 10, barW * (e.hp / e.maxHp), 5);

      // Hit vault (at top now)
      if (e.y < 50) {
        vault.hp -= e.boss ? 30 : 15;
        vaultHits++;
        combo = 0;
        score -= 25;
        playSound('vaultHit');
        showFloat(e.x, 60, '-25', 'red');
        showFloat(e.x, 80, '💥 VAULT HIT!', 'red');

        canvas.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
        setTimeout(() => canvas.style.transform = '', 100);

        enemies.splice(i, 1);
        updateVaultHP();
        updateScore();
        continue;
      }
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      p.vx *= 0.95;
      p.vy *= 0.95;

      ctx.globalAlpha = p.life / 25;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - (p.size || 2), p.y - (p.size || 2), (p.size || 2) * 2, (p.size || 2) * 2);
      ctx.globalAlpha = 1;

      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.el.style.left = ft.x + 'px';
      ft.el.style.top = (ft.y - 25) + 'px';
      ft.life--;
      if (ft.life <= 0) {
        ft.el.remove();
        floatingTexts.splice(i, 1);
      }
    }
  }

  function showFloat(x, y, text, color) {
    const el = document.createElement('div');
    el.className = `float-text ${color}`;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    floatingTexts.push({ el, x, y, life: 25 });
  }

  function updateScore() {
    document.getElementById('scoreDisplay').textContent = score;
  }

  function updateBulletDisplay() {
    const display = player.bullets === Infinity ? '∞' : player.bullets;
    document.getElementById('bulletDisplay').textContent = display;

    const btn = document.getElementById('fireBtn');
    if (player.bullets !== Infinity && player.bullets <= 0) {
      btn.classList.add('empty');
    } else {
      btn.classList.remove('empty');
    }
  }

  function updateVaultHP() {
    if (vault.hp <= 0) {
      vault.hp = 0;
      endGame();
    }
  }

  // ========== END GAME ==========
  function endGame() {
    gameRunning = false;
    clearInterval(timerInterval);
    cancelAnimationFrame(gameLoopId);
    stopBGM();
    playSound('gameOver');

    const timeBonus = timeLeft * 3;
    const hpBonus = Math.floor(vault.hp * 3);
    const comboBonus = maxCombo * 15;
    const perfectBonus = vault.hp >= 100 ? 150 : 0;
    const accuracyBonus = bulletsFired > 0 ? Math.floor((kills / bulletsFired) * 100) : 0;

    score += timeBonus + hpBonus + comboBonus + perfectBonus + accuracyBonus;

    document.getElementById('endTitle').textContent = vault.hp > 0 ? 'VAULT SECURED!' : 'VAULT DESTROYED!';
    document.getElementById('finalScore').textContent = score;

    const breakdown = document.getElementById('scoreBreakdown');
    breakdown.innerHTML = `
      <div class="break-item"><span>Kills (${kills})</span><span class="val green">+${kills * 50}</span></div>
      <div class="break-item"><span>Time Bonus</span><span class="val green">+${timeBonus}</span></div>
      <div class="break-item"><span>Vault HP Bonus</span><span class="val green">+${hpBonus}</span></div>
      <div class="break-item"><span>Max Combo (${maxCombo}x)</span><span class="val gold">+${comboBonus}</span></div>
      ${perfectBonus ? `<div class="break-item"><span>Perfect Defense!</span><span class="val gold">+${perfectBonus}</span></div>` : ''}
      <div class="break-item"><span>Accuracy Bonus</span><span class="val green">+${accuracyBonus}</span></div>
      <div class="break-item"><span>Vault Hits</span><span class="val red">-${vaultHits * 25}</span></div>
      <div class="break-item" style="border-top:2px solid var(--orange);margin-top:.5rem;padding-top:.5rem;font-weight:800;">
        <span>FINAL SCORE</span><span class="val gold">${score}</span>
      </div>
    `;

    document.getElementById('gameOver').classList.add('show');
  }

  // ========== SUBMIT ==========
  window.submitScore = async function() {
    if (!currentUser || !entryId || !roundId) {
      location.href = 'game-lobby2.html';
      return;
    }

    const btn = document.querySelector('.game-over-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await updateDoc(doc(db, 'vaultDefenderRounds', roundId, 'entries', entryId), {
        score: score,
        vaultHP: Math.max(0, vault.hp),
        kills: kills,
        maxCombo: maxCombo,
        character: selectedChar,
        bulletsFired: bulletsFired,
        timeLeft: timeLeft,
        completedAt: serverTimestamp()
      });

      location.href = 'game-lobby2.html';

    } catch (err) {
      console.error('Submit error:', err);
      btn.disabled = false;
      btn.textContent = 'Try Again';
    }
  };

  window.addEventListener('resize', resize);
</script>
