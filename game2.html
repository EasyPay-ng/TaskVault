<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>TaskVault – Vault Defender</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --orange-soft: #ffedd5;
      --white: #ffffff;
      --gray-900: #111827;
      --gray-800: #1f2937;
      --gray-700: #374151;
      --gray-600: #4b5563;
      --gray-500: #6b7280;
      --green: #10b981;
      --green-light: #d1fae5;
      --red: #ef4444;
      --red-light: #fee2e2;
      --gold: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(180deg, var(--gray-900) 0%, #0f172a 100%);
      color: var(--white);
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }

    /* HEADER */
    .game-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      padding: .6rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3);
    }
    .game-header .timer {
      font-size: 1.4rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: rgba(0,0,0,0.2);
      padding: .3rem .8rem;
      border-radius: 8px;
    }
    .game-header .score {
      font-size: 1.1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .game-header .vault-hp {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .9rem;
      font-weight: 700;
    }
    .hp-bar {
      width: 80px;
      height: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #34d399);
      border-radius: 4px;
      transition: width .3s ease;
    }
    .hp-fill.danger { background: linear-gradient(90deg, var(--red), #f87171); }
    .hp-fill.warning { background: linear-gradient(90deg, var(--gold), #fbbf24); }

    /* GAME AREA */
    #gameCanvas {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 140px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      cursor: crosshair;
    }

    /* DEFENDER BAR */
    .defender-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, var(--gray-800) 0%, var(--gray-900) 100%);
      border-top: 2px solid var(--orange);
      padding: .75rem;
      display: flex;
      justify-content: center;
      gap: .5rem;
      z-index: 100;
      overflow-x: auto;
    }
    .defender-bar::-webkit-scrollbar { display: none; }

    .defender-btn {
      min-width: 72px;
      padding: .5rem .4rem;
      background: linear-gradient(135deg, var(--gray-700) 0%, var(--gray-800) 100%);
      border: 2px solid var(--gray-600);
      border-radius: var(--radius);
      color: var(--white);
      cursor: pointer;
      transition: all .15s ease;
      text-align: center;
      position: relative;
    }
    .defender-btn:hover { transform: translateY(-2px); border-color: var(--orange); }
    .defender-btn.selected {
      border-color: var(--orange);
      background: rgba(249,115,22,0.15);
      box-shadow: 0 0 15px rgba(249,115,22,0.3);
    }
    .defender-btn.disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    .defender-btn .icon {
      font-size: 1.5rem;
      display: block;
      margin-bottom: .15rem;
    }
    .defender-btn .name {
      font-size: .65rem;
      font-weight: 700;
      display: block;
    }
    .defender-btn .cost {
      font-size: .6rem;
      color: var(--gold);
      font-weight: 600;
    }
    .defender-btn .key {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      background: var(--orange);
      border-radius: 50%;
      font-size: .65rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ENERGY BAR */
    .energy-bar {
      position: fixed;
      bottom: 140px;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--gray-800);
      z-index: 90;
    }
    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), #60a5fa);
      transition: width .3s ease;
    }

    /* FLOATING TEXT */
    .float-text {
      position: absolute;
      font-weight: 800;
      font-size: .9rem;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 200;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .float-text.green { color: var(--green); }
    .float-text.red { color: var(--red); }
    .float-text.gold { color: var(--gold); }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
    }

    /* WAVE NOTIFICATION */
    .wave-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      padding: 1rem 2rem;
      border-radius: var(--radius);
      font-size: 1.5rem;
      font-weight: 900;
      z-index: 300;
      box-shadow: 0 10px 40px rgba(249,115,22,0.4);
      animation: wavePop .6s ease-out forwards;
    }
    @keyframes wavePop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* GAME OVER OVERLAY */
    .game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .game-over.show { opacity: 1; pointer-events: all; }
    .game-over-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: popIn .4s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .game-over-card h2 {
      font-size: 1.75rem;
      font-weight: 900;
      margin-bottom: .5rem;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .final-score {
      font-size: 3rem;
      font-weight: 900;
      color: var(--white);
      margin: 1rem 0;
    }
    .score-breakdown {
      text-align: left;
      background: var(--gray-800);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: .85rem;
    }
    .break-item {
      display: flex;
      justify-content: space-between;
      padding: .35rem 0;
      border-bottom: 1px solid var(--gray-700);
    }
    .break-item:last-child { border-bottom: none; }
    .break-item .val.green { color: var(--green); }
    .break-item .val.red { color: var(--red); }
    .break-item .val.gold { color: var(--gold); }

    .game-over-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 1rem;
    }

    /* START SCREEN */
    .start-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
    }
    .start-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .start-card h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: .5rem;
    }
    .start-card p {
      color: var(--gray-500);
      font-size: .9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .control-item {
      background: var(--gray-800);
      padding: .75rem;
      border-radius: 8px;
      font-size: .8rem;
    }
    .control-item .key {
      display: inline-block;
      background: var(--orange);
      padding: .15rem .5rem;
      border-radius: 4px;
      font-weight: 700;
      margin-bottom: .25rem;
    }
    .start-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* COMBO COUNTER */
    .combo {
      position: fixed;
      top: 70px;
      right: 10px;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--gold);
      z-index: 200;
      opacity: 0;
      transition: opacity .3s;
    }
    .combo.show { opacity: 1; }

    /* PAUSE BUTTON */
    .pause-btn {
      position: fixed;
      top: 65px;
      left: 10px;
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--gray-600);
      border-radius: 8px;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="start-card">
    <div style="font-size:3rem;margin-bottom:1rem;">🛡️</div>
    <h1>Vault Defender</h1>
    <p>Place defenders to stop the distraction enemies! Survive 60 seconds and protect your vault.</p>
    <div class="controls-grid">
      <div class="control-item">
        <div class="key">1</div>
        <div>Freelancer</div>
      </div>
      <div class="control-item">
        <div class="key">2</div>
        <div>Manager</div>
      </div>
      <div class="control-item">
        <div class="key">3</div>
        <div>CEO</div>
      </div>
      <div class="control-item">
        <div class="key">4</div>
        <div>Bot</div>
      </div>
    </div>
    <div style="font-size:.8rem;color:var(--gray-500);margin-bottom:1rem;">
      Click grid to place • Enemies drop from edges<br>
      +50 kill • +100 wave clear • -25 vault hit • -10 miss-place
    </div>
    <button class="start-btn" onclick="startGame()">START DEFENDING</button>
  </div>
</div>

<!-- GAME HEADER -->
<div class="game-header" id="gameHeader" style="display:none;">
  <div class="timer" id="timer">60</div>
  <div class="score">
    <i class="ri-trophy-fill" style="color:var(--gold);"></i>
    <span id="scoreDisplay">0</span>
  </div>
  <div class="vault-hp">
    <i class="ri-heart-fill" style="color:var(--red);"></i>
    <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    <span id="hpText">100</span>
  </div>
</div>

<!-- ENERGY BAR -->
<div class="energy-bar" id="energyBar" style="display:none;">
  <div class="energy-fill" id="energyFill" style="width:100%"></div>
</div>

<!-- PAUSE -->
<button class="pause-btn" id="pauseBtn" style="display:none;" onclick="togglePause()">
  <i class="ri-pause-fill"></i>
</button>

<!-- COMBO -->
<div class="combo" id="comboDisplay"></div>

<!-- CANVAS -->
<canvas id="gameCanvas" style="display:none;"></canvas>

<!-- DEFENDER BAR -->
<div class="defender-bar" id="defenderBar" style="display:none;">
  <button class="defender-btn selected" data-type="freelancer" onclick="selectDefender('freelancer')">
    <span class="key">1</span>
    <span class="icon">👨‍💻</span>
    <span class="name">Freelancer</span>
    <span class="cost">25⚡</span>
  </button>
  <button class="defender-btn" data-type="manager" onclick="selectDefender('manager')">
    <span class="key">2</span>
    <span class="icon">👔</span>
    <span class="name">Manager</span>
    <span class="cost">40⚡</span>
  </button>
  <button class="defender-btn" data-type="ceo" onclick="selectDefender('ceo')">
    <span class="key">3</span>
    <span class="icon">👑</span>
    <span class="name">CEO</span>
    <span class="cost">60⚡</span>
  </button>
  <button class="defender-btn" data-type="bot" onclick="selectDefender('bot')">
    <span class="key">4</span>
    <span class="icon">🤖</span>
    <span class="name">Bot</span>
    <span class="cost">35⚡</span>
  </button>
</div>

<!-- GAME OVER -->
<div class="game-over" id="gameOver">
  <div class="game-over-card">
    <h2 id="endTitle">TIME'S UP!</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <button class="game-over-btn" onclick="submitScore()">SUBMIT SCORE</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, updateDoc, increment, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
    authDomain: "taskvault-412a0.firebaseapp.com",
    projectId: "taskvault-412a0",
    storageBucket: "taskvault-412a0.firebasestorage.app",
    messagingSenderId: "420716701831",
    appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ========== GAME STATE ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let gameRunning = false;
  let gamePaused = false;
  let timeLeft = 60;
  let score = 0;
  let vaultHP = 100;
  let energy = 100;
  let maxEnergy = 100;
  let combo = 0;
  let maxCombo = 0;
  let waveNumber = 0;
  let kills = 0;
  let vaultHits = 0;
  let missPlacements = 0;
  let waveClears = 0;
  let perfectWaves = 0;

  let selectedDefender = 'freelancer';
  let defenders = [];
  let enemies = [];
  let projectiles = [];
  let particles = [];
  let floatingTexts = [];
  let lastSpawn = 0;
  let spawnInterval = 2000;
  let gameLoopId = null;
  let timerInterval = null;

  const GRID_SIZE = 40;
  let COLS, ROWS;
  let vault = { x: 0, y: 0, w: 2, h: 2 };

  const DEFENDER_TYPES = {
    freelancer: { cost: 25, damage: 25, range: 120, fireRate: 800, color: '#3b82f6', emoji: '👨‍💻', name: 'Freelancer' },
    manager: { cost: 40, damage: 15, range: 100, fireRate: 1200, color: '#8b5cf6', emoji: '👔', name: 'Manager', slow: true },
    ceo: { cost: 60, damage: 50, range: 90, fireRate: 1500, color: '#f59e0b', emoji: '👑', name: 'CEO', splash: true },
    bot: { cost: 35, damage: 10, range: 80, fireRate: 2000, color: '#10b981', emoji: '🤖', name: 'Bot', generate: true }
  };

  const ENEMY_TYPES = {
    notification: { hp: 30, speed: 1.5, reward: 15, color: '#ec4899', emoji: '🔔', name: 'Notification' },
    scroll: { hp: 60, speed: 1.0, reward: 25, color: '#06b6d4', emoji: '📜', name: 'Scroll' },
    dragon: { hp: 200, speed: 0.5, reward: 100, color: '#ef4444', emoji: '🐉', name: 'Dragon', boss: true }
  };

  // ========== AUTH ==========
  let currentUser = null;
  let entryId = null;
  let roundId = null;

  onAuthStateChanged(auth, (user) => {
    if (!user) { location.href = 'login.html'; return; }
    currentUser = user;
    entryId = sessionStorage.getItem('vdEntryId');
    roundId = sessionStorage.getItem('vdRoundId');
    if (!entryId || !roundId) {
      location.href = 'vault-defender.html';
    }
  });

  // ========== RESIZE ==========
  function resize() {
    const header = document.getElementById('gameHeader');
    const bar = document.getElementById('defenderBar');
    const top = header.offsetHeight;
    const bottom = bar.offsetHeight || 140;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - top - bottom - 6;
    COLS = Math.floor(canvas.width / GRID_SIZE);
    ROWS = Math.floor(canvas.height / GRID_SIZE);
    vault.x = Math.floor(COLS / 2) - 1;
    vault.y = Math.floor(ROWS / 2) - 1;
  }

  // ========== START ==========
  window.startGame = function() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameHeader').style.display = 'flex';
    document.getElementById('energyBar').style.display = 'block';
    document.getElementById('defenderBar').style.display = 'flex';
    document.getElementById('pauseBtn').style.display = 'flex';
    document.getElementById('gameCanvas').style.display = 'block';

    resize();
    gameRunning = true;
    startTimer();
    gameLoop();
  };

  function startTimer() {
    timerInterval = setInterval(() => {
      if (gamePaused || !gameRunning) return;
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      if (timeLeft <= 10) {
        document.getElementById('timer').style.color = '#ef4444';
      }
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  // ========== DEFENDER SELECTION ==========
  window.selectDefender = function(type) {
    selectedDefender = type;
    document.querySelectorAll('.defender-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.type === type);
    });
  };

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (!gameRunning) return;
    if (e.key === '1') selectDefender('freelancer');
    if (e.key === '2') selectDefender('manager');
    if (e.key === '3') selectDefender('ceo');
    if (e.key === '4') selectDefender('bot');
    if (e.key === ' ') togglePause();
  });

  // ========== PLACEMENT ==========
  canvas.addEventListener('click', (e) => {
    if (!gameRunning || gamePaused) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const col = Math.floor(x / GRID_SIZE);
    const row = Math.floor(y / GRID_SIZE);

    const type = DEFENDER_TYPES[selectedDefender];

    // Check bounds
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

    // Check vault overlap
    if (col >= vault.x && col < vault.x + vault.w && row >= vault.y && row < vault.y + vault.h) {
      showFloat(x, y, 'Blocked!', 'red');
      return;
    }

    // Check existing defender
    if (defenders.find(d => d.col === col && d.row === row)) {
      showFloat(x, y, 'Occupied!', 'red');
      return;
    }

    // Check energy
    if (energy < type.cost) {
      showFloat(x, y, 'No energy!', 'red');
      return;
    }

    // Place defender
    energy -= type.cost;
    defenders.push({
      col, row,
      type: selectedDefender,
      lastFire: 0,
      id: Date.now()
    });

    // Particles
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: col * GRID_SIZE + GRID_SIZE / 2,
        y: row * GRID_SIZE + GRID_SIZE / 2,
        vx: (Math.random() - .5) * 4,
        vy: (Math.random() - .5) * 4,
        life: 30,
        color: type.color
      });
    }

    updateEnergy();
    showFloat(x, y, `-${type.cost}⚡`, 'red');
  });

  // ========== SPAWNING ==========
  function spawnEnemy() {
    const now = Date.now();
    if (now - lastSpawn < spawnInterval) return;
    lastSpawn = now;

    // Increase difficulty over time
    const elapsed = 60 - timeLeft;
    spawnInterval = Math.max(400, 2000 - elapsed * 25);

    // Determine enemy type
    let type = 'notification';
    const rand = Math.random();
    if (elapsed > 30 && rand < 0.3) type = 'scroll';
    if (elapsed > 45 && rand < 0.1) type = 'dragon';

    const enemyType = ENEMY_TYPES[type];
    const side = Math.floor(Math.random() * 4);
    let x, y, vx, vy;

    switch(side) {
      case 0: x = Math.random() * canvas.width; y = -30; vx = 0; vy = enemyType.speed; break;
      case 1: x = canvas.width + 30; y = Math.random() * canvas.height; vx = -enemyType.speed; vy = 0; break;
      case 2: x = Math.random() * canvas.width; y = canvas.height + 30; vx = 0; vy = -enemyType.speed; break;
      case 3: x = -30; y = Math.random() * canvas.height; vx = enemyType.speed; vy = 0; break;
    }

    enemies.push({
      x, y, vx, vy,
      type,
      hp: enemyType.hp + (elapsed * 0.5),
      maxHp: enemyType.hp + (elapsed * 0.5),
      reward: enemyType.reward,
      slowTimer: 0,
      id: Date.now()
    });
  }

  // ========== GAME LOOP ==========
  function gameLoop() {
    if (!gameRunning) return;
    gameLoopId = requestAnimationFrame(gameLoop);
    if (gamePaused) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawVault();
    updateDefenders();
    updateEnemies();
    updateProjectiles();
    updateParticles();
    updateFloatingTexts();
    spawnEnemy();

    // Bot energy generation
    defenders.filter(d => d.type === 'bot').forEach(bot => {
      if (Date.now() - (bot.lastGenerate || 0) > 2000) {
        energy = Math.min(maxEnergy, energy + 5);
        bot.lastGenerate = Date.now();
        updateEnergy();
      }
    });
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * GRID_SIZE, 0);
      ctx.lineTo(c * GRID_SIZE, canvas.height);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * GRID_SIZE);
      ctx.lineTo(canvas.width, r * GRID_SIZE);
      ctx.stroke();
    }
  }

  function drawVault() {
    const x = vault.x * GRID_SIZE;
    const y = vault.y * GRID_SIZE;
    const w = vault.w * GRID_SIZE;
    const h = vault.h * GRID_SIZE;

    // Glow
    ctx.shadowColor = 'rgba(249,115,22,0.5)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(249,115,22,0.2)';
    ctx.fillRect(x - 4, y - 4, w + 8, h + 8);
    ctx.shadowBlur = 0;

    // Vault body
    ctx.fillStyle = '#f97316';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#ea580c';
    ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

    // Lock icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Inter';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔒', x + w / 2, y + h / 2);
  }

  function updateDefenders() {
    const now = Date.now();

    defenders.forEach(d => {
      const type = DEFENDER_TYPES[d.type];
      const cx = d.col * GRID_SIZE + GRID_SIZE / 2;
      const cy = d.row * GRID_SIZE + GRID_SIZE / 2;

      // Draw defender
      ctx.fillStyle = type.color;
      ctx.beginPath();
      ctx.arc(cx, cy, 14, 0, Math.PI * 2);
      ctx.fill();

      // Emoji
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(type.emoji, cx, cy);

      // Range indicator on hover (simplified)
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.arc(cx, cy, type.range, 0, Math.PI * 2);
      ctx.stroke();

      // Find target
      let target = null;
      let minDist = Infinity;

      enemies.forEach(e => {
        const dist = Math.hypot(e.x - cx, e.y - cy);
        if (dist < type.range && dist < minDist) {
          minDist = dist;
          target = e;
        }
      });

      // Fire
      if (target && now - d.lastFire > type.fireRate) {
        d.lastFire = now;
        projectiles.push({
          x: cx, y: cy,
          target: target,
          damage: type.damage,
          speed: 6,
          type: d.type,
          splash: type.splash,
          slow: type.slow
        });
      }
    });
  }

  function updateEnemies() {
    const vaultCX = (vault.x + vault.w / 2) * GRID_SIZE;
    const vaultCY = (vault.y + vault.h / 2) * GRID_SIZE;

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const type = ENEMY_TYPES[e.type];

      // Apply slow
      let speedMult = e.slowTimer > 0 ? 0.5 : 1;
      if (e.slowTimer > 0) e.slowTimer--;

      // Move toward vault
      const dx = vaultCX - e.x;
      const dy = vaultCY - e.y;
      const dist = Math.hypot(dx, dy);

      if (dist > 5) {
        e.x += (dx / dist) * type.speed * speedMult;
        e.y += (dy / dist) * type.speed * speedMult;
      } else {
        // Hit vault
        vaultHP -= type.boss ? 20 : 10;
        vaultHits++;
        combo = 0;
        score -= 25;
        showFloat(e.x, e.y, '-25', 'red');
        showFloat(e.x, e.y - 20, '💥', 'red');
        enemies.splice(i, 1);
        updateHP();
        continue;
      }

      // Draw enemy
      ctx.font = type.boss ? '28px sans-serif' : '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(type.emoji, e.x, e.y);

      // HP bar
      const barW = type.boss ? 40 : 24;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(e.x - barW / 2, e.y - 18, barW, 4);
      ctx.fillStyle = type.color;
      ctx.fillRect(e.x - barW / 2, e.y - 18, barW * (e.hp / e.maxHp), 4);

      // Slow effect
      if (e.slowTimer > 0) {
        ctx.strokeStyle = '#8b5cf6';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 16, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  function updateProjectiles() {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];

      if (!enemies.includes(p.target)) {
        projectiles.splice(i, 1);
        continue;
      }

      const dx = p.target.x - p.x;
      const dy = p.target.y - p.y;
      const dist = Math.hypot(dx, dy);

      if (dist < 10) {
        // Hit
        if (p.slow) p.target.slowTimer = 120;
        if (p.splash) {
          enemies.forEach(e => {
            if (Math.hypot(e.x - p.target.x, e.y - p.target.y) < 60) {
              e.hp -= p.damage * 0.6;
            }
          });
        }

        p.target.hp -= p.damage;

        if (p.target.hp <= 0) {
          const idx = enemies.indexOf(p.target);
          if (idx > -1) {
            const enemy = enemies[idx];
            const reward = enemy.reward;
            kills++;
            combo++;
            if (combo > maxCombo) maxCombo = combo;

            const comboMult = Math.min(combo, 10);
            const points = reward + (comboMult * 5);
            score += points;

            showFloat(enemy.x, enemy.y, `+${points}`, 'green');
            if (combo >= 3) {
              showFloat(enemy.x, enemy.y - 25, `${combo}x COMBO!`, 'gold');
              document.getElementById('comboDisplay').textContent = `${combo}x COMBO`;
              document.getElementById('comboDisplay').classList.add('show');
              setTimeout(() => document.getElementById('comboDisplay').classList.remove('show'), 1000);
            }

            // Particles
            for (let j = 0; j < 10; j++) {
              particles.push({
                x: enemy.x, y: enemy.y,
                vx: (Math.random() - .5) * 6,
                vy: (Math.random() - .5) * 6,
                life: 25,
                color: ENEMY_TYPES[enemy.type].color
              });
            }

            enemies.splice(idx, 1);
          }
        }

        projectiles.splice(i, 1);
        continue;
      }

      p.x += (dx / dist) * p.speed;
      p.y += (dy / dist) * p.speed;

      // Draw projectile
      ctx.fillStyle = DEFENDER_TYPES[p.type].color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      p.vx *= 0.98;
      p.vy *= 0.98;

      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      ctx.globalAlpha = 1;

      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function updateFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.el.style.left = ft.x + 'px';
      ft.el.style.top = (ft.y - 30) + 'px';
      ft.life--;
      if (ft.life <= 0) {
        ft.el.remove();
        floatingTexts.splice(i, 1);
      }
    }
  }

  function showFloat(x, y, text, color) {
    const el = document.createElement('div');
    el.className = `float-text ${color}`;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    floatingTexts.push({ el, x, y, life: 30 });
  }

  function updateHP() {
    const pct = Math.max(0, vaultHP);
    document.getElementById('hpFill').style.width = pct + '%';
    document.getElementById('hpText').textContent = Math.ceil(pct);
    document.getElementById('scoreDisplay').textContent = score;

    const fill = document.getElementById('hpFill');
    fill.classList.remove('danger', 'warning');
    if (pct <= 25) fill.classList.add('danger');
    else if (pct <= 50) fill.classList.add('warning');

    if (vaultHP <= 0) {
      endGame();
    }
  }

  function updateEnergy() {
    document.getElementById('energyFill').style.width = (energy / maxEnergy * 100) + '%';
  }

  // ========== END GAME ==========
  function endGame() {
    gameRunning = false;
    clearInterval(timerInterval);
    cancelAnimationFrame(gameLoopId);

    const timeBonus = timeLeft * 2;
    const hpBonus = Math.floor(vaultHP * 2);
    const comboBonus = maxCombo * 10;
    const perfectBonus = vaultHP >= 100 ? 100 : 0;

    score += timeBonus + hpBonus + comboBonus + perfectBonus;

    document.getElementById('endTitle').textContent = vaultHP > 0 ? 'VAULT SECURED!' : 'VAULT BREACHED!';
    document.getElementById('finalScore').textContent = score;

    const breakdown = document.getElementById('scoreBreakdown');
    breakdown.innerHTML = `
      <div class="break-item"><span>Kills (${kills})</span><span class="val green">+${kills * 50}</span></div>
      <div class="break-item"><span>Time Bonus</span><span class="val green">+${timeBonus}</span></div>
      <div class="break-item"><span>HP Bonus</span><span class="val green">+${hpBonus}</span></div>
      <div class="break-item"><span>Max Combo (${maxCombo}x)</span><span class="val gold">+${comboBonus}</span></div>
      ${perfectBonus ? `<div class="break-item"><span>Perfect Defense!</span><span class="val gold">+${perfectBonus}</span></div>` : ''}
      <div class="break-item"><span>Vault Hits</span><span class="val red">-${vaultHits * 25}</span></div>
      <div class="break-item" style="border-top:2px solid var(--orange);margin-top:.5rem;padding-top:.5rem;font-weight:800;">
        <span>FINAL SCORE</span><span class="val gold">${score}</span>
      </div>
    `;

    document.getElementById('gameOver').classList.add('show');
  }

  window.togglePause = function() {
    gamePaused = !gamePaused;
    document.getElementById('pauseBtn').innerHTML = gamePaused
      ? '<i class="ri-play-fill"></i>'
      : '<i class="ri-pause-fill"></i>';
  };

  // ========== SUBMIT ==========
  window.submitScore = async function() {
    if (!currentUser || !entryId || !roundId) {
      location.href = 'vault-defender.html';
      return;
    }

    const btn = document.querySelector('.game-over-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await updateDoc(doc(db, 'vaultDefenderRounds', roundId, 'entries', entryId), {
        score: score,
        vaultHP: Math.max(0, vaultHP),
        kills: kills,
        maxCombo: maxCombo,
        timeLeft: timeLeft,
        completedAt: serverTimestamp()
      });

      location.href = 'vault-defender.html';
    } catch (err) {
      console.error('Submit error:', err);
      btn.disabled = false;
      btn.textContent = 'Try Again';
    }
  };

  window.addEventListener('resize', resize);
</script>
