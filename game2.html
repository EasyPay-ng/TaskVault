<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1.0"/>
  <title>TaskVault – Vault Defender 3D</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --white: #ffffff;
      --gray-900: #111827;
      --gray-800: #1f2937;
      --gray-700: #374151;
      --gray-600: #4b5563;
      --gray-500: #6b7280;
      --green: #10b981;
      --red: #ef4444;
      --gold: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0f172a;
      color: var(--white);
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    /* 3D CANVAS CONTAINER */
    #canvas-container {
      position: fixed;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 160px;
      z-index: 1;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* HEADER */
    .game-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      padding: .5rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3);
      height: 50px;
    }
    .game-header .timer {
      font-size: 1.3rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      background: rgba(0,0,0,0.2);
      padding: .2rem .6rem;
      border-radius: 6px;
      min-width: 50px;
      text-align: center;
    }
    .game-header .score {
      font-size: 1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .game-header .bullets {
      font-size: .9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .3rem;
    }

    /* JOYSTICK */
    .joystick-zone {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 160px;
      height: 160px;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .joystick-base {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      position: relative;
    }
    .joystick-knob {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
      transition: transform .05s;
    }
    .joystick-knob::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }

    /* FIRE BUTTON */
    .fire-btn {
      position: fixed;
      bottom: 40px;
      right: 30px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #dc2626);
      border: 3px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 1.5rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(239,68,68,0.4);
      transition: transform .1s, box-shadow .1s;
    }
    .fire-btn:active {
      transform: scale(0.92);
      box-shadow: 0 2px 12px rgba(239,68,68,0.3);
    }
    .fire-btn.empty {
      background: var(--gray-700);
      box-shadow: none;
    }

    /* CHARACTER BAR */
    .char-bar {
      position: fixed;
      bottom: 0;
      left: 160px;
      right: 0;
      height: 60px;
      background: linear-gradient(180deg, var(--gray-800) 0%, var(--gray-900) 100%);
      border-top: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: 0 1rem;
      z-index: 100;
    }
    .char-btn {
      padding: .4rem .8rem;
      background: linear-gradient(135deg, var(--gray-700) 0%, var(--gray-800) 100%);
      border: 2px solid var(--gray-600);
      border-radius: 8px;
      color: var(--white);
      cursor: pointer;
      font-size: .75rem;
      font-weight: 700;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: .4rem;
      white-space: nowrap;
    }
    .char-btn:hover { border-color: var(--orange); }
    .char-btn.selected {
      border-color: var(--orange);
      background: rgba(249,115,22,0.15);
      box-shadow: 0 0 12px rgba(249,115,22,0.2);
    }
    .char-btn .emoji { font-size: 1.1rem; }

    /* FLOATING TEXT */
    .float-text {
      position: absolute;
      font-weight: 800;
      font-size: .85rem;
      pointer-events: none;
      animation: floatUp .8s ease-out forwards;
      z-index: 300;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .float-text.green { color: var(--green); }
    .float-text.red { color: var(--red); }
    .float-text.gold { color: var(--gold); }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-35px) scale(1.1); }
    }

    /* START SCREEN */
    .start-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
    }
    .start-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .start-card h1 {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: .5rem;
    }
    .start-card p {
      color: var(--gray-500);
      font-size: .85rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .char-select {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .5rem;
      margin-bottom: 1.5rem;
    }
    .char-option {
      padding: 1rem;
      background: var(--gray-800);
      border: 2px solid var(--gray-700);
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .char-option:hover { border-color: var(--orange); }
    .char-option.selected {
      border-color: var(--orange);
      background: rgba(249,115,22,0.1);
    }
    .char-option .emoji { font-size: 2rem; display: block; margin-bottom: .3rem; }
    .char-option .name { font-size: .8rem; font-weight: 700; }
    .char-option .bullets { font-size: .7rem; color: var(--gray-500); margin-top: .2rem; }
    .start-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* GAME OVER */
    .game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .game-over.show { opacity: 1; pointer-events: all; }
    .game-over-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 2px solid var(--orange);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: popIn .4s ease-out;
    }
    @keyframes popIn {
      0% { transform: scale(.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .game-over-card h2 {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: .5rem;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .final-score {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--white);
      margin: .5rem 0;
    }
    .score-breakdown {
      text-align: left;
      background: var(--gray-800);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: .8rem;
    }
    .break-item {
      display: flex;
      justify-content: space-between;
      padding: .3rem 0;
      border-bottom: 1px solid var(--gray-700);
    }
    .break-item:last-child { border-bottom: none; }
    .break-item .val.green { color: var(--green); }
    .break-item .val.red { color: var(--red); }
    .break-item .val.gold { color: var(--gold); }
    .game-over-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: .5rem;
    }

    /* SOUND TOGGLE */
    .sound-toggle {
      position: fixed;
      top: 60px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--gray-600);
      border-radius: 8px;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      font-size: 1.1rem;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="start-card">
    <div style="font-size:2.5rem;margin-bottom:.5rem;">🛡️</div>
    <h1>Choose Your Defender</h1>
    <p>3D Action! Move left/right to aim, fire to shoot. Protect the vault below!</p>
    <div class="char-select" id="charSelect">
      <div class="char-option selected" data-char="freelancer" onclick="selectChar('freelancer')">
        <span class="emoji">👨‍💻</span>
        <span class="name">Freelancer</span>
        <span class="bullets">∞ Bullets</span>
      </div>
      <div class="char-option" data-char="manager" onclick="selectChar('manager')">
        <span class="emoji">👔</span>
        <span class="name">Manager</span>
        <span class="bullets">150 Bullets</span>
      </div>
      <div class="char-option" data-char="ceo" onclick="selectChar('ceo')">
        <span class="emoji">👑</span>
        <span class="name">CEO</span>
        <span class="bullets">80 Bullets</span>
      </div>
      <div class="char-option" data-char="bot" onclick="selectChar('bot')">
        <span class="emoji">🤖</span>
        <span class="name">Bot</span>
        <span class="bullets">200 Bullets</span>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">START DEFENDING</button>
  </div>
</div>

<!-- GAME HEADER -->
<div class="game-header" id="gameHeader" style="display:none;">
  <div class="timer" id="timer">60</div>
  <div class="score">
    <i class="ri-trophy-fill" style="color:var(--gold);"></i>
    <span id="scoreDisplay">0</span>
  </div>
  <div class="bullets">
    <i class="ri-fire-fill" style="color:var(--red);"></i>
    <span id="bulletDisplay">∞</span>
  </div>
</div>

<!-- SOUND TOGGLE -->
<button class="sound-toggle" id="soundToggle" style="display:none;" onclick="toggleSound()">
  <i class="ri-volume-up-fill" id="soundIcon"></i>
</button>

<!-- 3D CANVAS -->
<div id="canvas-container" style="display:none;">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- JOYSTICK -->
<div class="joystick-zone" id="joystickZone" style="display:none;">
  <div class="joystick-base" id="joystickBase">
    <div class="joystick-knob" id="joystickKnob"></div>
  </div>
</div>

<!-- FIRE BUTTON -->
<button class="fire-btn" id="fireBtn" style="display:none;">
  <i class="ri-fire-fill"></i>
</button>

<!-- CHARACTER BAR -->
<div class="char-bar" id="charBar" style="display:none;">
  <button class="char-btn selected" data-char="freelancer" onclick="switchChar('freelancer')">
    <span class="emoji">👨‍💻</span> Freelancer
  </button>
  <button class="char-btn" data-char="manager" onclick="switchChar('manager')">
    <span class="emoji">👔</span> Manager
  </button>
  <button class="char-btn" data-char="ceo" onclick="switchChar('ceo')">
    <span class="emoji">👑</span> CEO
  </button>
  <button class="char-btn" data-char="bot" onclick="switchChar('bot')">
    <span class="emoji">🤖</span> Bot
  </button>
</div>

<!-- GAME OVER -->
<div class="game-over" id="gameOver">
  <div class="game-over-card">
    <h2 id="endTitle">TIME'S UP!</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <button class="game-over-btn" onclick="submitScore()">SUBMIT SCORE</button>
  </div>
</div>

<!-- THREE.JS IMPORT MAP -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
  import {
    getFirestore, doc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
    authDomain: "taskvault-412a0.firebaseapp.com",
    projectId: "taskvault-412a0",
    storageBucket: "taskvault-412a0.firebasestorage.app",
    messagingSenderId: "420716701831",
    appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ========== AUDIO SYSTEM ==========
  let audioCtx = null;
  let soundEnabled = true;

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playSound(type) {
    if (!soundEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    switch(type) {
      case 'shoot':
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        break;
      case 'hit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        break;
      case 'kill':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        break;
      case 'vaultHit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        break;
      case 'empty':
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        break;
      case 'gameOver':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.start(); osc.stop(audioCtx.currentTime + 1);
        break;
    }
  }

  window.toggleSound = function() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundIcon').className = soundEnabled ? 'ri-volume-up-fill' : 'ri-volume-mute-fill';
    if (soundEnabled) initAudio();
  };

  // ========== CHARACTERS ==========
  const CHARACTERS = {
    freelancer: { name: 'Freelancer', bullets: Infinity, fireRate: 150, damage: 25, speed: 5, color: 0x3b82f6, bulletSpeed: 12 },
    manager: { name: 'Manager', bullets: 150, fireRate: 200, damage: 35, speed: 4, color: 0x8b5cf6, bulletSpeed: 10, spread: true },
    ceo: { name: 'CEO', bullets: 80, fireRate: 300, damage: 80, speed: 3, color: 0xf59e0b, bulletSpeed: 9, splash: true },
    bot: { name: 'Bot', bullets: 200, fireRate: 100, damage: 15, speed: 4.5, color: 0x10b981, bulletSpeed: 13, rapid: true }
  };

  // ========== THREE.JS SETUP ==========
  const canvas = document.getElementById('gameCanvas');
  const container = document.getElementById('canvas-container');
  
  let scene, camera, renderer;
  let playerMesh, vaultMesh, vaultGroup;
  let bullets3D = [], enemies3D = [], particles3D = [];
  let gameRunning = false;
  let timeLeft = 60;
  let score = 0;
  let selectedChar = 'freelancer';
  let player = null;
  let bullets = [];
  let enemies = [];
  let particles = [];
  let floatingTexts = [];
  let vault = { hp: 100, maxHp: 100 };
  let kills = 0, combo = 0, maxCombo = 0, vaultHits = 0, bulletsFired = 0;
  let lastFire = 0, spawnTimer = 0;
  let gameLoopId = null, timerInterval = null;
  let joystick = { active: false, dx: 0 };
  let firePressed = false;
  const JOYSTICK_SENSITIVITY = 0.25;
  const PLAYER_Z = 8;
  const VAULT_Z = 2;
  const ENEMY_SPAWN_Z = -15;
  const GROUND_Y = -2;
  const PLAY_AREA_WIDTH = 16;

  // Auth
  let currentUser = null;
  let entryId = sessionStorage.getItem('vdEntryId');
  let roundId = sessionStorage.getItem('vdRoundId');

  onAuthStateChanged(auth, (user) => {
    if (!user) { location.href = 'login.html'; return; }
    currentUser = user;
    if (!entryId || !roundId) location.href = 'game-lobby2.html';
  });

  // ========== 3D SCENE INIT ==========
  function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 10, 40);

    const w = container.clientWidth;
    const h = container.clientHeight;

    camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    const orangeLight = new THREE.PointLight(0xf97316, 2, 20);
    orangeLight.position.set(0, 3, VAULT_Z);
    scene.add(orangeLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ 
      color: 0x1e293b, 
      roughness: 0.8,
      metalness: 0.2
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = GROUND_Y;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid helper
    const gridHelper = new THREE.GridHelper(40, 40, 0x374151, 0x1e293b);
    gridHelper.position.y = GROUND_Y + 0.01;
    scene.add(gridHelper);

    // Vault (3D structure near bottom of screen = closer to camera in Z)
    createVault3D();

    resize3D();
    window.addEventListener('resize', resize3D);
  }

  function createVault3D() {

  function createEnemy3D(type, x, z) {
    const group = new THREE.Group();
    group.position.set(x, GROUND_Y + 0.5, z);

    const types = {
      notification: { hp: 40, speed: 2.5, reward: 50, color: 0xec4899, scale: 1 },
      scroll: { hp: 80, speed: 1.8, reward: 80, color: 0x06b6d4, scale: 1.3 },
      dragon: { hp: 300, speed: 1.0, reward: 200, color: 0xef4444, scale: 2, boss: true }
    };

    const t = types[type];
    const elapsed = 60 - timeLeft;
    const hp = t.hp + (elapsed * 2);

    // Enemy body
    let bodyGeo;
    if (type === 'dragon') {
      bodyGeo = new THREE.ConeGeometry(0.8 * t.scale, 2 * t.scale, 6);
    } else if (type === 'scroll') {
      bodyGeo = new THREE.CylinderGeometry(0.5 * t.scale, 0.5 * t.scale, 1.5 * t.scale, 8);
    } else {
      bodyGeo = new THREE.BoxGeometry(0.8 * t.scale, 1 * t.scale, 0.8 * t.scale);
    }

    const bodyMat = new THREE.MeshStandardMaterial({ 
      color: t.color, 
      roughness: 0.6,
      emissive: t.color,
      emissiveIntensity: 0.2
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.5 * t.scale;
    body.castShadow = true;
    group.add(body);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.2, 0.8 * t.scale, 0.4 * t.scale);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.2, 0.8 * t.scale, 0.4 * t.scale);
    group.add(rightEye);

    // HP bar
    const hpBgGeo = new THREE.PlaneGeometry(1.5 * t.scale, 0.15);
    const hpBgMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const hpBg = new THREE.Mesh(hpBgGeo, hpBgMat);
    hpBg.position.set(0, 1.5 * t.scale, 0);
    group.add(hpBg);

    const hpFillGeo = new THREE.PlaneGeometry(1.5 * t.scale, 0.15);
    const hpFillMat = new THREE.MeshBasicMaterial({ color: t.color });
    const hpFill = new THREE.Mesh(hpFillGeo, hpFillMat);
    hpFill.position.set(0, 1.5 * t.scale, 0.01);
    hpFill.name = 'hpBar';
    group.add(hpFill);

    scene.add(group);

    return {
      mesh: group,
      x: x, y: GROUND_Y + 0.5, z: z,
      vx: (Math.random() - 0.5) * 0.5,
      vy: 0,
      vz: t.speed * 0.3,
      hp: hp, maxHp: hp,
      reward: t.reward,
      radius: 0.6 * t.scale,
      color: t.color,
      boss: t.boss || false,
      type: type
    };
  }

  function createBullet3D(x, y, z, vx, vy, vz, color) {
    const geo = new THREE.SphereGeometry(0.15, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);

    // Trail
    const trailGeo = new THREE.CylinderGeometry(0.05, 0.02, 0.5, 6);
    const trailMat = new THREE.MeshBasicMaterial({ 
      color: color, 
      transparent: true, 
      opacity: 0.6 
    });
    const trail = new THREE.Mesh(trailGeo, trailMat);
    trail.rotation.x = Math.PI / 2;
    trail.position.set(x, y, z + 0.3);
    scene.add(trail);

    return { mesh, trail, x, y, z, vx, vy, vz, life: 60 };
  }

      const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);

      scene.add(mesh);

      particles3D.push({
        mesh: mesh,
        vx: (Math.random() - 0.5) * 6,
        vy: Math.random() * 4 + 1,
        vz: (Math.random() - 0.5) * 6,
        life: 30,
        gravity: -0.15

  }

  function createMuzzleFlash3D(x, y, z) {

  function resize3D() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }

  // ========== CHARACTER SELECTION ==========
  window.selectChar = function(char) {
    selectedChar = char;
    document.querySelectorAll('.char-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.char === char);
    });
  };

  window.switchChar = function(char) {
    if (!gameRunning) return;
    selectedChar = char;
    const charData = CHARACTERS[char];
    player.bullets = charData.bullets === Infinity ? Infinity : charData.bullets;
    player.fireRate = charData.fireRate;
    player.damage = charData.damage;
    player.speed = charData.speed;
    player.color = charData.color;
    player.bulletSpeed = charData.bulletSpeed;
    player.spread = charData.spread || false;
    player.splash = charData.splash || false;
    player.rapid = charData.rapid || false;

    if (playerMesh) {
      const body = playerMesh.children[0];
      if (body) body.material.color.setHex(charData.color);
    }

    document.querySelectorAll('.char-btn').forEach(el => {
      el.classList.toggle('selected', el.dataset.char === char);
    });
    updateBulletDisplay();
  };

  // ========== START GAME ==========
  window.startGame = function() {
    initAudio();

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('gameHeader').style.display = 'flex';
    document.getElementById('canvas-container').style.display = 'block';
    document.getElementById('joystickZone').style.display = 'flex';
    document.getElementById('fireBtn').style.display = 'flex';
    document.getElementById('charBar').style.display = 'flex';
    document.getElementById('soundToggle').style.display = 'flex';

    init3D();

    const charData = CHARACTERS[selectedChar];
    player = {
      x: 0, y: GROUND_Y + 1, z: PLAYER_Z,
      bullets: charData.bullets === Infinity ? Infinity : charData.bullets,
      maxBullets: charData.bullets,
      fireRate: charData.fireRate,
      damage: charData.damage,
      speed: charData.speed,
      color: charData.color,
      bulletSpeed: charData.bulletSpeed,
      spread: charData.spread || false,
      splash: charData.splash || false,
      rapid: charData.rapid || false
    };

    playerMesh = createPlayer3D(charData);

    gameRunning = true;
    startTimer();
    setupJoystick();
    setupFireButton();
    gameLoop();
  };

  function startTimer() {
    timerInterval = setInterval(() => {
      if (!gameRunning) return;
      timeLeft--;
      document.getElementById('timer').textContent = timeLeft;
      if (timeLeft <= 10) document.getElementById('timer').style.color = '#ef4444';
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  // ========== JOYSTICK ==========
  function setupJoystick() {
    const zone = document.getElementById('joystickZone');
    const base = document.getElementById('joystickBase');
    const knob = document.getElementById('joystickKnob');
    let startX = 0;

    function handleStart(e) {
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      const rect = base.getBoundingClientRect();
      startX = rect.left + rect.width / 2;
      joystick.active = true;
    }

    function handleMove(e) {
      if (!joystick.active) return;
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      const dx = touch.clientX - startX;
      const maxDist = 35;
      const clampedDx = Math.max(-maxDist, Math.min(maxDist, dx));
      joystick.dx = (clampedDx / maxDist) * JOYSTICK_SENSITIVITY;
      knob.style.transform = `translate(calc(-50% + ${clampedDx}px), -50%)`;
    }

    function handleEnd(e) {
      e.preventDefault();
      joystick.active = false;
      joystick.dx = 0;
      knob.style.transform = 'translate(-50%, -50%)';
    }

    zone.addEventListener('touchstart', handleStart, { passive: false });
    zone.addEventListener('touchmove', handleMove, { passive: false });
    zone.addEventListener('touchend', handleEnd, { passive: false });
    zone.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
  }

  // ========== FIRE BUTTON ==========
  function setupFireButton() {
    const btn = document.getElementById('fireBtn');
    function startFire(e) { e.preventDefault(); firePressed = true; }
    function stopFire(e) { e.preventDefault(); firePressed = false; }
    btn.addEventListener('touchstart', startFire, { passive: false });
    btn.addEventListener('touchend', stopFire, { passive: false });
    btn.addEventListener('mousedown', startFire);
    btn.addEventListener('mouseup', stopFire);
  }

  // ========== GAME LOOP ==========
  function gameLoop() {
    if (!gameRunning) return;
    gameLoopId = requestAnimationFrame(gameLoop);

    updatePlayer3D();
    updateBullets3D();
    updateEnemies3D();
    updateParticles3D();
    updateVault3D();
    spawnEnemies();

    if (firePressed) tryFire();

    renderer.render(scene, camera);
  }

  function updatePlayer3D() {
    if (!player || !playerMesh) return;

    player.x += joystick.dx * player.speed * 0.3;
    player.x = Math.max(-PLAY_AREA_WIDTH / 2, Math.min(PLAY_AREA_WIDTH / 2, player.x));

    playerMesh.position.x = player.x;
    playerMesh.position.z = PLAYER_Z;

    // Bobbing animation
    playerMesh.position.y = player.y + Math.sin(Date.now() * 0.005) * 0.05;

    // Gun sway
    const gun = playerMesh.children[2];
    if (gun) {
      gun.rotation.y = Math.sin(Date.now() * 0.003) * 0.1;
    }
  }

  function tryFire() {
    const now = Date.now();
    if (now - lastFire < player.fireRate) return;
    if (player.bullets !== Infinity && player.bullets <= 0) {
      showFloat(window.innerWidth / 2, window.innerHeight / 2, 'EMPTY!', 'red');
      playSound('empty');
      return;
    }

    lastFire = now;
    if (player.bullets !== Infinity) player.bullets--;
    bulletsFired++;
    updateBulletDisplay();
    playSound('shoot');

    const muzzle = playerMesh.children.find(c => c.name === 'muzzle');
    const mx = player.x + 0.6;
    const my = player.y + 1.2;
    const mz = PLAYER_Z + 1.2;

    createMuzzleFlash3D(mx, my, mz);

    if (player.spread) {
      for (let i = -1; i <= 1; i++) {
        bullets3D.push(createBullet3D(
          mx, my, mz,
          i * 1.5, 0, -player.bulletSpeed * 0.3,
          player.color
        ));
      }
    } else if (player.rapid) {
      bullets3D.push(createBullet3D(mx - 0.2, my, mz, 0, 0, -player.bulletSpeed * 0.3, player.color));
      bullets3D.push(createBullet3D(mx + 0.2, my, mz, 0, 0, -player.bulletSpeed * 0.3, player.color));
    } else {
      bullets3D.push(createBullet3D(mx, my, mz, 0, 0, -player.bulletSpeed * 0.3, player.color));
    }
  }

  function updateBullets3D() {
    for (let i = bullets3D.length - 1; i >= 0; i--) {
      const b = bullets3D[i];
      b.x += b.vx * 0.3;
      b.y += b.vy * 0.3;
      b.z += b.vz * 0.3;
      b.life--;

      b.mesh.position.set(b.x, b.y, b.z);
      b.trail.position.set(b.x, b.y, b.z + 0.3);
      b.trail.lookAt(b.x, b.y, b.z);

      if (b.z < -20 || b.life <= 0) {
        scene.remove(b.mesh);
        scene.remove(b.trail);
        bullets3D.splice(i, 1);
        continue;
      }

      // Check collision with enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dist = Math.hypot(b.x - e.x, b.y - e.y, b.z - e.z);
        if (dist < e.radius + 0.3) {
          e.hp -= player.damage;
          playSound('hit');

          // Splash damage
          if (player.splash) {
            enemies.forEach(ne => {
              if (ne !== e && Math.hypot(ne.x - e.x, ne.y - e.y, ne.z - e.z) < 4) {
                ne.hp -= player.damage * 0.5;
              }
            });
            createExplosion3D(e.x, e.y, e.z, 0xf59e0b, 20);
          }

          if (e.hp <= 0) {
            killEnemy(e, j);
          } else {
            const hpBar = e.mesh.children.find(c => c.name === 'hpBar');
            if (hpBar) {
              hpBar.scale.x = Math.max(0.01, e.hp / e.maxHp);
            }
            showFloat(
              (e.x / PLAY_AREA_WIDTH + 0.5) * window.innerWidth,
              window.innerHeight * 0.3,
              `-${player.damage}`, 'red'
            );
          }

          scene.remove(b.mesh);
          scene.remove(b.trail);
          bullets3D.splice(i, 1);
          break;
        }
      }
    }
  }

  function killEnemy(enemy, index) {
    const reward = enemy.reward;
    kills++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    const comboMult = Math.min(combo, 10);
    const points = reward + (comboMult * 5);
    score += points;

    playSound('kill');
    createExplosion3D(enemy.x, enemy.y, enemy.z, enemy.color, 25);
    showFloat(
      (enemy.x / PLAY_AREA_WIDTH + 0.5) * window.innerWidth,
      window.innerHeight * 0.25,
      `+${points}`, 'green'
    );
    if (combo >= 3) {
      showFloat(
        (enemy.x / PLAY_AREA_WIDTH + 0.5) * window.innerWidth,
        window.innerHeight * 0.2,
        `${combo}x COMBO!`, 'gold'
      );
    }

    scene.remove(enemy.mesh);
    enemies.splice(index, 1);
    updateScore();
  }

  function spawnEnemies() {
    spawnTimer++;
    const spawnRate = Math.max(40, 80 - (60 - timeLeft) * 0.8);

    if (spawnTimer >= spawnRate) {
      spawnTimer = 0;

      let type = 'notification';
      const elapsed = 60 - timeLeft;
      const rand = Math.random();

      if (elapsed > 15 && rand < 0.3) type = 'scroll';
      if (elapsed > 35 && rand < 0.12) type = 'dragon';

      const x = (Math.random() - 0.5) * PLAY_AREA_WIDTH * 0.8;
      const enemy = createEnemy3D(type, x, ENEMY_SPAWN_Z);
      enemies.push(enemy);
    }
  }

  function updateEnemies3D() {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx * 0.3;
      e.z += e.vz * 0.3;

      // Bobbing
      e.mesh.position.x = e.x;
      e.mesh.position.z = e.z;
      e.mesh.position.y = e.y + Math.sin(Date.now() * 0.004 + e.x) * 0.1;

      // Rotate toward vault
      e.mesh.rotation.y = Math.atan2(-e.x, VAULT_Z - e.z);

      if (e.x < -PLAY_AREA_WIDTH / 2 || e.x > PLAY_AREA_WIDTH / 2) e.vx *= -1;

      // Hit vault
      if (e.z >= VAULT_Z - 2) {
        vault.hp -= e.boss ? 30 : 15;
        vaultHits++;
        combo = 0;
        score -= 25;
        playSound('vaultHit');
        createExplosion3D(e.x, e.y, VAULT_Z, 0xef4444, 15);
        showFloat(
          window.innerWidth / 2,
          window.innerHeight * 0.4,
          '💥 VAULT HIT!', 'red'
        );
        showFloat(
          window.innerWidth / 2,
          window.innerHeight * 0.35,
          '-25', 'red'
        );

        scene.remove(e.mesh);
        enemies.splice(i, 1);
        updateVaultHP();
        updateScore();
        continue;
      }
    }
  }

  function updateParticles3D() {
    for (let i = particles3D.length - 1; i >= 0; i--) {
      const p = particles3D[i];
      p.mesh.position.x += p.vx * 0.3;
      p.mesh.position.y += p.vy * 0.3;
      p.mesh.position.z += p.vz * 0.3;
      p.vy += p.gravity;
      p.life--;

      if (p.scale) {
        p.mesh.scale.multiplyScalar(0.9);
      }

      if (p.life <= 0) {
        scene.remove(p.mesh);
        particles3D.splice(i, 1);
      }
    }
  }

  function updateVault3D() {
    if (!vaultMesh) return;
    const hpBar = vaultMesh.children.find(c => c.name === 'hpBar');
    if (hpBar) {
      const hpPct = Math.max(0.01, vault.hp / vault.maxHp);
      hpBar.scale.x = hpPct;
      
      if (vault.hp > 50) hpBar.material.color.setHex(0x10b981);
      else if (vault.hp > 25) hpBar.material.color.setHex(0xf59e0b);
      else hpBar.material.color.setHex(0xef4444);
    }

    if (vault.hp < vault.maxHp) {
      const pulse = 1 + Math.sin(Date.now() * 0.01) * 0.02;
      vaultMesh.scale.set(pulse, pulse, pulse);
    }
  }

  function updateScore() {
    document.getElementById('scoreDisplay').textContent = score;
  }

  function updateBulletDisplay() {
    const display = player.bullets === Infinity ? '∞' : player.bullets;
    document.getElementById('bulletDisplay').textContent = display;
    const btn = document.getElementById('fireBtn');
    if (player.bullets !== Infinity && player.bullets <= 0) {
      btn.classList.add('empty');
    } else {
      btn.classList.remove('empty');
    }
  }

  function updateVaultHP() {
    if (vault.hp <= 0) {
      vault.hp = 0;
      endGame();
    }
  }

  function showFloat(screenX, screenY, text, color) {
    const el = document.createElement('div');
    el.className = `float-text ${color}`;
    el.textContent = text;
    el.style.left = screenX + 'px';
    el.style.top = screenY + 'px';
    el.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(el);
    floatingTexts.push({ el, life: 25 });

    setTimeout(() => {
      if (el.parentNode) el.remove();
    }, 800);
  }

  // ========== END GAME ==========
  function endGame() {
    gameRunning = false;
    clearInterval(timerInterval);
    cancelAnimationFrame(gameLoopId);
    playSound('gameOver');

    const timeBonus = timeLeft * 3;
    const hpBonus = Math.floor(vault.hp * 3);
    const comboBonus = maxCombo * 15;
    const perfectBonus = vault.hp >= 100 ? 150 : 0;
    const accuracyBonus = bulletsFired > 0 ? Math.floor((kills / bulletsFired) * 100) : 0;

    score += timeBonus + hpBonus + comboBonus + perfectBonus + accuracyBonus;

    document.getElementById('endTitle').textContent = vault.hp > 0 ? 'VAULT SECURED!' : 'VAULT DESTROYED!';
    document.getElementById('finalScore').textContent = score;

    const breakdown = document.getElementById('scoreBreakdown');
    breakdown.innerHTML = `
      <div class="break-item"><span>Kills (${kills})</span><span class="val green">+${kills * 50}</span></div>
      <div class="break-item"><span>Time Bonus</span><span class="val green">+${timeBonus}</span></div>
      <div class="break-item"><span>Vault HP Bonus</span><span class="val green">+${hpBonus}</span></div>
      <div class="break-item"><span>Max Combo (${maxCombo}x)</span><span class="val gold">+${comboBonus}</span></div>
      ${perfectBonus ? `<div class="break-item"><span>Perfect Defense!</span><span class="val gold">+${perfectBonus}</span></div>` : ''}
      <div class="break-item"><span>Accuracy Bonus</span><span class="val green">+${accuracyBonus}</span></div>
      <div class="break-item"><span>Vault Hits</span><span class="val red">-${vaultHits * 25}</span></div>
      <div class="break-item" style="border-top:2px solid var(--orange);margin-top:.5rem;padding-top:.5rem;font-weight:800;">
        <span>FINAL SCORE</span><span class="val gold">${score}</span>
      </div>
    `;

    document.getElementById('gameOver').classList.add('show');
  }

  // ========== SUBMIT ==========
  window.submitScore = async function() {
    if (!currentUser || !entryId || !roundId) {
      location.href = 'game-lobby2.html';
      return;
    }

    const btn = document.querySelector('.game-over-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await updateDoc(doc(db, 'vaultDefenderRounds', roundId, 'entries', entryId), {
        score: score,
        vaultHP: Math.max(0, vault.hp),
        kills: kills,
        maxCombo: maxCombo,
        character: selectedChar,
        bulletsFired: bulletsFired,
        timeLeft: timeLeft,
        completedAt: serverTimestamp()
      });
      location.href = 'game-lobby2.html';
    } catch (err) {
      console.error('Submit error:', err);
      btn.disabled = false;
      btn.textContent = 'Try Again';
    }
  };
</script>

</body>
</html>
