<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskVault — Login</title>

    <!-- Favicon -->
    <link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg" type="image/jpeg">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- SILK THEME VARIABLES --- */
        :root {
            --primary: #d35400;
            --primary-light: #e67e22;
            --primary-glow: rgba(211, 84, 0, 0.15);
            
            --bg-body: #f8f6f2;
            --bg-card: #ffffff;
            --bg-input: #f0ece6;
            
            --text-main: #2c2c2c;
            --text-muted: #7f8c8d;
            --border-color: #e0dcd5;
            
            --radius: 16px;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.08);
            --shadow-input: inset 0 2px 4px rgba(0,0,0,0.02);
            
            --font-main: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(211, 84, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(211, 84, 0, 0.03) 0%, transparent 50%);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Navigation */
        nav {
            padding: 2rem 1rem 1rem;
            display: flex;
            justify-content: center;
            background: transparent;
            position: relative;
            z-index: 10;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: -1px;
            transition: transform 0.3s ease;
        }

        .nav-logo:hover { transform: scale(1.02); }

        .nav-logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 6px 20px var(--primary-glow);
            object-fit: cover;
        }

        .nav-logo span { color: var(--primary); }

        /* Main Container */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden;
            animation: floatUp 0.8s ease-out;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px) rotateX(5deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .card-header { text-align: center; margin-bottom: 2rem; }
        .card-header h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .card-header h1 span { color: var(--primary); }
        .card-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 400; }

        /* Form Elements */
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        
        label { font-size: 0.85rem; font-weight: 500; color: var(--text-main); letter-spacing: 0.3px; }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0 1rem;
            transition: var(--transition);
            box-shadow: var(--shadow-input);
        }

        .input-wrapper:focus-within {
            background: #fff;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px var(--primary-glow);
            transform: translateY(-1px);
        }

        .input-icon { color: var(--text-muted); font-size: 1.25rem; margin-right: 0.75rem; transition: color 0.3s; }
        .input-wrapper:focus-within .input-icon { color: var(--primary); }

        .input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0.9rem 0;
            font-size: 1rem;
            outline: none;
            font-family: var(--font-main);
            font-weight: 500;
        }
        .input::placeholder { color: #b0b0b0; font-weight: 400; }

        .toggle-password { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; }
        .toggle-password:hover { color: var(--primary); }

        .error-msg { color: #c0392b; font-size: 0.8rem; margin-top: 0.4rem; display: flex; align-items: center; gap: 4px; opacity: 0; height: 0; overflow: hidden; transition: 0.3s; font-weight: 500; }
        .form-group.error .error-msg { opacity: 1; height: auto; margin-bottom: 0.5rem; }
        .form-group.error .input-wrapper { border-color: #c0392b; box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1); }

        .forgot-password { text-align: right; margin-top: -1rem; margin-bottom: 1.5rem; }
        .forgot-password a { font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot-password a:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%; padding: 1.1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: var(--transition); position: relative; overflow: hidden; box-shadow: 0 4px 15px var(--primary-glow);
            font-family: var(--font-main); letter-spacing: 0.5px;
        }
        
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit.loading { pointer-events: none; opacity: 0.8; }
        
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        .btn-submit.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider { display: flex; align-items: center; text-align: center; margin: 2rem 0 1.5rem; color: var(--text-muted); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider span { padding: 0 10px; }

        .social-login { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn-social {
            padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 12px; background: #fff;
            color: var(--text-main); font-weight: 500; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; transition: var(--transition);
        }
        .btn-social:hover { background: #f9f9f9; border-color: #ccc; transform: translateY(-2px); }
        .btn-social i { font-size: 1.2rem; }

        .login-link { text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem; }
        .login-link a { color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 4px; }

        @media (max-width: 600px) {
            main { padding: 1rem; }
            .card { padding: 1.8rem; }
            .nav-logo { font-size: 1.8rem; }
            .nav-logo img { width: 50px; height: 50px; }
            .social-login { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html" class="nav-logo">
            <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg" alt="Logo">
            Task<span>Vault</span>
        </a>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="card">
            <div class="card-header">
                <h1>Welcome <span>Back</span></h1>
                <p>Sign in to access your gaming dashboard and rewards.</p>
            </div>

            <form id="loginForm" novalidate>
                
                <!-- Email -->
                <div class="form-group" id="group-email">
                    <div class="label-row">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope-simple input-icon"></i>
                        <input type="email" id="email" class="input" placeholder="name@example.com" required>
                    </div>
                    <div class="error-msg"><i class="ph ph-warning-circle"></i> Please enter a valid email.</div>
                </div>

                <!-- Password -->
                <div class="form-group" id="group-password">
                    <div class="label-row">
                        <label for="password">Password</label>
                    </div>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key input-icon"></i>
                        <input type="password" id="password" class="input" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    <div class="error-msg"><i class="ph ph-warning-circle"></i> Password is required.</div>
                </div>

                <!-- Forgot Password -->
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="btn-social">
                        <i class="ph ph-google-logo" style="color: #DB4437;"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="ph ph-steam-logo" style="color: #1b2838;"></i> Steam
                    </button>
                </div>

                <div class="login-link">
                    Don't have an account? <a href="register.html">Register</a>
                </div>
            </form>
        </div>
    </main>

    <!-- JAVASCRIPT -->
    <script>
        // --- UI LOGIC ---

        // Password Toggle
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.toggle-password i');
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('ph-eye', 'ph-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('ph-eye-slash', 'ph-eye');
            }
        }

        // Form Validation & Submission
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let isValid = true;

            // Reset Errors
            document.querySelectorAll('.form-group').forEach(g => g.classList.remove('error'));

            // Validate Email
            const email = document.getElementById('email');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                document.getElementById('group-email').classList.add('error');
                isValid = false;
            }

            // Validate Password (Non-optional)
            const password = document.getElementById('password');
            if (password.value.trim() === "") {
                document.getElementById('group-password').classList.add('error');
                isValid = false;
            }

            if (!isValid) return;

            // --- SIMULATED LOGIN & REDIRECT ---
            // Visual Loading State
            submitBtn.classList.add('loading');
            submitBtn.innerHTML = '<div class="spinner"></div>';
            submitBtn.style.background = '#27ae60'; // Turn green

            // Simulate network delay (1 second)
            setTimeout(() => {
                // Redirect to Dashboard
                window.location.href = "dashboard.html";
            }, 1000);
        });
    </script>
</body>
</html>
