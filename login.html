<head>
    <meta charset="UTF-8">

    <!-- Firebase SDK (Modular v9+) -->
    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
            authDomain: "taskvault-412a0.firebaseapp.com",
            projectId: "taskvault-412a0",
            storageBucket: "taskvault-412a0.firebasestorage.app",
            messagingSenderId: "420716701831",
            appId: "1:420716701831:web:c987d91f7f4c8684eb7022",
            measurementId: "G-93JG3LB08B"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // Make Firebase available globally for the form handler
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.googleProvider = googleProvider;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signInWithPopup = signInWithPopup;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
        window.serverTimestamp = serverTimestamp;

        // Check auth state on load
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, redirect to dashboard
                console.log("User already signed in:", user.email);
            }
        });
    </script>

    <style>
        /* --- SILK THEME VARIABLES --- */
        :root {
            --primary: #d35400;
            --primary-light: #e67e22;
            --primary-glow: rgba(211, 84, 0, 0.15);
            
            --bg-body: #f8f6f2;
            --bg-card: #ffffff;
            --bg-input: #f0ece6;
            
            --text-main: #2c2c2c;
            --text-muted: #7f8c8d;
            --border-color: #e0dcd5;
            --error: #c0392b;
            --success: #27ae60;
            
            --radius: 16px;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.08);
            --shadow-input: inset 0 2px 4px rgba(0,0,0,0.02);
            
            --font-main: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(211, 84, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(211, 84, 0, 0.03) 0%, transparent 50%);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 350px;
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        .toast.info { background: var(--primary); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Navigation */
        nav {
            padding: 2rem 1rem 1rem;
            display: flex;
            justify-content: center;
            background: transparent;
            position: relative;
            z-index: 10;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: -1px;
            transition: transform 0.3s ease;
        }

        .nav-logo:hover { transform: scale(1.02); }

        .nav-logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 6px 20px var(--primary-glow);
            object-fit: cover;
        }

        .nav-logo span { color: var(--primary); }

        /* Main Container */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2.5rem;

        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px) rotateX(5deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }

        .card-header { text-align: center; margin-bottom: 2rem; }
        .card-header h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .card-header h1 span { color: var(--primary); }
        .card-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 400; }

        /* Form Elements */
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        
        label { font-size: 0.85rem; font-weight: 500; color: var(--text-main); letter-spacing: 0.3px; }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0 1rem;
            transition: var(--transition);
            box-shadow: var(--shadow-input);
        }

        .input-wrapper:focus-within {
            background: #fff;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px var(--primary-glow);
            transform: translateY(-1px);

        .input-icon { color: var(--text-muted); font-size: 1.25rem; margin-right: 0.75rem; transition: color 0.3s; }
        .input-wrapper:focus-within .input-icon { color: var(--primary); }

        .input {
            width: 100%;
            background: transparent;
            border: none;

        .toggle-password { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; }
        .toggle-password:hover { color: var(--primary); }

        .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 0.4rem; display: flex; align-items: center; gap: 4px; opacity: 0; height: 0; overflow: hidden; transition: 0.3s; font-weight: 500; }
        .form-group.error .error-msg { opacity: 1; height: auto; margin-bottom: 0.5rem; }
        .form-group.error .input-wrapper { border-color: var(--error); box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1); }

        .forgot-password { text-align: right; margin-top: -1rem; margin-bottom: 1.5rem; }
        .forgot-password a { font-size: 0.85rem; color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot-password a:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%; padding: 1.1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: var(--transition); position: relative; overflow: hidden; box-shadow: 0 4px 15px var(--primary-glow);
            font-family: var(--font-main); letter-spacing: 0.5px;
        }
        
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-submit:active:not(:disabled) { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider { display: flex; align-items: center; text-align: center; margin: 2rem 0 1.5rem; color: var(--text-muted); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider span { padding: 0 10px; }

        .social-login { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn-social {
            padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 12px; background: #fff;
            color: var(--text-main); font-weight: 500; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px; transition: var(--transition);
        }
        .btn-social:hover:not(:disabled) { background: #f9f9f9; border-color: #ccc; transform: translateY(-2px); }
        .btn-social:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-social i { font-size: 1.2rem; }

        .login-link { text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem; }
        .login-link a { color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 4px; }

        /* Forgot Password Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalFloat 0.3s ease-out;
        }

        @keyframes modalFloat {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h3 { margin-bottom: 1rem; font-size: 1.3rem; }
        .modal p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem; }

        @media (max-width: 600px) {

            .nav-logo { font-size: 1.8rem; }
            .nav-logo img { width: 50px; height: 50px; }
            .social-login { grid-template-columns: 1fr; }
            .toast-container { left: 20px; right: 20px; }
            .toast { max-width: 100%; }
        }
    </style>

<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Navigation -->

        <a href="index.html" class="nav-logo">

    <!-- Main Content -->
    <main>
        <div class="card">
            <div class="card-header">
                <h1>Welcome <span>Back</span></h1>
                <p>Sign in to access your gaming dashboard and rewards.</p>
            </div>

            <form id="loginForm" novalidate>
                
                <!-- Email -->
                <div class="form-group" id="group-email">
                    <div class="label-row">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope-simple input-icon"></i>
                        <input type="email" id="email" class="input" placeholder="name@example.com" required autocomplete="email">
                    </div>
                    <div class="error-msg"><i class="ph ph-warning-circle"></i> Please enter a valid email.</div>
                </div>

                <!-- Password -->
                <div class="form-group" id="group-password">
                    <div class="label-row">
                        <label for="password">Password</label>
                    </div>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key input-icon"></i>
                        <input type="password" id="password" class="input" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    <div class="error-msg"><i class="ph ph-warning-circle"></i> Password is required.</div>
                </div>

                <!-- Forgot Password -->

                    <a href="#" onclick="showForgotModal(event)">Forgot Password?</a>

                <!-- Submit Button -->

                    <span class="btn-text">Sign In</span>

                    <span>or continue with</span>

                <div class="social-login">

                    Don't have an account? <a href="register.html">Register</a>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal">
            <h3>Reset Password</h3>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="ph ph-envelope-simple input-icon"></i>
                    <input type="email" id="resetEmail" class="input" placeholder="name@example.com">
                </div>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" onclick="hideForgotModal()">Cancel</button>
                <button type="button" class="btn-send" onclick="sendResetEmail()">Send Link</button>
            </div>
        </div>
    </div>
        <!-- JAVASCRIPT -->
    <script type="module">
        // Import additional Firebase functions needed for password reset
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- TOAST NOTIFICATION SYSTEM ---
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? 'ph-check-circle' : 
                        type === 'error' ? 'ph-x-circle' : 'ph-info';
            
            toast.innerHTML = `
                <i class="ph ${icon}"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // --- PASSWORD TOGGLE ---
        window.togglePassword = function() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.toggle-password i');
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('ph-eye', 'ph-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('ph-eye-slash', 'ph-eye');
            }
        }

        // --- FORM VALIDATION ---
        function validateEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function setError(groupId, show) {
            const group = document.getElementById(groupId);
            if (show) {
                group.classList.add('error');
            } else {
                group.classList.remove('error');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.form-group').forEach(g => g.classList.remove('error'));
        }

        // --- LOADING STATE ---
        function setLoading(loading) {
            const btn = document.getElementById('submitBtn');
            const googleBtn = document.getElementById('googleBtn');
            const steamBtn = document.getElementById('steamBtn');
            
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
                googleBtn.disabled = true;
                steamBtn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
                googleBtn.disabled = false;
                steamBtn.disabled = false;
            }
        }

        // --- FIRESTORE USER MANAGEMENT ---
        async function createOrUpdateUser(user) {
            const { firebaseDb, doc, getDoc, setDoc, serverTimestamp } = window;
            
            try {
                const userRef = doc(firebaseDb, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                const userData = {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || '',
                    photoURL: user.photoURL || '',
                    lastLogin: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };
                
                if (!userSnap.exists()) {
                    // New user - create profile
                    userData.createdAt = serverTimestamp();
                    userData.gamingStats = {
                        totalGames: 0,
                        achievements: 0,
                        playTime: 0,
                        level: 1,
                        xp: 0
                    };
                    userData.preferences = {
                        notifications: true,
                        theme: 'default'
                    };
                    userData.rewards = {
                        points: 0,
                        badges: []
                    };
                    
                    await setDoc(userRef, userData);
                    console.log("New user created in Firestore");
                    return { isNew: true, ...userData };
                } else {
                    // Existing user - update last login
                    await setDoc(userRef, userData, { merge: true });
                    console.log("User login updated in Firestore");
                    return { isNew: false, ...userSnap.data(), ...userData };
                }
            } catch (error) {
                console.error("Firestore error:", error);
                throw error;
            }
        }

        // --- EMAIL/PASSWORD LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            let isValid = true;

            // Validate
            if (!validateEmail(email)) {
                setError('group-email', true);
                isValid = false;
            }
            
            if (password.length < 6) {
                setError('group-password', true);
                showToast('Password must be at least 6 characters', 'error');
                isValid = false;
            }

            if (!isValid) return;

            setLoading(true);

            try {
                const { firebaseAuth, signInWithEmailAndPassword } = window;
                const userCredential = await signInWithEmailAndPassword(firebaseAuth, email, password);
                const user = userCredential.user;
                
                // Get or create user in Firestore
                const userData = await createOrUpdateUser(user);
                
                showToast(`Welcome back, ${userData.displayName || user.email}!`, 'success');
                
                // Store user data in session storage for dashboard
                sessionStorage.setItem('taskvault_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: userData.displayName,
                    isNew: userData.isNew
                }));
                
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
                
            } catch (error) {
                console.error("Login error:", error);
                setLoading(false);
                
                // Handle specific Firebase errors
                const errorMessages = {
                    'auth/user-not-found': 'No account found with this email',
                    'auth/wrong-password': 'Incorrect password',
                    'auth/invalid-credential': 'Invalid email or password',
                    'auth/too-many-requests': 'Too many attempts. Please try again later',
                    'auth/user-disabled': 'This account has been disabled'
                };
                
                const message = errorMessages[error.code] || 'Login failed. Please try again.';
                showToast(message, 'error');
                
                if (error.code === 'auth/user-not-found') {
                    setError('group-email', true);
                } else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    setError('group-password', true);
                }
            }
        });

        // --- GOOGLE SIGN IN ---
        window.signInWithGoogle = async function() {
            setLoading(true);
            
            try {
                const { firebaseAuth, googleProvider, signInWithPopup } = window;
                const result = await signInWithPopup(firebaseAuth, googleProvider);
                const user = result.user;
                
                // Get or create user in Firestore
                const userData = await createOrUpdateUser(user);
                
                const welcomeMsg = userData.isNew ? 'Welcome to TaskVault!' : `Welcome back, ${userData.displayName || user.email}!`;
                showToast(welcomeMsg, 'success');
                
                // Store user data
                sessionStorage.setItem('taskvault_user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    displayName: userData.displayName,
                    photoURL: userData.photoURL,
                    isNew: userData.isNew
                }));
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
                
            } catch (error) {
                console.error("Google sign-in error:", error);
                setLoading(false);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showToast('Sign-in cancelled', 'info');
                } else if (error.code === 'auth/popup-blocked') {
                    showToast('Popup blocked. Please allow popups for this site.', 'error');
                } else {
                    showToast('Google sign-in failed. Please try again.', 'error');
                }
            }
        }

        // --- STEAM COMING SOON ---
        window.showSteamComingSoon = function() {
            showToast('Steam login coming soon!', 'info');
        }

        // --- FORGOT PASSWORD MODAL ---
        window.showForgotModal = function(e) {
            e.preventDefault();
            document.getElementById('forgotModal').classList.add('active');
            document.getElementById('resetEmail').value = document.getElementById('email').value;
        }

        window.hideForgotModal = function() {
            document.getElementById('forgotModal').classList.remove('active');
        }

        window.sendResetEmail = async function() {
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!validateEmail(email)) {
                showToast('Please enter a valid email address', 'error');
                return;
            }
            
            const btn = document.querySelector('.btn-send');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            try {
                const { firebaseAuth } = window;
                await sendPasswordResetEmail(firebaseAuth, email);
                showToast('Password reset link sent! Check your email.', 'success');
                hideForgotModal();
            } catch (error) {
                console.error("Reset error:", error);
                const message = error.code === 'auth/user-not-found' 
                    ? 'No account found with this email' 
                    : 'Failed to send reset email. Try again.';
                showToast(message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Link';
            }
        }

        // Close modal on overlay click
        document.getElementById('forgotModal').addEventListener('click', (e) => {
            if (e.target.id === 'forgotModal') hideForgotModal();
        });

        // --- CHECK EXISTING AUTH STATE ---
        // Redirect if already logged in
        const { firebaseAuth, onAuthStateChanged } = window;
        onAuthStateChanged(firebaseAuth, (user) => {
            if (user) {
                console.log("Already authenticated:", user.email);
                // Optional: auto-redirect if user is already logged in
                // window.location.href = "dashboard.html";
            }
        });

        // --- UTILITY: Get current user data for other pages ---
        window.getCurrentUser = function() {
            const data = sessionStorage.getItem('taskvault_user');
            return data ? JSON.parse(data) : null;
        }

        window.logout = async function() {
            try {
                await firebaseAuth.signOut();
                sessionStorage.removeItem('taskvault_user');
                showToast('Logged out successfully', 'success');
                setTimeout(() => window.location.href = 'login.html', 1000);
            } catch (error) {
                showToast('Logout failed', 'error');
            }
        }
    </script>
</body>
</html>
