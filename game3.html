<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TaskVault – Subway Runner 2D</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root { --orange: #f97316; --gold: #f59e0b; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --purple: #8b5cf6; --cyan: #06b6d4; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { background: #0f172a; color: #fff; overflow: hidden; touch-action: none; user-select: none; height: 100vh; width: 100vw; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    .hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: rgba(0,0,0,0.5); z-index: 10; pointer-events: none; font-weight: 800; font-size: 14px; }
    .hud span { display: flex; align-items: center; gap: 4px; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .card { background: #1e293b; border: 2px solid var(--orange); border-radius: 16px; padding: 24px; text-align: center; max-width: 320px; width: 85%; }
    .card h1 { font-size: 22px; font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card p { color: #94a3b8; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .card h2 { font-size: 36px; font-weight: 900; margin: 8px 0; }
    .btn { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 8px; }
    .btn.secondary { background: #374151; }
    .hidden { display: none !important; }
    .controls-hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: #64748b; font-size: 12px; z-index: 10; pointer-events: none; text-align: center; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="hud" id="hud" style="display:none;">
  <span>🏆 <span id="score">0</span></span>
  <span style="color:var(--cyan);">x<span id="multiplier">1</span></span>
  <span style="color:var(--gold);">🪙 <span id="coins">0</span></span>
</div>

<div class="controls-hint" id="hint" style="display:none;">
  ← → Swipe to switch lanes<br>↑ Swipe to jump &nbsp; ↓ Swipe to slide
</div>

<div class="overlay" id="startScreen">
  <div class="card">
    <div style="font-size:48px;">🏃</div>
    <h1>Subway Runner 2D</h1>
    <p>Swipe to dodge obstacles, jump over barriers, collect coins!</p>
    <button class="btn" onclick="startGame()">START RUNNING</button>
  </div>
</div>

<div class="overlay hidden" id="gameOverScreen">
  <div class="card">
    <div id="endEmoji" style="font-size:48px;">💥</div>
    <h2 id="finalScore">0</h2>
    <p id="endStats" style="color:#94a3b8;"></p>
    <button class="btn" onclick="submitScore()">SUBMIT SCORE</button>
    <button class="btn secondary" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
  authDomain: "taskvault-412a0.firebaseapp.com",
  projectId: "taskvault-412a0",
  storageBucket: "taskvault-412a0.firebasestorage.app",
  messagingSenderId: "420716701831",
  appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let entryId = sessionStorage.getItem('srEntryId');
let roundId = sessionStorage.getItem('srRoundId');

onAuthStateChanged(auth, (user) => {
  if (!user) { location.href = 'login.html'; return; }
  currentUser = user;
  if (!entryId || !roundId) location.href = 'game-lobby3.html';
});

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, laneW, groundY;
let gameRunning = false;
let score = 0, coins = 0, distance = 0;
let speed = 5, baseSpeed = 5, multiplier = 1;
let frame = 0;

const LANES = [-1, 0, 1];
let player = { lane: 1, targetLane: 1, y: 0, vy: 0, isJumping: false, isSliding: false, slideTimer: 0, jumpPower: 12, gravity: 0.6 };

let objects = [];
let particles = [];
let bgOffset = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  laneW = Math.min(W / 3.5, 100);
  groundY = H * 0.75;
}
window.addEventListener('resize', resize);
resize();

// Touch / swipe controls
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
    player.targetLane = Math.max(0, Math.min(2, player.targetLane + (dx > 0 ? 1 : -1)));
  } else if (Math.abs(dy) > 30) {
    if (dy < -30) jump();
    else if (dy > 30) slide();
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') player.targetLane = Math.max(0, player.targetLane - 1);
  if (e.key === 'ArrowRight' || e.key === 'd') player.targetLane = Math.min(2, player.targetLane + 1);
  if (e.key === 'ArrowUp' || e.key === 'w') jump();
  if (e.key === 'ArrowDown' || e.key === 's') slide();
});

function jump() {
  if (!gameRunning || player.isJumping || player.isSliding) return;
  player.vy = player.jumpPower;
  player.isJumping = true;
}

function slide() {
  if (!gameRunning || player.isJumping || player.isSliding) return;
  player.isSliding = true;
  player.slideTimer = 30;
}

function spawnObject() {
  const lane = Math.floor(Math.random() * 3);
  const typeRoll = Math.random();
  let type = 'coin';
  if (typeRoll < 0.25) type = 'barrier';
  else if (typeRoll < 0.35) type = 'low_barrier';
  else if (typeRoll < 0.42) type = 'train';
  else if (typeRoll < 0.48) type = 'powerup';

  const obj = { lane, type, x: 0, y: 0, z: -200, w: 50, h: 50, collected: false, passed: false };

  if (type === 'coin') {
    obj.y = groundY - 80;
    obj.h = 30; obj.w = 30;
  } else if (type === 'barrier') {
    obj.y = groundY - 50;
    obj.h = 50; obj.w = 60;
    obj.subtype = 'high';
  } else if (type === 'low_barrier') {
    obj.y = groundY - 15;
    obj.h = 20; obj.w = 60;
    obj.subtype = 'low';
  } else if (type === 'train') {
    obj.y = groundY - 70;
    obj.h = 90; obj.w = 100;
  } else if (type === 'powerup') {
    obj.y = groundY - 90;
    obj.h = 35; obj.w = 35;
    const types = ['magnet', 'shield', 'double'];
    obj.puType = types[Math.floor(Math.random() * types.length)];
  }

  objects.push(obj);
}

function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 3,
      life: 20 + Math.random() * 15,
      color, size: 3 + Math.random() * 4
    });
  }
}

function drawPlayer() {
  const px = W / 2 + (player.lane - 1) * laneW;
  const py = groundY - player.y - 40;

  ctx.save();
  ctx.translate(px, py);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 40 - player.y * 0.1, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Slide = smaller
  const scale = player.isSliding ? 0.6 : 1;

  // Body
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.roundRect(-15 * scale, -30 * scale, 30 * scale, 40 * scale, 8);
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffccaa';
  ctx.beginPath();
  ctx.arc(0, -42 * scale, 14 * scale, 0, Math.PI * 2);
  ctx.fill();

  // Cap
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.arc(0, -48 * scale, 15 * scale, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-18 * scale, -48 * scale, 36 * scale, 5 * scale);

  // Arms
  ctx.fillStyle = '#ffccaa';
  const armSwing = Math.sin(frame * 0.2) * 8;
  if (!player.isJumping && !player.isSliding) {
    ctx.beginPath();
    ctx.ellipse(-22 * scale, -15 * scale + armSwing, 6 * scale, 14 * scale, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(22 * scale, -15 * scale - armSwing, 6 * scale, 14 * scale, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Legs
  ctx.fillStyle = '#1a1a2a';
  const legSwing = Math.sin(frame * 0.2) * 10;
  if (!player.isJumping && !player.isSliding) {
    ctx.beginPath();
    ctx.roundRect(-12 * scale, 5 * scale, 8 * scale, 22 * scale, 4);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(4 * scale, 5 * scale, 8 * scale, 22 * scale, 4);
    ctx.fill();
  } else if (player.isJumping) {
    ctx.beginPath();
    ctx.roundRect(-12 * scale, 5 * scale, 8 * scale, 18 * scale, 4);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(4 * scale, 8 * scale, 8 * scale, 15 * scale, 4);
    ctx.fill();
  }

  ctx.restore();
}

function drawObject(obj) {
  const ox = W / 2 + (obj.lane - 1) * laneW;
  const oy = obj.y + obj.z * 0.5; // perspective

  // Skip if off screen
  if (oy > H + 100 || oy < -100) return;

  const scale = Math.max(0.3, 1 + obj.z / 400);
  const sw = obj.w * scale;
  const sh = obj.h * scale;

  ctx.save();
  ctx.translate(ox, oy);

  if (obj.type === 'coin') {
    if (obj.collected) return;
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(0, 0, sw / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${sw * 0.5}px Inter`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 2);
  } else if (obj.type === 'barrier') {
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.roundRect(-sw / 2, -sh, sw, sh, 6);
    ctx.fill();
    // Stripes
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-sw / 2 + i * (sw / 3) + 2, -sh + 4, sw / 3 - 4, 6);
    }
  } else if (obj.type === 'low_barrier') {
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.roundRect(-sw / 2, -sh, sw, sh, 4);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.fillRect(-sw / 2 + 4, -sh / 2 - 2, sw - 8, 4);
  } else if (obj.type === 'train') {
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath();
    ctx.roundRect(-sw / 2, -sh, sw, sh, 10);
    ctx.fill();
    // Windows
    ctx.fillStyle = '#87ceeb';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.roundRect(-sw / 2 + 8 + i * (sw / 3), -sh + 10, sw / 3 - 10, sh * 0.3, 4);
      ctx.fill();
    }
    // Headlights
    ctx.fillStyle = '#ffffaa';
    ctx.beginPath();
    ctx.arc(-sw / 3, -sh + sh * 0.7, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sw / 3, -sh + sh * 0.7, 5, 0, Math.PI * 2);
    ctx.fill();
  } else if (obj.type === 'powerup') {
    const colors = { magnet: '#3b82f6', shield: '#8b5cf6', double: '#f59e0b' };
    const emojis = { magnet: '🧲', shield: '🛡️', double: '2️⃣' };
    ctx.fillStyle = colors[obj.puType] || '#3b82f6';
    ctx.beginPath();
    ctx.arc(0, 0, sw / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Glow ring
    ctx.strokeStyle = colors[obj.puType];
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, sw / 2 + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.font = `${sw * 0.5}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emojis[obj.puType] || '⭐', 0, 2);
  }

  ctx.restore();
}

function drawBackground() {
  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0f172a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, groundY, W, H - groundY);

  // Track lines
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 2;
  for (let i = -1; i <= 1; i++) {
    const lx = W / 2 + i * laneW;
    ctx.beginPath();
    ctx.moveTo(lx, groundY);
    ctx.lineTo(lx, H);
    ctx.stroke();
  }

  // Moving ground details
  bgOffset = (bgOffset + speed) % 40;
  ctx.fillStyle = '#334155';
  for (let y = groundY + bgOffset; y < H; y += 40) {
    for (let i = -1; i <= 1; i++) {
      const lx = W / 2 + i * laneW;
      ctx.fillRect(lx - 2, y, 4, 15);
    }
  }

  // Side walls
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, W / 2 - laneW * 1.5, H);
  ctx.fillRect(W / 2 + laneW * 1.5, 0, W, H);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / 30), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function update() {
  if (!gameRunning) return;

  frame++;
  distance += speed * 0.01;
  score += Math.floor(speed * 0.1 * multiplier);
  speed = baseSpeed + Math.floor(distance / 50) * 0.3;
  multiplier = 1 + Math.floor(distance / 100);

  // Player physics
  player.lane += (player.targetLane - player.lane) * 0.15;

  if (player.isJumping) {
    player.vy -= player.gravity;
    player.y += player.vy;
    if (player.y <= 0) {
      player.y = 0;
      player.vy = 0;
      player.isJumping = false;
    }
  }

  if (player.isSliding) {
    player.slideTimer--;
    if (player.slideTimer <= 0) player.isSliding = false;
  }

  // Spawn objects
  if (frame % Math.max(30, 60 - Math.floor(distance / 10)) === 0) {
    spawnObject();
  }

  // Update objects
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    obj.z += speed;

    const ox = W / 2 + (obj.lane - 1) * laneW;
    const oy = obj.y + obj.z * 0.5;
    const px = W / 2 + (player.lane - 1) * laneW;
    const py = groundY - player.y - 40;

    // Collision
    if (!obj.collected && Math.abs(obj.z) < 30 && obj.lane === Math.round(player.lane)) {
      if (obj.type === 'coin') {
        if (Math.abs(py - oy) < 40) {
          obj.collected = true;
          coins++;
          score += 10 * multiplier;
          createParticles(ox, oy, '#f59e0b', 6);
        }
      } else if (obj.type === 'powerup') {
        if (Math.abs(py - oy) < 40) {
          obj.collected = true;
          score += 50;
          createParticles(ox, oy, '#3b82f6', 8);
        }
      } else if (obj.type === 'barrier') {
        // Must jump over (height 50, player jump reaches ~120)
        if (player.y < 60 && !player.isSliding) {
          crash();
          return;
        }
      } else if (obj.type === 'low_barrier') {
        // Must slide under
        if (!player.isSliding && player.y < 20) {
          crash();
          return;
        }
      } else if (obj.type === 'train') {
        if (player.y < 70) {
          crash();
          return;
        }
      }
    }

    // Remove passed objects
    if (obj.z > 100) {
      objects.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // Sort objects by z for proper layering
  objects.sort((a, b) => b.z - a.z);

  for (const obj of objects) {
    drawObject(obj);
  }

  drawPlayer();
  drawParticles();
}

function updateHUD() {
  document.getElementById('score').textContent = Math.floor(score);
  document.getElementById('coins').textContent = coins;
  document.getElementById('multiplier').textContent = multiplier;
}

function crash() {
  gameRunning = false;
  createParticles(W / 2 + (player.lane - 1) * laneW, groundY - player.y - 40, '#ef4444', 20);

  setTimeout(() => {
    const timeBonus = Math.floor(distance * 10);
    const coinBonus = coins * 5;
    score += timeBonus + coinBonus;

    document.getElementById('endEmoji').textContent = distance > 100 ? '🏆' : '💥';
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('endStats').innerHTML = `
      Distance: ${Math.floor(distance)}m | Coins: ${coins}<br>
      Max Multiplier: x${multiplier}
    `;
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }, 500);
}

window.startGame = function() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hint').style.display = 'block';

  gameRunning = true;
  score = 0; coins = 0; distance = 0;
  speed = baseSpeed; multiplier = 1;
  frame = 0;
  objects = []; particles = [];
  player = { lane: 1, targetLane: 1, y: 0, vy: 0, isJumping: false, isSliding: false, slideTimer: 0, jumpPower: 12, gravity: 0.6 };

  loop();
};

function loop() {
  if (!gameRunning && objects.length === 0 && particles.length === 0) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

window.submitScore = async function() {
  if (!currentUser || !entryId || !roundId) {
    location.href = 'game-lobby3.html';
    return;
  }
  const btn = document.querySelector('#gameOverScreen .btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  try {
    await updateDoc(doc(db, 'subwayRunnerRounds', roundId, 'entries', entryId), {
      score: Math.floor(score),
      distance: Math.floor(distance),
      coins: coins,
      maxMultiplier: multiplier,
      character: 'jake',
      completedAt: serverTimestamp()
    });
    location.href = 'game-lobby3.html';
  } catch (err) {
    console.error('Submit error:', err);
    btn.disabled = false;
    btn.textContent = 'Try Again';
  }
};

// Idle render
function idleLoop() {
  if (!gameRunning) {
    drawBackground();
    requestAnimationFrame(idleLoop);
  }
}
idleLoop();
</script>
</body>
</html>
