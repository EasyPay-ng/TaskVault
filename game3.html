<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TaskVault – Subway Runner 2D</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root { --orange: #f97316; --gold: #f59e0b; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --purple: #8b5cf6; --cyan: #06b6d4; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { background: #0a0a1a; color: #fff; overflow: hidden; touch-action: none; user-select: none; height: 100vh; width: 100vw; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    .hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: rgba(0,0,0,0.6); z-index: 10; pointer-events: none; font-weight: 800; font-size: 14px; }
    .hud span { display: flex; align-items: center; gap: 4px; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .card { background: #1e293b; border: 2px solid var(--orange); border-radius: 16px; padding: 24px; text-align: center; max-width: 320px; width: 85%; }
    .card h1 { font-size: 22px; font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, var(--orange), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card p { color: #94a3b8; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .card h2 { font-size: 36px; font-weight: 900; margin: 8px 0; }
    .btn { width: 100%; padding: 14px; background: var(--orange); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 8px; }
    .hidden { display: none !important; }
    .controls-hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: #64748b; font-size: 12px; z-index: 10; pointer-events: none; text-align: center; }
    .music-toggle { position: fixed; top: 60px; right: 10px; z-index: 20; background: rgba(0,0,0,0.6); border: 1px solid #334155; border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="hud" id="hud" style="display:none;">
  <span>🏆 <span id="score">0</span></span>
  <span style="color:var(--cyan);">x<span id="multiplier">1</span></span>
  <span style="color:var(--gold);">🪙 <span id="coins">0</span></span>
</div>

<div class="controls-hint" id="hint" style="display:none;">
  ← → Swipe to switch lanes &nbsp; ↑ Swipe to jump
</div>

<button class="music-toggle" id="musicToggle" onclick="toggleMusic()" style="display:none;">🔊 Music On</button>

<div class="overlay" id="startScreen">
  <div class="card">
    <div style="font-size:48px;">🏃</div>
    <h1>Subway Runner 2D</h1>
    <p>Swipe left/right to dodge. Swipe up to jump over barriers. Collect coins & power-ups!</p>
    <button class="btn" onclick="startGame()">START RUNNING</button>
  </div>
</div>

<div class="overlay hidden" id="gameOverScreen">
  <div class="card">
    <div id="endEmoji" style="font-size:48px;">💥</div>
    <h2 id="finalScore">0</h2>
    <p id="endStats" style="color:#94a3b8;"></p>
    <button class="btn" onclick="submitScore()">SUBMIT SCORE</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
  authDomain: "taskvault-412a0.firebaseapp.com",
  projectId: "taskvault-412a0",
  storageBucket: "taskvault-412a0.firebasestorage.app",
  messagingSenderId: "420716701831",
  appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let entryId = sessionStorage.getItem('srEntryId');
let roundId = sessionStorage.getItem('srRoundId');

onAuthStateChanged(auth, (user) => {
  if (!user) { location.href = 'login.html'; return; }
  currentUser = user;
  if (!entryId || !roundId) location.href = 'game-lobby3.html';
});

// ========== AUDIO SYSTEM ==========
let audioCtx = null;
let musicOsc = null;
let musicGain = null;
let musicInterval = null;
let musicPlaying = true;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch(type) {
    case 'coin':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(1800, now + 0.08);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
      break;
    case 'powerup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      osc.frequency.setValueAtTime(1047, now + 0.3);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'jump':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    case 'crash':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
      break;
    case 'step':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(100, now);
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
      break;
  }
}

function startMusic() {
  if (!audioCtx || !musicPlaying) return;
  stopMusic();

  const notes = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63];
  let noteIdx = 0;

  musicInterval = setInterval(() => {
    if (!musicPlaying || !gameRunning) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(notes[noteIdx % notes.length], audioCtx.currentTime);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, audioCtx.currentTime);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.3);

    noteIdx++;
  }, 250);
}

function stopMusic() {
  if (musicInterval) {
    clearInterval(musicInterval);
    musicInterval = null;
  }
}

window.toggleMusic = function() {
  musicPlaying = !musicPlaying;
  document.getElementById('musicToggle').textContent = musicPlaying ? '🔊 Music On' : '🔇 Music Off';
  if (musicPlaying && gameRunning) {
    startMusic();
  } else {
    stopMusic();
  }
};

// ========== GAME SETUP ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, laneW, groundY, horizonY;
let gameRunning = false;
let score = 0, coins = 0, distance = 0;
let speed = 4, baseSpeed = 4, multiplier = 1;
let frame = 0;
let stepTimer = 0;

let player = { lane: 1, targetLane: 1, y: 0, vy: 0, isJumping: false, jumpPower: 14, gravity: 0.7 };
let objects = [];
let particles = [];
let tunnelLights = [];
let trackLines = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  laneW = Math.min(W / 3.2, 90);
  groundY = H * 0.82;
  horizonY = H * 0.25;
}
window.addEventListener('resize', resize);
resize();

// Initialize tunnel lights
for (let i = 0; i < 8; i++) {
  tunnelLights.push({ y: -100 + i * (H / 5), offset: Math.random() * Math.PI * 2 });
}

// Initialize track perspective lines
for (let i = 0; i < 20; i++) {
  trackLines.push({ z: i * 50, xOffset: 0 });
}

// Controls
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
    player.targetLane = Math.max(0, Math.min(2, player.targetLane + (dx > 0 ? 1 : -1)));
  } else if (dy < -40) {
    jump();
  }
}, { passive: true });

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') player.targetLane = Math.max(0, player.targetLane - 1);
  if (e.key === 'ArrowRight' || e.key === 'd') player.targetLane = Math.min(2, player.targetLane + 1);
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') jump();
});

function jump() {
  if (!gameRunning || player.isJumping) return;
  player.vy = player.jumpPower;
  player.isJumping = true;
  playSound('jump');
}

// ========== OBJECT SPAWNING (fall from top) ==========
function spawnObject() {
  const lane = Math.floor(Math.random() * 3);
  const typeRoll = Math.random();
  let type = 'coin';
  if (typeRoll < 0.18) type = 'barrier';
  else if (typeRoll < 0.28) type = 'low_barrier';
  else if (typeRoll < 0.36) type = 'train';
  else if (typeRoll < 0.44) type = 'powerup';

  const obj = {
    lane, type,
    x: W / 2 + (lane - 1) * laneW,
    y: -60,
    z: 0,
    w: 40, h: 40,
    collected: false,
    scale: 0.3,
    rot: 0
  };

  if (type === 'coin') {
    obj.w = 32; obj.h = 32;
  } else if (type === 'barrier') {
    obj.w = 55; obj.h = 45;
    obj.subtype = 'high';
  } else if (type === 'low_barrier') {
    obj.w = 55; obj.h = 22;
    obj.subtype = 'low';
  } else if (type === 'train') {
    obj.w = 90; obj.h = 70;
  } else if (type === 'powerup') {
    obj.w = 36; obj.h = 36;
    const types = ['magnet', 'shield', 'double'];
    obj.puType = types[Math.floor(Math.random() * types.length)];
  }

  objects.push(obj);
}

function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      life: 25 + Math.random() * 15,
      color, size: 3 + Math.random() * 4
    });
  }
}

// ========== DRAWING ==========
function getPerspectiveScale(y) {
  // Scale from 0.3 at top to 1.0 at ground
  const t = Math.max(0, Math.min(1, (y - horizonY) / (groundY - horizonY)));
  return 0.3 + t * 0.7;
}

function getPerspectiveX(baseX, y) {
  const t = Math.max(0, Math.min(1, (y - horizonY) / (groundY - horizonY)));
  const centerX = W / 2;
  return centerX + (baseX - centerX) * (0.3 + t * 0.7);
}

function drawSubwayBackground() {
  // Tunnel walls - dark curved effect
  const wallGrad = ctx.createLinearGradient(0, 0, W, 0);
  wallGrad.addColorStop(0, '#050510');
  wallGrad.addColorStop(0.15, '#0a0a1a');
  wallGrad.addColorStop(0.5, '#0f0f2a');
  wallGrad.addColorStop(0.85, '#0a0a1a');
  wallGrad.addColorStop(1, '#050510');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, 0, W, H);

  // Ceiling arches
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    const archY = horizonY - 30 + i * 25;
    ctx.beginPath();
    ctx.moveTo(0, archY);
    ctx.quadraticCurveTo(W / 2, archY - 40, W, archY);
    ctx.stroke();
  }

  // Tunnel lights on ceiling
  for (const light of tunnelLights) {
    light.y += speed * 0.8;
    if (light.y > H) light.y = -50;

    const t = Math.max(0, Math.min(1, (light.y - horizonY) / (groundY - horizonY)));
    const brightness = 0.3 + t * 0.7;
    const lx = W / 2 + Math.sin(light.y * 0.01 + light.offset) * 20;

    // Light glow
    const glow = ctx.createRadialGradient(lx, light.y, 0, lx, light.y, 30 * brightness);
    glow.addColorStop(0, `rgba(249, 115, 22, ${0.6 * brightness})`);
    glow.addColorStop(1, 'rgba(249, 115, 22, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(lx, light.y, 30 * brightness, 0, Math.PI * 2);
    ctx.fill();

    // Light fixture
    ctx.fillStyle = `rgba(255, 200, 100, ${brightness})`;
    ctx.beginPath();
    ctx.ellipse(lx, light.y, 8 * brightness, 4 * brightness, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Floor / platform
  const floorGrad = ctx.createLinearGradient(0, groundY, 0, H);
  floorGrad.addColorStop(0, '#1a1a2e');
  floorGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Track bed
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(W / 2 - laneW * 1.8, groundY, laneW * 3.6, H - groundY);

  // Rails
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  for (let i = -1; i <= 1; i++) {
    const rx = W / 2 + i * laneW;
    ctx.beginPath();
    ctx.moveTo(rx, groundY);
    ctx.lineTo(rx, H);
    ctx.stroke();
  }

  // Track ties (sleepers) with perspective
  for (const line of trackLines) {
    line.z += speed * 2;
    if (line.z > 400) line.z = 0;

    const t = line.z / 400;
    const ty = groundY + t * (H - groundY);
    const tw = 10 + t * 60;
    const tx = W / 2 - tw / 2;

    ctx.fillStyle = `rgba(60, 50, 40, ${0.3 + t * 0.7})`;
    ctx.fillRect(tx, ty, tw, 4 + t * 6);
  }

  // Side walls detail
  ctx.fillStyle = '#080815';
  ctx.fillRect(0, 0, W / 2 - laneW * 2, H);
  ctx.fillRect(W / 2 + laneW * 2, 0, W, H);

  // Wall pipes
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 4;
  for (let y = 0; y < H; y += 80) {
    const py = (y + frame * speed * 0.5) % (H + 80) - 40;
    ctx.beginPath();
    ctx.moveTo(20, py);
    ctx.lineTo(W / 2 - laneW * 2 - 10, py);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W / 2 + laneW * 2 + 10, py);
    ctx.lineTo(W - 20, py);
    ctx.stroke();
  }

  // Wall lights on sides
  for (let i = 0; i < 6; i++) {
    const ly = ((frame * speed * 0.3 + i * 120) % (H + 100)) - 50;
    const intensity = Math.max(0, 1 - Math.abs(ly - H / 2) / (H / 2));

    // Left wall light
    const lgL = ctx.createRadialGradient(30, ly, 0, 30, ly, 40);
    lgL.addColorStop(0, `rgba(249, 115, 22, ${0.4 * intensity})`);
    lgL.addColorStop(1, 'rgba(249, 115, 22, 0)');
    ctx.fillStyle = lgL;
    ctx.beginPath();
    ctx.arc(30, ly, 40, 0, Math.PI * 2);
    ctx.fill();

    // Right wall light
    const lgR = ctx.createRadialGradient(W - 30, ly, 0, W - 30, ly, 40);
    lgR.addColorStop(0, `rgba(249, 115, 22, ${0.4 * intensity})`);
    lgR.addColorStop(1, 'rgba(249, 115, 22, 0)');
    ctx.fillStyle = lgR;
    ctx.beginPath();
    ctx.arc(W - 30, ly, 40, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer() {
  const px = W / 2 + (player.lane - 1) * laneW;
  const py = groundY - 50 - player.y;

  ctx.save();
  ctx.translate(px, py);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, 52, 22, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Running bob
  const bob = player.isJumping ? 0 : Math.sin(frame * 0.3) * 3;

  // Body
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.roundRect(-16, -35 + bob, 32, 42, 10);
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffccaa';
  ctx.beginPath();
  ctx.arc(0, -48 + bob, 15, 0, Math.PI * 2);
  ctx.fill();

  // Cap
  ctx.fillStyle = '#2563eb';
  ctx.beginPath();
  ctx.arc(0, -55 + bob, 16, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-18, -55 + bob, 36, 6);

  // Face
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-5, -50 + bob, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5, -50 + bob, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -45 + bob, 3, 0, Math.PI);
  ctx.stroke();

  // Arms
  ctx.fillStyle = '#ffccaa';
  const armSwing = player.isJumping ? -0.5 : Math.sin(frame * 0.4) * 0.6;
  ctx.save();
  ctx.translate(-20, -20 + bob);
  ctx.rotate(armSwing);
  ctx.beginPath();
  ctx.roundRect(-5, 0, 10, 28, 5);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(20, -20 + bob);
  ctx.rotate(-armSwing);
  ctx.beginPath();
  ctx.roundRect(-5, 0, 10, 28, 5);
  ctx.fill();
  ctx.restore();

  // Legs
  ctx.fillStyle = '#1e3a5f';
  const legSwing = player.isJumping ? 0.3 : Math.sin(frame * 0.4 + Math.PI) * 0.5;
  ctx.save();
  ctx.translate(-10, 5 + bob);
  ctx.rotate(legSwing);
  ctx.beginPath();
  ctx.roundRect(-6, 0, 12, 30, 5);
  ctx.fill();
  // Shoe
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.roundRect(-7, 26, 16, 8, 3);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#1e3a5f';
  ctx.save();
  ctx.translate(10, 5 + bob);
  ctx.rotate(-legSwing);
  ctx.beginPath();
  ctx.roundRect(-6, 0, 12, 30, 5);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.roundRect(-9, 26, 16, 8, 3);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawObject(obj) {
  if (obj.collected) return;

  const scale = obj.scale;
  const sw = obj.w * scale;
  const sh = obj.h * scale;
  const ox = getPerspectiveX(obj.x, obj.y);
  const oy = obj.y;

  ctx.save();
  ctx.translate(ox, oy);

  if (obj.type === 'coin') {
    // Rotating coin effect
    const coinWidth = sw * Math.abs(Math.cos(obj.rot));
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.ellipse(0, 0, coinWidth / 2, sh / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner shine
    ctx.fillStyle = '#ffec8b';
    ctx.beginPath();
    ctx.ellipse(-2, -2, coinWidth / 4, sh / 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#b45309';
    ctx.font = `bold ${sh * 0.5}px Inter`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 1);

  } else if (obj.type === 'barrier') {
    // Red barrier - must jump over
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.roundRect(-sw / 2, -sh, sw, sh, 6);
    ctx.fill();

    // Warning stripes
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-sw / 2 + 3 + i * (sw / 3), -sh + 5, sw / 3 - 6, 5);
    }

    // Warning light
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(0, -sh - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(239, 68, 68, ${0.5 + Math.sin(frame * 0.2) * 0.5})`;
    ctx.beginPath();
    ctx.arc(0, -sh - 5, 10, 0, Math.PI * 2);
    ctx.fill();

  } else if (obj.type === 'low_barrier') {
    // Yellow low barrier - slide under (but we removed slide, so make it dodgeable)
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.roundRect(-sw / 2, -sh, sw, sh, 4);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeRect(-sw / 2 + 2, -sh + 2, sw - 4, sh - 4);

    // Arrow down indicator
    ctx.fillStyle = '#000';
    ctx.font = `bold ${sh * 0.6}px Inter`;
    ctx.textAlign = 'center';
    ctx.fillText('▼', 0, -sh / 2 + 3);

  } else if (obj.type === 'train') {
    // Blue subway train
    ctx.fillStyle = '#1d4ed8';
    ctx.beginPath();
    ctx.roundRect(-sw / 2, -sh, sw, sh, 12);
    ctx.fill();

    // Windows
    ctx.fillStyle = '#87ceeb';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.roundRect(-sw / 2 + 8 + i * (sw / 3), -sh + 10, sw / 3 - 10, sh * 0.35, 4);
      ctx.fill();
    }

    // Stripe
    ctx.fillStyle = '#f97316';
    ctx.fillRect(-sw / 2, -sh * 0.4, sw, 4);

    // Headlights
    ctx.fillStyle = '#fef08a';
    ctx.beginPath();
    ctx.arc(-sw / 3, -sh + sh * 0.75, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sw / 3, -sh + sh * 0.75, 5, 0, Math.PI * 2);
    ctx.fill();

    // Light beams
    ctx.fillStyle = 'rgba(254, 240, 138, 0.15)';
    ctx.beginPath();
    ctx.moveTo(-sw / 3 - 5, -sh + sh * 0.75);
    ctx.lineTo(-sw / 3 - 30, -sh + sh * 0.75 + 40);
    ctx.lineTo(-sw / 3 + 30, -sh + sh * 0.75 + 40);
    ctx.lineTo(-sw / 3 + 5, -sh + sh * 0.75);
    ctx.fill();

  } else if (obj.type === 'powerup') {
    const colors = { magnet: '#3b82f6', shield: '#8b5cf6', double: '#f59e0b' };
    const emojis = { magnet: '🧲', shield: '🛡️', double: '2️⃣' };
    const color = colors[obj.puType] || '#3b82f6';

    // Glow
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.2;
    ctx.beginPath();
    ctx.arc(0, 0, sw / 2 + 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Orb
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, sw / 2, 0, Math.PI * 2);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(-sw / 6, -sh / 6, sw / 5, 0, Math.PI * 2);
    ctx.fill();

    // Icon
    ctx.font = `${sh * 0.55}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emojis[obj.puType] || '⭐', 0, 2);
  }

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life / 30), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ========== GAME LOOP ==========
function update() {
  if (!gameRunning) return;

  frame++;
  distance += speed * 0.01;
  score += Math.floor(speed * 0.1 * multiplier);
  speed = Math.min(12, baseSpeed + distance * 0.008);
  multiplier = 1 + Math.floor(distance / 80);

  // Player lane smoothing
  player.lane += (player.targetLane - player.lane) * 0.12;

  // Jump physics
  if (player.isJumping) {
    player.vy -= player.gravity;
    player.y += player.vy;
    if (player.y <= 0) {
      player.y = 0;
      player.vy = 0;
      player.isJumping = false;
    }
  }

  // Spawn objects
  const spawnRate = Math.max(25, 55 - Math.floor(distance / 20));
  if (frame % spawnRate === 0) {
    spawnObject();
  }

  // Update objects (fall from top)
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    obj.y += speed * (0.8 + (obj.y / groundY) * 0.5); // accelerate as they get closer
    obj.scale = getPerspectiveScale(obj.y);
    obj.rot += 0.08;

    // Collision check
    if (!obj.collected && obj.y > groundY - 80 && obj.y < groundY + 20) {
      const px = W / 2 + (player.lane - 1) * laneW;
      const py = groundY - 50 - player.y;
      const ox = getPerspectiveX(obj.x, obj.y);
      const dist = Math.hypot(px - ox, py - (obj.y - obj.h * obj.scale / 2));

      if (dist < 35) {
        if (obj.type === 'coin') {
          obj.collected = true;
          coins++;
          score += 10 * multiplier;
          playSound('coin');
          createParticles(ox, obj.y, '#f59e0b', 8);
        } else if (obj.type === 'powerup') {
          obj.collected = true;
          score += 50;
          playSound('powerup');
          createParticles(ox, obj.y, '#3b82f6', 10);
        } else if (obj.type === 'barrier') {
          // Must be jumping to clear
          if (player.y < 30) {
            crash();
            return;
          }
        } else if (obj.type === 'low_barrier') {
          // Low barrier - just dodge it (same lane = crash)
          if (Math.abs(player.lane - obj.lane) < 0.5 && player.y < 15) {
            crash();
            return;
          }
        } else if (obj.type === 'train') {
          if (player.y < 50) {
            crash();
            return;
          }
        }
      }
    }

    // Remove off-screen
    if (obj.y > H + 100) {
      objects.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Step sound
  stepTimer++;
  if (stepTimer > 15 && !player.isJumping) {
    stepTimer = 0;
    playSound('step');
  }

  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSubwayBackground();

  // Draw objects behind player (higher up = further back)
  objects.sort((a, b) => a.y - b.y);

  for (const obj of objects) {
    drawObject(obj);
  }

  drawPlayer();
  drawParticles();
}

function updateHUD() {
  document.getElementById('score').textContent = Math.floor(score);
  document.getElementById('coins').textContent = coins;
  document.getElementById('multiplier').textContent = multiplier;
}

function crash() {
  gameRunning = false;
  stopMusic();
  playSound('crash');

  const px = W / 2 + (player.lane - 1) * laneW;
  const py = groundY - 50 - player.y;
  createParticles(px, py, '#ef4444', 25);

  // Screen shake effect
  let shake = 0;
  const shakeInterval = setInterval(() => {
    shake++;
    canvas.style.transform = `translate(${(Math.random() - 0.5) * 10}px, ${(Math.random() - 0.5) * 10}px)`;
    if (shake > 10) {
      clearInterval(shakeInterval);
      canvas.style.transform = 'none';
    }
  }, 30);

  setTimeout(() => {
    const timeBonus = Math.floor(distance * 10);
    const coinBonus = coins * 5;
    score += timeBonus + coinBonus;

    document.getElementById('endEmoji').textContent = distance > 150 ? '🏆' : '💥';
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('endStats').innerHTML = `
      Distance: ${Math.floor(distance)}m | Coins: ${coins}<br>
      Max Multiplier: x${multiplier}
    `;
    document.getElementById('gameOverScreen').classList.remove('hidden');
  }, 600);
}

// ========== GAME CONTROL ==========
window.startGame = function() {
  initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hint').style.display = 'block';
  document.getElementById('musicToggle').style.display = 'block';

  gameRunning = true;
  score = 0; coins = 0; distance = 0;
  speed = baseSpeed; multiplier = 1;
  frame = 0; stepTimer = 0;
  objects = []; particles = [];
  player = { lane: 1, targetLane: 1, y: 0, vy: 0, isJumping: false, jumpPower: 14, gravity: 0.7 };

  startMusic();
  gameLoop();
};

function gameLoop() {
  if (!gameRunning && particles.length === 0) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

window.submitScore = async function() {
  if (!currentUser || !entryId || !roundId) {
    location.href = 'game-lobby3.html';
    return;
  }
  const btn = document.querySelector('#gameOverScreen .btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  try {
    await updateDoc(doc(db, 'subwayRunnerRounds', roundId, 'entries', entryId), {
      score: Math.floor(score),
      distance: Math.floor(distance),
      coins: coins,
      maxMultiplier: multiplier,
      character: 'jake',
      completedAt: serverTimestamp()
    });
    location.href = 'game-lobby3.html';
  } catch (err) {
    console.error('Submit error:', err);
    btn.disabled = false;
    btn.textContent = 'Try Again';
  }
};

// Idle render
function idleLoop() {
  if (!gameRunning) {
    drawSubwayBackground();
    // Draw idle player
    const px = W / 2;
    const py = groundY - 50 + Math.sin(Date.now() * 0.003) * 3;
    ctx.save();
    ctx.translate(px, py);
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath();
    ctx.roundRect(-16, -35, 32, 42, 10);
    ctx.fill();
    ctx.fillStyle = '#ffccaa';
    ctx.beginPath();
    ctx.arc(0, -48, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    requestAnimationFrame(idleLoop);
  }
}
idleLoop();
</script>
