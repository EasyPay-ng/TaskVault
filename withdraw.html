<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Withdraw</title>
   
    <link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-main: #FF8C42;
            --orange-dark: #E67A35;
            --orange-light: #FFF0E6;
            --silk-bg: #FDFBF7;
            --white: #FFF;
            --text-dark: #333;
            --text-light: #888;
            --success: #10B981;
            --success-light: #D1FAE5;
            --danger: #EF4444;
            --danger-light: #FEE2E2;
            --warning: #F59E0B;
            --warning-light: #FFFBEB;
            --shadow-sm: 0 2px 6px rgba(255, 140, 66, 0.06);
            --shadow-md: 0 4px 12px rgba(255, 140, 66, 0.1);
            --shadow-lg: 0 8px 24px rgba(255, 140, 66, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            height: 100dvh;
            max-width: 430px;
            background: var(--silk-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .app-container {
                height: 92dvh;
                max-height: 850px;
                border-radius: 24px;
                box-shadow: 0 0 40px rgba(0,0,0,0.12);
            }
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            padding: 16px 20px 12px;
            background: var(--white);
            flex-shrink: 0;
        }

        .header h1 {
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--orange-main);
            font-size: 16px;
        }

        /* Balance Display Card */
        .balance-section {
            padding: 16px 20px;
        }

        .balance-card {
            background: var(--white);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 140, 66, 0.06);
        }

        .balance-card p {
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            font-family: 'SF Mono', monospace;
        }

        /* Withdrawal Form */
        .form-section {
            padding: 0 20px 16px;
        }

        .form-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 140, 66, 0.06);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-light);
            font-size: 14px;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-size: 13px;
            background: var(--silk-bg);
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus, .input-wrapper select:focus {
            border-color: var(--orange-main);
        }

        .btn-withdraw {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
        }

        .btn-withdraw:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* KYC Restriction Overlay Card */
        .restriction-card {
            background: var(--danger-light);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
            display: none; /* Controlled by Javascript */
        }

        .restriction-card i {
            font-size: 28px;
            color: var(--danger);
            margin-bottom: 10px;
        }

        .restriction-card h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .restriction-card p {
            font-size: 12px;
            color: var(--danger);
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .btn-verify-now {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
        }

        /* Modern Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 16px 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            z-index: 1000;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 9px;
            gap: 3px;
            transition: all 0.3s ease;
            padding: 6px 14px;
            border-radius: 14px;
            font-weight: 500;
        }

        .nav-item i {
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .nav-item.active {
            color: var(--orange-main);
            background: var(--orange-light);
        }

        .nav-item.active i {
            transform: translateY(-2px) scale(1.1);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--white);
            color: var(--text-dark);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 4000;
            max-width: 90%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            border-left: 3px solid var(--orange-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-left-color: #10B981; }
        .toast.error { border-left-color: #EF4444; }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <header class="header fade-in">
            <h1><i class="fa-solid fa-arrow-up-from-bracket"></i> Withdraw Funds</h1>
        </header>

        <!-- SCROLLABLE CONTENT -->
        <div class="scroll-content">
            <!-- BALANCE CARD -->
            <section class="balance-section fade-in">
                <div class="balance-card">
                    <p>Available Balance</p>
                    <div class="balance-amount" id="withdrawalBalance">$0.000</div>
                </div>
            </section>

            <!-- FORM OR RESTRICTION INTERACTION -->
            <section class="form-section fade-in">
                
                <!-- KYC Warning Message Displayed when user is unverified -->
                <div class="restriction-card" id="kycRestrictionCard">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <h3>Withdrawal Locked</h3>
                    <p id="kycRestrictionText">You must complete your identity setup before accessing payouts.</p>
                    <a href="kyc.html" class="btn-verify-now">
                        <i class="fa-solid fa-id-card"></i> Verify Now
                    </a>
                </div>

                <!-- Withdrawal Inputs Form Container -->
                <div class="form-card" id="withdrawalFormCard">
                    <form id="withdrawForm" onsubmit="handleWithdrawal(event)">
                        <div class="input-group">
                            <label for="method">Payout Gateway</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-bank"></i>
                                <select id="method" required>
                                    <option value="" disabled selected>Select method</option>
                                    <option value="bank">Bank Transfer</option>
                                    <option value="crypto">USDT (TRC-20)</option>
                                    <option value="paypal">PayPal</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="address">Account Details / Wallet Address</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-wallet"></i>
                                <input type="text" id="address" placeholder="Enter payout recipient value" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="amount">Withdraw Amount ($)</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-dollar-sign"></i>
                                <input type="number" id="amount" step="0.001" min="1" placeholder="0.000" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-withdraw" id="submitWithdrawBtn">
                            <i class="fa-solid fa-paper-plane"></i> Submit Request
                        </button>
                    </form>
                </div>
            </section>
        </div>

        <!-- MODERN BOTTOM NAV -->
        <nav class="bottom-nav">
            <a href="menu.html" class="nav-item">
                <i class="fa-solid fa-bars-staggered"></i>
                <span>Menu</span>
            </a>
            <a href="deposit.html" class="nav-item">
                <i class="fa-solid fa-wallet"></i>
                <span>Deposit</span>
            </a>
            <a href="withdraw.html" class="nav-item active">
                <i class="fa-solid fa-arrow-up-from-bracket"></i>
                <span>Withdraw</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- TOAST ALERT -->
    <div id="toast" class="toast">Message</div>

    <!-- FIREBASE SERVICES -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Exact production configuration from your profile system
        const firebaseConfig = {
            apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
            authDomain: "taskvault-412a0.firebaseapp.com",
            databaseURL: "https://taskvault-412a0-default-rtdb.firebaseio.com",
            projectId: "taskvault-412a0",
            storageBucket: "taskvault-412a0.firebasestorage.app",
            messagingSenderId: "420716701831",
            appId: "1:420716701831:web:c987d91f7f4c8684eb7022",
            measurementId: "G-93JG3LB08B"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentBalance = 0;
        let globalKycStatus = 'pending';
        let userUnsubscribe = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                // Initialize the same real-time security system listener used on profile page
                startWithdrawalDataListener(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        function startWithdrawalDataListener(uid) {
            if (userUnsubscribe) userUnsubscribe();

            userUnsubscribe = db.collection('users').doc(uid).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    
                    // Track global balance state natively
                    currentBalance = data.balance || 0;
                    document.getElementById('withdrawalBalance').textContent = '$' + currentBalance.toFixed(3);
                    
                    // Track and execute UI updates based on KYC verification status matrix
                    globalKycStatus = data.kycStatus || 'pending';
                    evaluateKycPermissions(globalKycStatus, data.kycRejectionReason);
                } else {
                    // Fallback state if no Firestore profile doc exists yet
                    evaluateKycPermissions('pending', null);
                }
            }, (error) => {
                console.error("Data tracking initialization failure:", error);
                showToast('Error syncing wallet values', 'error');
            });
        }

        function evaluateKycPermissions(status, reason) {
            const restrictionCard = document.getElementById('kycRestrictionCard');
            const restrictionText = document.getElementById('kycRestrictionText');
            const formCard = document.getElementById('withdrawalFormCard');
            const submitBtn = document.getElementById('submitWithdrawBtn');

            if (status === 'verified') {
                // User verified: Hide warnings, cleanly reveal inputs and action routes
                restrictionCard.style.display = 'none';
                formCard.style.opacity = '1';
                formCard.style.pointerEvents = 'auto';
                submitBtn.disabled = false;
                submitBtn.style.filter = 'none';
            } else {
                // User either Pending or Rejected: surface warning cards & structure inputs to un-clickable states
                restrictionCard.style.display = 'block';
                formCard.style.opacity = '0.4';
                formCard.style.pointerEvents = 'none';
                submitBtn.disabled = true;

                if (status === 'rejected') {
                    restrictionText.innerHTML = `Your profile identity files were rejected.<br><strong>Reason:</strong> ${reason || 'Invalid data inputs structure'}`;
                } else {
                    restrictionText.textContent = "Your identification documents are currently under evaluation review. Withdrawals will remain locked until verified.";
                }
            }
        }

        async function handleWithdrawal(event) {
            event.preventDefault();

            // Fail-safe conditional loop enforcement: blocks submissions even if CSS/HTML is engineered away via inspector
            if (globalKycStatus !== 'verified') {
                showToast('Access Violation: Complete KYC confirmation first.', 'error');
                return;
            }

            const method = document.getElementById('method').value;
            const address = document.getElementById('address').value;
            const amount = parseFloat(document.getElementById('amount').value);

            if (isNaN(amount) || amount <= 0) {
                showToast('Please enter a valid numeric amount.', 'error');
                return;
            }

            if (amount > currentBalance) {
                showToast('Insufficient funding balance.', 'error');
                return;
            }

            try {
                document.getElementById('submitWithdrawBtn').disabled = true;
                
                // Write transaction into Firestore records history collection pipeline
                await db.collection('withdrawals').add({
                    userId: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    amount: amount,
                    method: method,
                    payoutDetails: address,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Deduct balance from customer profile
                await db.collection('users').doc(auth.currentUser.uid).update({
                    balance: currentBalance - amount
                });

                showToast('Withdrawal order applied successfully!', 'success');
                document.getElementById('withdrawForm').reset();

            } catch (err) {
                console.error("Transaction pipeline processing structural failure: ", err);
                showToast('System operational error. Process aborted.', 'error');
            } finally {
                document.getElementById('submitWithdrawBtn').disabled = false;
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.addEventListener('beforeunload', () => {
            if (userUnsubscribe) userUnsubscribe();
        });
    </script>
</body>
</html>
