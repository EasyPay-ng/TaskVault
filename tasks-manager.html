<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Advertised Tasks — TaskVault</title>

  <link rel="icon" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg" type="image/jpeg">
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange-main: #FF8C42;
      --orange-dark: #E67A35;
      --orange-light: #FFF0E6;
      --silk-bg: #FDFBF7;
      --white: #FFFFFF;
      --text-dark: #333333;
      --text-light: #888888;
      --shadow-sm: 0 2px 6px rgba(255, 140, 66, 0.06);
      --shadow-md: 0 4px 12px rgba(255, 140, 66, 0.1);
      --shadow-lg: 0 8px 24px rgba(255, 140, 66, 0.15);
      --gradient-orange: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --info: #3B82F6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #e9ecef;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      width: 100%;
      height: 100dvh;
      max-width: 430px;
      background-color: var(--silk-bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .app-container {
        height: 92dvh;
        max-height: 850px;
        border-radius: 24px;
        box-shadow: 0 0 40px rgba(0,0,0,0.12);
      }
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    .scroll-content::-webkit-scrollbar {
      width: 2px;
    }
    .scroll-content::-webkit-scrollbar-track {
      background: transparent;
    }
    .scroll-content::-webkit-scrollbar-thumb {
      background: var(--orange-light);
      border-radius: 2px;
    }

    /* ==================== HEADER ==================== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 10px;
      background: var(--white);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--orange-light);
      color: var(--orange-main);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      text-decoration: none;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: var(--orange-main);
      color: white;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .header-subtitle {
      font-size: 10px;
      color: var(--text-light);
      font-weight: 400;
    }

    /* ==================== STATS ROW ==================== */
    .stats-section {
      padding: 10px 20px 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      border: 1px solid rgba(255, 140, 66, 0.06);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--orange-dark);
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-light);
      margin-top: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* ==================== SEARCH & CONTROLS ==================== */
    .controls-section {
      padding: 0 20px 12px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 14px;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border-radius: 10px;
      background: var(--white);
      border: 1px solid rgba(255, 140, 66, 0.15);
      color: var(--text-dark);
      font-size: 13px;
      font-weight: 500;
      outline: none;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }

    .search-input:focus {
      border-color: var(--orange-main);
      box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.1);
    }

    .btn-refresh {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--white);
      border: 1px solid rgba(255, 140, 66, 0.15);
      color: var(--orange-main);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .btn-refresh:hover {
      background: var(--orange-main);
      color: white;
      border-color: var(--orange-main);
    }

    .btn-refresh.spinning i {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==================== TASK LIST ==================== */
    .list-section {
      padding: 0 20px 14px;
    }

    .section-header {
      padding: 0 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title i {
      color: var(--orange-main);
      font-size: 12px;
    }

    .task-count {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: var(--white);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255, 140, 66, 0.06);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .task-card:hover {
      transform: translateX(2px);
      box-shadow: var(--shadow-md);
      border-color: rgba(255, 140, 66, 0.15);
    }

    .task-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--orange-main);
      border-radius: 16px 0 0 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .task-card:hover::before {
      opacity: 1;
    }

    .task-card.pending::before { background: var(--warning); }
    .task-card.approved::before { background: var(--success); }
    .task-card.rejected::before { background: var(--danger); }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .task-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      flex: 1;
      padding-right: 10px;
    }

    .task-status {
      font-size: 9px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .task-status.pending {
      background: #FEF3C7;
      color: #92400E;
    }

    .task-status.approved {
      background: #D1FAE5;
      color: #065F46;
    }

    .task-status.rejected {
      background: #FEE2E2;
      color: #991B1B;
    }

    .task-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
    }

    .meta-item i {
      font-size: 12px;
      color: var(--orange-main);
    }

    .task-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #e5e7eb;
    }

    .detail-box {
      text-align: center;
    }

    .detail-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .detail-label {
      font-size: 9px;
      color: var(--text-light);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .submissions-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--orange-light);
      color: var(--orange-dark);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }

    .task-thumbnail {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 10px;
      border: 1px solid rgba(255, 140, 66, 0.1);
    }

    /* ==================== EMPTY STATE ==================== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .empty-state i {
      font-size: 48px;
      color: var(--orange-light);
      margin-bottom: 12px;
      display: block;
    }

    .empty-state h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 16px;
    }

    .btn-create {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: 10px;
      background: var(--gradient-orange);
      color: white;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }

    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ==================== ERROR STATE ==================== */
    .error-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .error-state i {
      font-size: 48px;
      color: var(--danger);
      margin-bottom: 12px;
      display: block;
    }

    .error-state h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .error-state p {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      background: var(--gradient-orange);
      color: white;
      font-size: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-retry:hover {
      transform: translateY(-1px);
    }

    /* ==================== SUBMISSIONS OVERLAY ==================== */
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 2600;
      padding: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .overlay.show {
      display: flex;
      opacity: 1;
    }

    .panel {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      max-height: 850px;
      background: var(--silk-bg);
      border-radius: 0;
      padding: 0;
      box-shadow: var(--shadow-xl);
      overflow-y: auto;
      overflow-x: hidden;
      transform: scale(0.95) translateY(20px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
    }

    .overlay.show .panel {
      transform: scale(1) translateY(0);
    }

    @media (min-width: 768px) {
      .panel {
        border-radius: 24px;
        height: 92dvh;
      }
    }

    .panel-header {
      background: var(--gradient-orange);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .panel-header h3 {
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .close-x {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-size: 16px;
    }

    .close-x:hover {
      background: rgba(255,255,255,0.3);
      transform: rotate(90deg);
    }

    .panel-body {
      padding: 16px 20px 80px;
      flex: 1;
      overflow-y: auto;
    }

    .panel-body::-webkit-scrollbar {
      width: 2px;
    }
    .panel-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel-body::-webkit-scrollbar-thumb {
      background: var(--orange-light);
      border-radius: 2px;
    }

    .task-summary {
      background: var(--white);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 140, 66, 0.06);
      box-shadow: var(--shadow-sm);
    }

    .task-summary h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .task-summary-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--text-light);
    }

    .submission-item {
      background: var(--white);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 140, 66, 0.06);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .submission-item:hover {
      transform: translateX(2px);
      box-shadow: var(--shadow-md);
    }

    .submission-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .submission-user {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .submission-status {
      font-size: 9px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .submission-status.pending {
      background: #FEF3C7;
      color: #92400E;
    }

    .submission-status.approved {
      background: #D1FAE5;
      color: #065F46;
    }

    .submission-status.rejected {
      background: #FEE2E2;
      color: #991B1B;
    }

    .submission-date {
      font-size: 10px;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .submission-proof {
      font-size: 12px;
      color: var(--text-dark);
      line-height: 1.5;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .submission-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 8px;
      border: 1px solid rgba(255, 140, 66, 0.1);
      cursor: pointer;
    }

    .submission-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-action {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .btn-approve {
      background: #D1FAE5;
      color: #065F46;
    }

    .btn-approve:hover {
      background: #10B981;
      color: white;
    }

    .btn-reject {
      background: #FEE2E2;
      color: #991B1B;
    }

    .btn-reject:hover {
      background: #EF4444;
      color: white;
    }

    .no-submissions {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .no-submissions i {
      font-size: 40px;
      color: var(--orange-light);
      margin-bottom: 10px;
      display: block;
    }

    .no-submissions h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .no-submissions p {
      font-size: 11px;
    }

    /* ==================== TOAST ==================== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--white);
      color: var(--text-dark);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 3000;
      text-align: center;
      max-width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      border: 1px solid rgba(255, 140, 66, 0.08);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      top: 22px;
    }

    .toast.success { border-left: 3px solid #10B981; }
    .toast.error { border-left: 3px solid #EF4444; }
    .toast.info { border-left: 3px solid var(--orange-main); }

    /* ==================== LOADING ==================== */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--silk-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3000;
      gap: 12px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--orange-light);
      border-top: 3px solid var(--orange-main);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loader-text {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: 2px;
    }

    /* ==================== BOTTOM NAV ==================== */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 16px 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      text-decoration: none;
      font-size: 9px;
      gap: 3px;
      transition: all 0.3s ease;
      padding: 6px 14px;
      border-radius: 14px;
      font-weight: 500;
      position: relative;
    }

    .nav-item i {
      font-size: 20px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .nav-item.active {
      color: var(--orange-main);
      background: var(--orange-light);
    }

    .nav-item.active i {
      transform: translateY(-2px) scale(1.1);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: -2px;
      width: 16px;
      height: 3px;
      background: var(--orange-main);
      border-radius: 2px;
      opacity: 0;
      animation: dotIn 0.3s ease forwards;
    }

    @keyframes dotIn {
      to { opacity: 1; top: 2px; }
    }

    .nav-item:hover {
      color: var(--orange-dark);
    }

    /* ==================== ANIMATIONS ==================== */
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.24s; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loader-text">Loading</div>
  </div>

  <div class="app-container">
    <!-- HEADER -->
    <header class="header fade-in">
      <div class="header-left">
        <a href="dashboard.html" class="back-btn">
          <i class="ri-arrow-left-line"></i>
        </a>
        <div>
          <div class="header-title">My Advertised Tasks</div>
          <div class="header-subtitle">Tasks you created and their submissions</div>
        </div>
      </div>
    </header>

    <!-- SCROLLABLE CONTENT -->
    <div class="scroll-content">
      <!-- STATS -->
      <section class="stats-section fade-in delay-1">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total Tasks</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statPending" style="color: var(--warning);">0</div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statApproved" style="color: var(--success);">0</div>
            <div class="stat-label">Approved</div>
          </div>
        </div>
      </section>

      <!-- SEARCH -->
      <section class="controls-section fade-in delay-2">
        <div class="controls-row">
          <div class="search-wrap">
            <i class="ri-search-line"></i>
            <input id="searchInput" class="search-input" type="text" placeholder="Search by title, platform or status" />
          </div>
          <button id="refreshBtn" class="btn-refresh" onclick="refreshTasks()">
            <i class="ri-refresh-line"></i>
          </button>
        </div>
      </section>

      <!-- TASK LIST -->
      <section class="list-section fade-in delay-3">
        <div class="section-header">
          <h3 class="section-title">
            <i class="ri-list-check-2"></i>
            Your Tasks
          </h3>
          <span class="task-count" id="taskCount">0 tasks</span>
        </div>
        <div class="task-list" id="taskList">
          <div class="empty-state">
            <i class="ri-folder-open-line"></i>
            <h3>No tasks yet</h3>
            <p>Create your first advertising task to get started.</p>
            <a href="advertise.html" class="btn-create">
              <i class="ri-add-line"></i> Create Task
            </a>
          </div>
        </div>
      </section>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <a href="menu.html" class="nav-item">
        <i class="ri-apps-line"></i>
        <span>Menu</span>
      </a>
      <a href="deposit.html" class="nav-item">
        <i class="ri-wallet-3-line"></i>
        <span>Deposit</span>
      </a>
      <a href="withdraw.html" class="nav-item">
        <i class="ri-upload-2-line"></i>
        <span>Withdraw</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <i class="ri-user-3-line"></i>
        <span>Profile</span>
      </a>
    </nav>
  </div>

  <!-- SUBMISSIONS OVERLAY (FULL PAGE PANEL) -->
  <div id="overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="panel" role="document">
      <div class="panel-header">
        <h3><i class="ri-file-list-3-line"></i> Task Submissions</h3>
        <button class="close-x" onclick="closeOverlay()">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="panel-body" id="overlayContent">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Message</div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
      authDomain: "taskvault-412a0.firebaseapp.com",
      databaseURL: "https://taskvault-412a0-default-rtdb.firebaseio.com",
      projectId: "taskvault-412a0",
      storageBucket: "taskvault-412a0.firebasestorage.app",
      messagingSenderId: "420716701831",
      appId: "1:420716701831:web:c987d91f7f4c8684eb7022",
      measurementId: "G-93JG3LB08B"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let allTasks = [];
    let taskSubmissions = {}; // Map of taskId -> submissions array
    let unsubscribeTasks = null;

    function fmtMoney(n){ return '$' + Number(n || 0).toFixed(3); }
    function escapeHtml(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function showToast(message, type = 'info'){
      const toast = document.getElementById('toast');
      toast.className = 'toast ' + type;
      let icon = 'ri-information-line';
      if (type === 'success') icon = 'ri-checkbox-circle-line';
      if (type === 'error') icon = 'ri-close-circle-line';
      toast.innerHTML = `<i class="ri-${icon}"></i> ${message}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function niceDate(ts){
      try{
        if(!ts) return '-';
        if(ts.toDate) ts = ts.toDate();
        return new Date(ts).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      }catch{return '-';}
    }

    // ---- Auth ----
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        showToast('Please sign in first', 'error');
        document.getElementById('loadingOverlay').style.display = 'none';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        return;
      }
      currentUser = user;
      loadTasks(user.uid);
    });

    // ---- Load Tasks ----
    function loadTasks(uid) {
      if (unsubscribeTasks) unsubscribeTasks();

      const tasksQuery = db.collection('advertise_tasks').where('owner', '==', uid);

      unsubscribeTasks = tasksQuery.onSnapshot((snapshot) => {
        allTasks = [];
        snapshot.forEach((doc) => {
          const data = doc.data();
          allTasks.push({
            id: doc.id,
            ...data,
            createdAt: data.createdAt,
            submissionCount: 0
          });
        });

        allTasks.sort((a, b) => {
          const at = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
          const bt = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
          return bt - at;
        });

        // Load submission counts for each task
        loadSubmissionCounts();

        renderTasks();
        updateStats();
        document.getElementById('loadingOverlay').style.display = 'none';
      }, (err) => {
        console.error('Firestore error:', err);
        document.getElementById('loadingOverlay').style.display = 'none';
        const listEl = document.getElementById('taskList');
        listEl.innerHTML = `
          <div class="error-state">
            <i class="ri-error-warning-line"></i>
            <h3>Failed to load tasks</h3>
            <p>${err.message || 'Please check your connection and try again.'}</p>
            <button class="btn-retry" onclick="retryLoad()">
              <i class="ri-refresh-line"></i> Try Again
            </button>
          </div>
        `;
        showToast('Error loading tasks: ' + (err.message || 'Unknown error'), 'error');
      });
    }

    // ---- Load submission counts for all tasks ----
    async function loadSubmissionCounts() {
      for (const task of allTasks) {
        try {
          const snap = await db.collection('advert_submissions')
            .where('advertId', '==', task.id)
            .get();
          task.submissionCount = snap.size;
          task.submissions = [];
          snap.forEach(doc => {
            task.submissions.push({ id: doc.id, ...doc.data() });
          });
        } catch (err) {
          console.warn('Error loading submissions for task', task.id, err);
          task.submissionCount = 0;
          task.submissions = [];
        }
      }
      renderTasks(); // Re-render with counts
    }

    function retryLoad() {
      if (currentUser) {
        document.getElementById('taskList').innerHTML = '';
        loadTasks(currentUser.uid);
      }
    }

    function updateStats() {
      const total = allTasks.length;
      const pending = allTasks.filter(t => (t.status || 'pending').toLowerCase() === 'pending').length;
      const approved = allTasks.filter(t => (t.status || '').toLowerCase() === 'approved').length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statApproved').textContent = approved;
    }

    function renderTasks() {
      const searchVal = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      const listEl = document.getElementById('taskList');
      const countEl = document.getElementById('taskCount');

      let filtered = allTasks;
      if (searchVal) {
        filtered = allTasks.filter(t => 
          (t.title || '').toLowerCase().includes(searchVal) ||
          (t.platform || '').toLowerCase().includes(searchVal) ||
          (t.status || '').toLowerCase().includes(searchVal)
        );
      }

      countEl.textContent = `${filtered.length} task${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <i class="ri-folder-open-line"></i>
            <h3>${searchVal ? 'No matches found' : 'No tasks yet'}</h3>
            <p>${searchVal ? 'Try a different search term.' : 'Create your first advertising task to get started.'}</p>
            ${!searchVal ? `<a href="advertise.html" class="btn-create"><i class="ri-add-line"></i> Create Task</a>` : ''}
          </div>
        `;
        return;
      }

      listEl.innerHTML = '';
      filtered.forEach(task => {
        const status = (task.status || 'pending').toLowerCase();
        const card = document.createElement('div');
        card.className = `task-card ${status}`;
        card.onclick = () => openSubmissionsOverlay(task);

        card.innerHTML = `
          <div class="task-header">
            <div class="task-title">${escapeHtml(task.title || 'Untitled Task')}</div>
            <div class="task-status ${status}">${escapeHtml(task.status || 'PENDING')}</div>
          </div>
          <div class="task-meta">
            <div class="meta-item"><i class="ri-global-line"></i> ${escapeHtml(task.platform || '-')}</div>
            <div class="meta-item"><i class="ri-price-tag-3-line"></i> ${escapeHtml(task.subcategory || '-')}</div>
            <div class="meta-item"><i class="ri-time-line"></i> ${niceDate(task.createdAt)}</div>
          </div>
          <div class="task-details">
            <div class="detail-box">
              <div class="detail-value">${fmtMoney(task.unitPrice)}</div>
              <div class="detail-label">Unit Price</div>
            </div>
            <div class="detail-box">
              <div class="detail-value">${task.workers || 0}</div>
              <div class="detail-label">Workers</div>
            </div>
            <div class="detail-box">
              <div class="detail-value" style="color: var(--orange-dark);">${fmtMoney(task.totalCost)}</div>
              <div class="detail-label">Total Cost</div>
            </div>
          </div>
          <div class="submissions-badge">
            <i class="ri-user-received-line"></i> ${task.submissionCount || 0} submission${task.submissionCount !== 1 ? 's' : ''}
          </div>
          ${task.thumbnail ? `<img class="task-thumbnail" src="${task.thumbnail}" alt="Task thumbnail" onclick="event.stopPropagation()" />` : ''}
        `;
        listEl.appendChild(card);
      });
    }

    // ---- Open Submissions Overlay (Full Page Panel) ----
    function openSubmissionsOverlay(task) {
      const content = document.getElementById('overlayContent');
      const status = (task.status || 'pending').toLowerCase();

      let submissionsHtml = '';
      if (!task.submissions || task.submissions.length === 0) {
        submissionsHtml = `
          <div class="no-submissions">
            <i class="ri-inbox-line"></i>
            <h4>No submissions yet</h4>
            <p>Workers haven't submitted proofs for this task yet.</p>
          </div>
        `;
      } else {
        submissionsHtml = task.submissions.map(sub => {
          const subStatus = (sub.status || 'pending').toLowerCase();
          return `
            <div class="submission-item">
              <div class="submission-header">
                <div class="submission-user">${escapeHtml(sub.username || sub.userName || sub.userId?.substring(0, 8) || 'Unknown')}</div>
                <div class="submission-status ${subStatus}">${escapeHtml(sub.status || 'PENDING')}</div>
              </div>
              <div class="submission-date">${niceDate(sub.createdAt)}</div>
              ${sub.textProof ? `<div class="submission-proof">${escapeHtml(sub.textProof)}</div>` : ''}
              ${sub.imageUrl ? `<img class="submission-img" src="${sub.imageUrl}" alt="Proof" onclick="window.open('${sub.imageUrl}', '_blank')" />` : ''}
              ${subStatus === 'pending' ? `
                <div class="submission-actions">
                  <button class="btn-action btn-approve" onclick="reviewSubmission('${task.id}', '${sub.id}', 'approved')">
                    <i class="ri-check-line"></i> Approve
                  </button>
                  <button class="btn-action btn-reject" onclick="reviewSubmission('${task.id}', '${sub.id}', 'rejected')">
                    <i class="ri-close-line"></i> Reject
                  </button>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      }

      content.innerHTML = `
        <div class="task-summary">
          <h4>${escapeHtml(task.title || 'Untitled Task')}</h4>
          <div class="task-summary-meta">
            <span><i class="ri-global-line"></i> ${escapeHtml(task.platform || '-')}</span>
            <span><i class="ri-price-tag-3-line"></i> ${escapeHtml(task.subcategory || '-')}</span>
            <span><i class="ri-coins-line"></i> ${fmtMoney(task.unitPrice)} / worker</span>
            <span><i class="ri-user-line"></i> ${task.submissionCount || 0} submissions</span>
          </div>
        </div>
        ${submissionsHtml}
      `;

      document.getElementById('overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    // ---- Review Submission (Approve/Reject) ----
    async function reviewSubmission(taskId, submissionId, newStatus) {
      try {
        await db.collection('advert_submissions').doc(submissionId).update({
          status: newStatus,
          reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast(`Submission ${newStatus}!`, 'success');
        // Refresh submissions for this task
        const task = allTasks.find(t => t.id === taskId);
        if (task) {
          const snap = await db.collection('advert_submissions')
            .where('advertId', '==', taskId)
            .get();
          task.submissions = [];
          snap.forEach(doc => task.submissions.push({ id: doc.id, ...doc.data() }));
          openSubmissionsOverlay(task);
        }
      } catch (err) {
        console.error('Review error:', err);
        showToast('Failed to update submission', 'error');
      }
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('show');
      document.body.style.overflow = '';
    }

    document.getElementById('overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('overlay')) closeOverlay();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('overlay').classList.contains('show')) closeOverlay();
    });

    // ---- Refresh ----
    function refreshTasks() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');
      if (currentUser) {
        loadTasks(currentUser.uid);
      }
      setTimeout(() => btn.classList.remove('spinning'), 800);
    }

    // ---- Search ----
    document.getElementById('searchInput').addEventListener('input', renderTasks);

    // Active nav
    document.addEventListener('DOMContentLoaded', () => {
      const currentPage = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-item').forEach(item => {
        const href = item.getAttribute('href');
        if (href === currentPage) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
