<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>TaskVault – Vault Rush</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --purple: #8b5cf6;
      --blue: #3b82f6;
      --cyan: #06b6d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #0f172a;
      color: #fff;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.4;
    }
    
    #videoOverlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,23,42,0.7) 0%, rgba(15,23,42,0.4) 50%, rgba(15,23,42,0.8) 100%);
      z-index: 1;
      pointer-events: none;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 2;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    .hud-item {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: .5rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .hud-label {
      font-size: .65rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .hud-value {
      font-size: 1.25rem;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .hud-score { color: var(--gold); }
    .hud-time { color: var(--orange); }
    .hud-combo { color: var(--green); }

    #powerups {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: .5rem;
      pointer-events: none;
      z-index: 10;
    }
    .powerup-badge {
      padding: .35rem .75rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .35rem;
      animation: popIn .3s ease;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
    }
    .powerup-2x { color: var(--gold); border: 1px solid var(--gold); }
    .powerup-magnet { color: var(--purple); border: 1px solid var(--purple); }
    .powerup-shield { color: var(--blue); border: 1px solid var(--blue); }
    .powerup-speed { color: var(--cyan); border: 1px solid var(--cyan); }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #startScreen, #gameOverScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
    }
    #startScreen {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
    }
    #gameOverScreen {
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(16px);
      display: none;
    }

    .screen-title {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .5rem;
    }
    .screen-subtitle {
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .controls-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      max-width: 320px;
    }
    .control-item {
      background: rgba(255,255,255,0.08);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .control-icon {
      font-size: 1.5rem;
      margin-bottom: .5rem;
    }
    .control-text {
      font-size: .8rem;
      color: #cbd5e1;
    }

    .btn {
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
      z-index: 101;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: #fff;
      box-shadow: 0 4px 16px rgba(249,115,22,0.3);
    }
    .btn-primary:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 24px rgba(249,115,22,0.4); 
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .final-score {
      font-size: 4rem;
      font-weight: 900;
      color: var(--gold);
      margin: 1rem 0;
    }
    .score-breakdown {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      min-width: 280px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: .5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-label { color: #94a3b8; font-size: .9rem; }
    .breakdown-value { font-weight: 700; }

    .sound-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 200;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all .2s ease;
    }
    .sound-toggle:hover { background: rgba(255,255,255,0.1); }
    .sound-toggle.muted { color: var(--gray-500); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dq7fpxfbc/video/upload/v1778934221/7d8234815bd1926ba3b5de274e389df9_mdvcw6.mp4" type="video/mp4"/>
</video>
<div id="videoOverlay"></div>

<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <i class="ri-volume-mute-fill" id="soundIcon"></i>
</button>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden">
  <div class="hud-item">
    <div class="hud-label">Score</div>
    <div class="hud-value hud-score" id="scoreDisplay">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Time</div>
    <div class="hud-value hud-time" id="timeDisplay">60</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Combo</div>
    <div class="hud-value hud-combo" id="comboDisplay">x1</div>
  </div>
</div>

<div id="powerups"></div>

<div id="startScreen">
  <div class="screen-title">Vault Rush</div>
  <div class="screen-subtitle">Entry #<span id="attemptNum">1</span> — Round #<span id="roundNum">—</span></div>
  
  <div class="controls-info">
    <div class="control-item">
      <div class="control-icon">👆</div>
      <div class="control-text">Drag anywhere<br>to move hero</div>
    </div>
    <div class="control-item">
      <div class="control-icon">⚡</div>
      <div class="control-text">Collect coins<br>Grab power-ups</div>
    </div>
    <div class="control-item">
      <div class="control-icon">💀</div>
      <div class="control-text">Dodge skeletons<br>Fire shooter & spikes!</div>
    </div>
    <div class="control-item">
      <div class="control-icon">🔥</div>
      <div class="control-text">Build combos<br>Maximize score</div>
    </div>
  </div>

  <button class="btn btn-primary" id="startBtn">
    <i class="ri-play-fill"></i> START GAME
  </button>
</div>

<div id="gameOverScreen">
  <div class="screen-title">Time's Up!</div>
  <div class="final-score" id="finalScore">0</div>
  
  <div class="score-breakdown">
    <div class="breakdown-row">
      <span class="breakdown-label">Coins Collected</span>
      <span class="breakdown-value" id="statCoins">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Diamonds</span>
      <span class="breakdown-value" id="statDiamonds">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Max Combo</span>
      <span class="breakdown-value" id="statMaxCombo">x1</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Power-ups</span>
      <span class="breakdown-value" id="statPowerups">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Base Score</span>
      <span class="breakdown-value" id="statBase">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Combo Bonus</span>
      <span class="breakdown-value" id="statComboBonus">0</span>
    </div>
    <div class="breakdown-row" style="border-top: 2px solid var(--orange); margin-top: .5rem; padding-top: .75rem;">
      <span class="breakdown-label" style="color: var(--gold); font-weight: 700;">FINAL SCORE</span>
      <span class="breakdown-value" style="color: var(--gold); font-size: 1.1rem;" id="statFinal">0</span>
    </div>
  </div>

  <button class="btn btn-primary" id="submitBtn">
    <i class="ri-save-line"></i> SAVE SCORE
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
  import {
    getFirestore, doc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
    authDomain: "taskvault-412a0.firebaseapp.com",
    projectId: "taskvault-412a0",
    storageBucket: "taskvault-412a0.firebasestorage.app",
    messagingSenderId: "420716701831",
    appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const bgVideo = document.getElementById('bgVideo');
  
  let gameState = 'start';
  let score = 0;
  let timeLeft = 60;
  let combo = 0;
  let maxCombo = 1;
  let coinsCollected = 0;
  let diamondsCollected = 0;
  let powerupsCollected = 0;
  let comboBonus = 0;
  
  let player = { 
    x: 0, 
    y: 0, 
    width: 56, 
    height: 80, 
    speed: 7, 
    shield: false, 
    invincible: false,
    hitFlash: 0
  };
  let targetX = null;
  let targetY = null;
  
  let coins = [];
  let diamonds = [];
  let spikes = [];
  let skeletons = [];
  let fireShooter = null; // Only ONE fire shooter
  let fireballs = [];
  let powerups = [];
  let particles = [];
  
  let activePowerups = { double: 0, magnet: 0, shield: 0, speed: 0 };
  
  let animationId = null;
  let lastTime = 0;
  let spawnTimer = 0;
  let gameTime = 0;
  let timerInterval = null;
  
  const entryId = sessionStorage.getItem('currentEntryId');
  const roundId = sessionStorage.getItem('currentRoundId');
  const attemptNumber = parseInt(sessionStorage.getItem('currentAttempt')) || 1;

  let soundEnabled = false;

  onAuthStateChanged(auth, (user) => {
    if (!user) { location.href = 'login.html'; return; }
    if (!entryId || !roundId) { location.href = 'game-lobby.html'; return; }
    
    document.getElementById('attemptNum').textContent = attemptNumber;
    document.getElementById('roundNum').textContent = roundId.slice(-6).toUpperCase();
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('submitBtn').addEventListener('click', submitScore);
  });

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    player.y = canvas.height - 140;
    
    if (targetX === null) {
      player.x = canvas.width / 2 - player.width / 2;
      targetX = player.x;
      targetY = player.y;
    }
  }

  window.toggleSound = function() {
    soundEnabled = !soundEnabled;
    bgVideo.muted = !soundEnabled;
    document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
    document.getElementById('soundIcon').className = soundEnabled ? 'ri-volume-up-fill' : 'ri-volume-mute-fill';
    if (soundEnabled) bgVideo.play().catch(() => {});
  };

  canvas.addEventListener('touchstart', handleTouch, { passive: false });
  canvas.addEventListener('touchmove', handleTouch, { passive: false });
  canvas.addEventListener('mousedown', handleMouse);
  window.addEventListener('keydown', handleKey);

  function handleTouch(e) {
    e.preventDefault();
    const touch = e.touches[0];
    targetX = touch.clientX - player.width / 2;
    targetY = touch.clientY - player.height / 2;
  }

  function handleMouse(e) {
    targetX = e.clientX - player.width / 2;
    targetY = e.clientY - player.height / 2;
  }

  function handleKey(e) {
    const moveSpeed = activePowerups.speed > 0 ? player.speed * 1.8 : player.speed;
    if (e.key === 'ArrowLeft' || e.key === 'a') targetX = player.x - moveSpeed * 4;
    if (e.key === 'ArrowRight' || e.key === 'd') targetX = player.x + moveSpeed * 4;
    if (e.key === 'ArrowUp' || e.key === 'w') targetY = player.y - moveSpeed * 4;
    if (e.key === 'ArrowDown' || e.key === 's') targetY = player.y + moveSpeed * 4;
  }

  window.startGame = function() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    
    if (soundEnabled) {
      bgVideo.muted = false;
      bgVideo.play().catch(() => {});
    }
    
    gameState = 'playing';
    score = 0;
    timeLeft = 60;
    combo = 0;
    maxCombo = 1;
    coinsCollected = 0;
    diamondsCollected = 0;
    powerupsCollected = 0;
    comboBonus = 0;
    coins = [];
    diamonds = [];
    spikes = [];
    skeletons = [];
    fireShooter = null;
    fireballs = [];
    powerups = [];
    particles = [];
    activePowerups = { double: 0, magnet: 0, shield: 0, speed: 0 };
    gameTime = 0;
    spawnTimer = 0;
    
    player.x = canvas.width / 2 - player.width / 2;
    player.y = canvas.height - 140;
    targetX = player.x;
    targetY = player.y;
    
    updateHUD();
    lastTime = performance.now();
    animationId = requestAnimationFrame(gameLoop);
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (gameState !== 'playing') {
        clearInterval(timerInterval);
        return;
      }
      timeLeft--;
      updateHUD();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 1000);
  };

  function gameLoop(timestamp) {
    if (gameState !== 'playing') return;
    
    const dt = Math.min((timestamp - lastTime) / 16.67, 3);
    lastTime = timestamp;
    gameTime += dt;
    
    const timeScale = activePowerups.speed > 0 ? 1.6 : 1;
    const adjustedDt = dt * timeScale;
    
    update(adjustedDt);
    render();
    
    animationId = requestAnimationFrame(gameLoop);
  }

  function update(dt) {
    const moveSpeed = activePowerups.speed > 0 ? player.speed * 1.8 : player.speed;
    
    const dx = targetX - player.x;
    player.x += dx * 0.12 * dt;
    
    const dy = targetY - player.y;
    player.y += dy * 0.12 * dt;
    
    player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
    
    if (player.hitFlash > 0) player.hitFlash -= dt;
    
    Object.keys(activePowerups).forEach(key => {
      if (activePowerups[key] > 0) {
        activePowerups[key] -= dt;
        if (activePowerups[key] <= 0) {
          activePowerups[key] = 0;
          if (key === 'shield') player.shield = false;
          if (key === 'speed') player.invincible = false;
          updatePowerupBadges();
        }
      }
    });
    
    spawnTimer += dt;
    const baseSpawnRate = activePowerups.frenzy > 0 ? 30 : 45;
    if (spawnTimer >= baseSpawnRate) {
      spawnTimer = 0;
      spawnEntity();
    }
    
    const baseFallSpeed = activePowerups.speed > 0 ? 4.5 : 2.8;
    [...coins, ...diamonds, ...powerups].forEach(entity => {
      entity.y += baseFallSpeed * dt;
    });
    
    spikes.forEach(spike => {
      spike.y += 1.5 * dt;
      spike.x += Math.sin(gameTime * 0.02 + spike.id) * 0.5 * dt;
    });
    
    skeletons.forEach(skull => {
      skull.x += skull.vx * dt;
      
      if (skull.x <= 0) {
        skull.x = 0;
        skull.vx = Math.abs(skull.vx);
      }
      if (skull.x + skull.width >= canvas.width) {
        skull.x = canvas.width - skull.width;
        skull.vx = -Math.abs(skull.vx);
      }
      
      skull.y += 0.2 * dt;
      
      skull.chompTimer += dt;
      if (skull.chompTimer > skull.chompSpeed) {
        skull.chompTimer = 0;
        skull.mouthOpen = !skull.mouthOpen;
      }
    });
    
    // SINGLE FIRE SHOOTER - moves and shoots
    if (fireShooter) {
      fireShooter.y += 0.8 * dt;
      fireShooter.x += Math.sin(gameTime * 0.015) * 0.8 * dt;
      
      // Keep in bounds
      fireShooter.x = Math.max(30, Math.min(canvas.width - 80, fireShooter.x));
      
      fireShooter.shootTimer += dt;
      if (fireShooter.shootTimer > fireShooter.shootInterval) {
        fireShooter.shootTimer = 0;
        const startX = fireShooter.x + fireShooter.width/2;
        const startY = fireShooter.y + fireShooter.height/2;
        const targetPx = player.x + player.width/2;
        const targetPy = player.y + player.height/2;
        const angle = Math.atan2(targetPy - startY, targetPx - startX);
        
        fireballs.push({
          x: startX,
          y: startY,
          vx: Math.cos(angle) * 4,
          vy: Math.sin(angle) * 4,
          radius: 10,
          life: 180
        });
      }
      
      // Remove if off screen
      if (fireShooter.y > canvas.height + 100) {
        fireShooter = null;
      }
    }
    
    fireballs.forEach(fb => {
      fb.x += fb.vx * dt;
      fb.y += fb.vy * dt;
      fb.life -= dt;
    });
    
    if (activePowerups.magnet > 0) {
      [...coins, ...diamonds].forEach(entity => {
        const dist = Math.hypot(entity.x - (player.x + player.width/2), entity.y - (player.y + player.height/2));
        if (dist < 200) {
          entity.x += (player.x + player.width/2 - entity.x) * 0.06 * dt;
          entity.y += (player.y + player.height/2 - entity.y) * 0.06 * dt;
        }
      });
    }
    
    checkCollisions();
    
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / p.maxLife);
    });
    
    const offScreen = canvas.height + 100;
    coins = coins.filter(c => c.y < offScreen);
    diamonds = diamonds.filter(d => d.y < offScreen);
    spikes = spikes.filter(s => s.y < offScreen);
    skeletons = skeletons.filter(s => s.y < offScreen + 50);
    fireballs = fireballs.filter(f => f.life > 0 && f.x > -50 && f.x < canvas.width + 50 && f.y > -50 && f.y < canvas.height + 50);
    powerups = powerups.filter(p => p.y < offScreen);
  }

  function spawnEntity() {
    const padding = 80;
    const x = Math.random() * (canvas.width - padding * 2) + padding;
    const rand = Math.random();
    
    // 58% coins, 20% diamonds, 6% spikes, 7% skeletons, 9% power-ups
    // Fire shooter spawns separately (only one exists at a time)
    if (rand < 0.58) {
      coins.push({ x, y: -40, width: 36, height: 36, type: 'coin' });
    } else if (rand < 0.78) {
      diamonds.push({ x, y: -40, width: 32, height: 32, type: 'diamond' });
    } else if (rand < 0.84) {
      const nearCoin = coins.length > 0 ? coins[coins.length - 1] : null;
      const spikeX = nearCoin ? nearCoin.x + (Math.random() > 0.5 ? 50 : -50) : x;
      spikes.push({ 
        x: Math.max(40, Math.min(canvas.width - 80, spikeX)), 
        y: -50, 
        width: 48, 
        height: 48, 
        type: 'spike',
        id: Math.random()
      });
    } else if (rand < 0.91) {
      const direction = Math.random() > 0.5 ? 1 : -1;
      const speed = 1.5 + Math.random() * 1.5;
      skeletons.push({
        x: direction === 1 ? 20 : canvas.width - 76,
        y: Math.random() * (canvas.height * 0.5) + 30,
        width: 56,
        height: 56,
        vx: direction * speed,
        mouthOpen: true,
        chompTimer: 0,
        chompSpeed: 15 + Math.random() * 10,
        id: Math.random()
      });
    } else {
      const types = ['double', 'magnet', 'speed'];
      const type = types[Math.floor(Math.random() * types.length)];
      powerups.push({ x, y: -40, width: 40, height: 40, type });
    }
    
    // Spawn single fire shooter if none exists (10% chance per spawn cycle)
    if (!fireShooter && Math.random() < 0.10) {
      fireShooter = {
        x: x,
        y: -60,
        width: 50,
        height: 50,
        shootTimer: 0,
        shootInterval: 50 + Math.random() * 40
      };
    }
  }

  function checkCollisions() {
    const isInvincible = activePowerups.speed > 0 || player.invincible;
    const playerCx = player.x + player.width/2;
    const playerCy = player.y + player.height/2;
    
    coins.forEach((coin, i) => {
      if (rectCollide(coin, player)) {
        const basePoints = 10;
        const multiplier = activePowerups.double > 0 ? 2 : 1;
        const comboMult = Math.max(1, Math.floor(combo / 10) + 1);
        const points = basePoints * multiplier * comboMult;
        
        score += points;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        coinsCollected++;
        
        createParticles(coin.x + coin.width/2, coin.y + coin.height/2, '#fbbf24');
        coins.splice(i, 1);
        updateHUD();
      }
    });
    
    diamonds.forEach((diamond, i) => {
      if (rectCollide(diamond, player)) {
        const basePoints = 50;
        const multiplier = activePowerups.double > 0 ? 2 : 1;
        const comboMult = Math.max(1, Math.floor(combo / 10) + 1);
        const points = basePoints * multiplier * comboMult;
        
        score += points;
        combo += 3;
        if (combo > maxCombo) maxCombo = combo;
        diamondsCollected++;
        
        createParticles(diamond.x + diamond.width/2, diamond.y + diamond.height/2, '#0ea5e9');
        diamonds.splice(i, 1);
        updateHUD();
      }
    });
    
    spikes.forEach((spike, i) => {
      if (rectCollide(spike, player)) {
        if (isInvincible) {
          createParticles(spike.x + spike.width/2, spike.y + spike.height/2, '#06b6d4');
          spikes.splice(i, 1);
        } else if (activePowerups.shield > 0 || player.shield) {
          activePowerups.shield = 0;
          player.shield = false;
          createParticles(spike.x + spike.width/2, spike.y + spike.height/2, '#3b82f6');
          spikes.splice(i, 1);
          updatePowerupBadges();
        } else {
          combo = 0;
          score = Math.max(0, score - 50);
          player.hitFlash = 20;
          createParticles(playerCx, playerCy, '#ef4444');
          spikes.splice(i, 1);
          screenShake();
          showDamageText(playerCx, playerCy - 30, '-50', '#ef4444');
          updateHUD();
        }
      }
    });
    
    skeletons.forEach((skull, i) => {
      if (rectCollide(skull, player)) {
        if (isInvincible) {
          createParticles(skull.x + skull.width/2, skull.y + skull.height/2, '#06b6d4');
          skeletons.splice(i, 1);
        } else if (activePowerups.shield > 0 || player.shield) {
          activePowerups.shield = 0;
          player.shield = false;
          createParticles(skull.x + skull.width/2, skull.y + skull.height/2, '#3b82f6');
          skeletons.splice(i, 1);
          updatePowerupBadges();
        } else {
          combo = 0;
          score = Math.max(0, score - 100);
          player.hitFlash = 25;
          createParticles(playerCx, playerCy, '#dc2626', 15);
          skeletons.splice(i, 1);
          screenShake(8);
          showDamageText(playerCx, playerCy - 40, '-100', '#dc2626');
          updateHUD();
        }
      }
    });
    
    // Fire shooter collision
    if (fireShooter && rectCollide(fireShooter, player)) {
      if (isInvincible) {
        createParticles(fireShooter.x + fireShooter.width/2, fireShooter.y + fireShooter.height/2, '#06b6d4');
        fireShooter = null;
      } else if (activePowerups.shield > 0 || player.shield) {
        activePowerups.shield = 0;
        player.shield = false;
        createParticles(fireShooter.x + fireShooter.width/2, fireShooter.y + fireShooter.height/2, '#3b82f6');
        fireShooter = null;
        updatePowerupBadges();
      } else {
        combo = 0;
        score = Math.max(0, score - 120);
        player.hitFlash = 30;
        createParticles(playerCx, playerCy, '#f97316', 20);
        fireShooter = null;
        screenShake(10);
        showDamageText(playerCx, playerCy - 50, '-120', '#f97316');
        updateHUD();
      }
    }
    
    // Fireball collisions
    fireballs.forEach((fb, i) => {
      const dist = Math.hypot(fb.x - playerCx, fb.y - playerCy);
      if (dist < fb.radius + 25) {
        if (isInvincible) {
          createParticles(fb.x, fb.y, '#06b6d4');
          fireballs.splice(i, 1);
        } else if (activePowerups.shield > 0 || player.shield) {
          activePowerups.shield = 0;
          player.shield = false;
          createParticles(fb.x, fb.y, '#3b82f6');
          fireballs.splice(i, 1);
          updatePowerupBadges();
        } else {
          combo = 0;
          score = Math.max(0, score - 120);
          player.hitFlash = 30;
          createParticles(fb.x, fb.y, '#f97316', 20);
          fireballs.splice(i, 1);
          screenShake(10);
          showDamageText(playerCx, playerCy - 50, '-120', '#f97316');
          updateHUD();
        }
      }
    });
    
    powerups.forEach((powerup, i) => {
      if (rectCollide(powerup, player)) {
        activatePowerup(powerup.type);
        powerupsCollected++;
        createParticles(powerup.x + powerup.width/2, powerup.y + powerup.height/2, '#ffffff');
        powerups.splice(i, 1);
      }
    });
  }

  function rectCollide(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
  }

  function screenShake(intensity = 5) {
    canvas.style.transform = `translate(${Math.random()*intensity*2-intensity}px, ${Math.random()*intensity*2-intensity}px)`;
    setTimeout(() => canvas.style.transform = '', 250);
  }

  function showDamageText(x, y, text, color) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 2,
      vy: -3,
      life: 40,
      maxLife: 40,
      alpha: 1,
      color: color,
      size: 18,
      isText: true,
      text: text
    });
  }

  function activatePowerup(type) {
    const duration = type === 'speed' ? 1200 : 600;
    
    switch(type) {
      case 'double': activePowerups.double = duration; break;
      case 'magnet': activePowerups.magnet = duration; break;
      case 'shield': activePowerups.shield = duration; player.shield = true; break;
      case 'speed': 
        activePowerups.speed = duration; 
        player.invincible = true;
        break;
    }
    
    updatePowerupBadges();
  }

  function updatePowerupBadges() {
    const container = document.getElementById('powerups');
    let html = '';
    
    const icons = { double: '2x', magnet: '🧲', shield: '🛡️', speed: '⚡' };
    const labels = { double: '2x Coins', magnet: 'Magnet', shield: 'Shield', speed: 'Speed Boost' };
    
    Object.keys(activePowerups).forEach(key => {
      if (activePowerups[key] > 0) {
        html += `<div class="powerup-badge powerup-${key}">${icons[key]} ${labels[key]}</div>`;
      }
    });
    
    container.innerHTML = html;
  }

  function createParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        life: 25 + Math.random() * 15,
        maxLife: 40,
        alpha: 1,
        color,
        size: Math.random() * 5 + 3,
        isText: false
      });
    }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    coins.forEach(coin => {
      ctx.save();
      ctx.translate(coin.x + coin.width/2, coin.y + coin.height/2);
      
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 12;
      
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(0, 0, 16, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 0);
      ctx.restore();
    });
    
    diamonds.forEach(d => {
      ctx.save();
      ctx.translate(d.x + d.width/2, d.y + d.height/2);
      
      ctx.shadowColor = '#0ea5e9';
      ctx.shadowBlur = 14;
      
      ctx.fillStyle = '#0ea5e9';
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(12, 0);
      ctx.lineTo(0, 12);
      ctx.lineTo(-12, 0);
      ctx.closePath();
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    });
    
    spikes.forEach(spike => {
      ctx.save();
      ctx.translate(spike.x + spike.width/2, spike.y + spike.height/2);
      
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 10;
      
      ctx.fillStyle = '#dc2626';
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const angle = (i * Math.PI * 2 / 8) - Math.PI/2;
        const outerR = 22;
        const innerR = i % 2 === 0 ? outerR : 12;
        const x = Math.cos(angle) * innerR;
        const y = Math.sin(angle) * innerR;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#7f1d1d';
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.restore();
    });
    
    skeletons.forEach(skull => {
      ctx.save();
      ctx.translate(skull.x + skull.width/2, skull.y + skull.height/2);
      
      ctx.shadowColor = '#a1a1aa';
      ctx.shadowBlur = 15;
      
      ctx.fillStyle = '#e4e4e7';
      ctx.beginPath();
      ctx.arc(0, -5, 22, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#18181b';
      ctx.beginPath();
      ctx.ellipse(-8, -10, 6, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(8, -10, 6, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#18181b';
      ctx.beginPath();
      ctx.moveTo(0, -2);
      ctx.lineTo(-3, 5);
      ctx.lineTo(3, 5);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#d4d4d8';
      ctx.beginPath();
      ctx.ellipse(0, 14, 16, skull.mouthOpen ? 12 : 4, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#f4f4f5';
      const teethCount = 6;
      const jawWidth = 22;
      for (let i = 0; i < teethCount; i++) {
        const tx = -jawWidth/2 + (jawWidth / (teethCount - 1)) * i;
        const ty = skull.mouthOpen ? 8 : 12;
        ctx.beginPath();
        ctx.moveTo(tx - 2, ty);
        ctx.lineTo(tx, ty + (skull.mouthOpen ? 8 : 4));
        ctx.lineTo(tx + 2, ty);
        ctx.closePath();
        ctx.fill();
      }
      
      if (skull.mouthOpen) {
        for (let i = 0; i < teethCount; i++) {
          const tx = -jawWidth/2 + (jawWidth / (teethCount - 1)) * i;
          ctx.beginPath();
          ctx.moveTo(tx - 2, 20);
          ctx.lineTo(tx, 14);
          ctx.lineTo(tx + 2, 20);
          ctx.closePath();
          ctx.fill();
        }
      }
      
      ctx.shadowBlur = 0;
      ctx.restore();
    });
    
    // Render SINGLE fire shooter
    if (fireShooter) {
      ctx.save();
      ctx.translate(fireShooter.x + fireShooter.width/2, fireShooter.y + fireShooter.height/2);
      
      ctx.shadowColor = '#f97316';
      ctx.shadowBlur = 18;
      
      ctx.fillStyle = '#7c2d12';
      ctx.beginPath();
      ctx.arc(0, 0, 22, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#c2410c';
      ctx.beginPath();
      ctx.arc(0, 0, 16, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.fill();
      
      const pulse = Math.sin(gameTime * 0.1) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(255, 255, 255, ${pulse})`;
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    
    // Render fireballs
    fireballs.forEach(fb => {
      ctx.save();
      ctx.translate(fb.x, fb.y);
      
      ctx.shadowColor = '#f97316';
      ctx.shadowBlur = 20;
      
      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.arc(0, 0, fb.radius + 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(0, 0, fb.radius, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, fb.radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.restore();
    });
    
    const powerupColors = {
      double: '#fbbf24',
      magnet: '#8b5cf6',
      shield: '#3b82f6',
      speed: '#06b6d4'
    };
    
    powerups.forEach(p => {
      ctx.save();
      ctx.translate(p.x + p.width/2, p.y + p.height/2);
      
      ctx.shadowColor = powerupColors[p.type];
      ctx.shadowBlur = 16;
      
      ctx.fillStyle = powerupColors[p.type];
      ctx.beginPath();
      ctx.arc(0, 0, 17, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const icons = { double: '2x', magnet: 'M', shield: 'S', speed: '⚡' };
      ctx.fillText(icons[p.type] || '?', 0, 0);
      ctx.restore();
    });
    
    // PLAYER - Humanoid Superhero with V sign
    ctx.save();
    ctx.translate(player.x + player.width/2, player.y + player.height/2);
    
    if (player.hitFlash > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(player.hitFlash * 0.5) * 0.3;
    }
    
    if (activePowerups.speed > 0 || player.invincible) {
      ctx.beginPath();
      ctx.arc(0, 0, 55, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(6, 182, 212, 0.12)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(6, 182, 212, 0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    
    if (activePowerups.shield > 0 || player.shield) {
      ctx.beginPath();
      ctx.arc(0, 0, 48, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(59, 130, 246, 0.35)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    
    const capeWave = Math.sin(gameTime * 0.08) * 8;
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.moveTo(-18, -5);
    ctx.lineTo(-28 + capeWave, 35);
    ctx.lineTo(0, 45);
    ctx.lineTo(28 + capeWave, 35);
    ctx.lineTo(18, -5);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#1e3a5f';
    ctx.beginPath();
    roundRect(ctx, -16, -10, 32, 38, 6);
    ctx.fill();
    
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-6, 2);
    ctx.lineTo(0, 12);
    ctx.lineTo(10, -4);
    ctx.stroke();
    
    ctx.fillStyle = '#fca5a5';
    ctx.beginPath();
    ctx.arc(0, -22, 14, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#451a03';
    ctx.beginPath();
    ctx.arc(0, -26, 15, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(-15, -26, 30, 6);
    
    ctx.fillStyle = '#1e3a5f';
    ctx.beginPath();
    ctx.ellipse(-5, -22, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(5, -22, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4, -23, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, -23, 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = '#be123c';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, -17, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
    
    ctx.strokeStyle = '#fca5a5';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-16, -5);
    ctx.lineTo(-28, -22);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(16, -5);
    ctx.lineTo(26, 10);
    ctx.stroke();
    
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.arc(-28, -22, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(26, 10, 5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-8, 28);
    ctx.lineTo(-10, 48);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(8, 28);
    ctx.lineTo(10, 48);
    ctx.stroke();
    
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    roundRect(ctx, -16, 44, 14, 10, 3);
    ctx.fill();
    ctx.beginPath();
    roundRect(ctx, 2, 44, 14, 10, 3);
    ctx.fill();
    
    ctx.restore();
    
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      
      if (p.isText) {
        ctx.fillStyle = p.color;
        ctx.font = `bold ${p.size}px Inter`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
    
    if (combo > 0 && combo % 10 === 0) {
      const alpha = Math.min(1, (20 - (combo % 20)) / 10);
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.fillStyle = '#10b981';
      ctx.font = `bold ${24 + Math.min(combo/3, 36)}px Inter`;
      ctx.textAlign = 'center';
      ctx.shadowColor = '#10b981';
      ctx.shadowBlur = 20;
      ctx.fillText(`${combo}x COMBO!`, canvas.width/2, canvas.height/3);
      ctx.restore();
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function updateHUD() {
    document.getElementById('scoreDisplay').textContent = score.toLocaleString();
    document.getElementById('timeDisplay').textContent = timeLeft;
    document.getElementById('comboDisplay').textContent = `x${Math.max(1, Math.floor(combo/10) + 1)}`;
  }

  function endGame() {
    gameState = 'over';
    if (animationId) cancelAnimationFrame(animationId);
    if (timerInterval) clearInterval(timerInterval);
    
    const baseScore = score;
    const maxComboMultiplier = Math.max(1, Math.floor(maxCombo / 10));
    comboBonus = Math.floor(baseScore * (maxComboMultiplier * 0.05));
    const finalScore = baseScore + comboBonus;
    
    document.getElementById('finalScore').textContent = finalScore.toLocaleString();
    document.getElementById('statCoins').textContent = coinsCollected;
    document.getElementById('statDiamonds').textContent = diamondsCollected;
    document.getElementById('statMaxCombo').textContent = `x${maxCombo}`;
    document.getElementById('statPowerups').textContent = powerupsCollected;
    document.getElementById('statBase').textContent = baseScore.toLocaleString();
    document.getElementById('statComboBonus').textContent = `+${comboBonus.toLocaleString()}`;
    document.getElementById('statFinal').textContent = finalScore.toLocaleString();
    
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('powerups').innerHTML = '';
    document.getElementById('gameOverScreen').style.display = 'flex';
    
    bgVideo.muted = true;
  }

  window.submitScore = async function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Saving...';
    
    try {
      const finalScore = score + comboBonus;
      
      await updateDoc(doc(db, 'gameRounds', roundId, 'entries', entryId), {
        score: finalScore,
        coinsCollected: coinsCollected,
        diamondsCollected: diamondsCollected,
        maxCombo: maxCombo,
        powerupsCollected: powerupsCollected,
        submittedAt: serverTimestamp()
      });
      
      btn.innerHTML = '<i class="ri-check-line"></i> Saved!';
      setTimeout(() => {
        location.href = 'game-lobby.html';
      }, 1500);
      
    } catch (err) {
      console.error('Submit error:', err);
      btn.disabled = false;
      btn.innerHTML = '<i class="ri-restart-line"></i> Retry Save';
      alert('Failed to save score: ' + err.message);
    }
  };
</script>
