<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>TaskVault – Vault Rush</title>
  <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1775059285/logo_oo5yat.jpg"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --purple: #8b5cf6;
      --blue: #3b82f6;
      --cyan: #06b6d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #0f172a;
      color: #fff;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.4;
    }
    
    #videoOverlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,23,42,0.7) 0%, rgba(15,23,42,0.4) 50%, rgba(15,23,42,0.8) 100%);
      z-index: 1;
      pointer-events: none;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 2;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    .hud-item {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: .5rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .hud-label {
      font-size: .65rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .hud-value {
      font-size: 1.25rem;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .hud-score { color: var(--gold); }
    .hud-time { color: var(--orange); }
    .hud-combo { color: var(--green); }

    #powerups {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: .5rem;
      pointer-events: none;
      z-index: 10;
    }
    .powerup-badge {
      padding: .35rem .75rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .35rem;
      animation: popIn .3s ease;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
    }
    .powerup-2x { color: var(--gold); border: 1px solid var(--gold); }
    .powerup-magnet { color: var(--purple); border: 1px solid var(--purple); }
    .powerup-shield { color: var(--blue); border: 1px solid var(--blue); }
    .powerup-speed { color: var(--cyan); border: 1px solid var(--cyan); }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #startScreen, #gameOverScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 2rem;
    }
    #startScreen {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
    }
    #gameOverScreen {
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(16px);
      display: none;
    }

    .screen-title {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--orange), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .5rem;
    }
    .screen-subtitle {
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .controls-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      max-width: 320px;
    }
    .control-item {
      background: rgba(255,255,255,0.08);
      padding: 1rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .control-icon {
      font-size: 1.5rem;
      margin-bottom: .5rem;
    }
    .control-text {
      font-size: .8rem;
      color: #cbd5e1;
    }

    .btn {
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
      z-index: 101;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: #fff;
      box-shadow: 0 4px 16px rgba(249,115,22,0.3);
    }
    .btn-primary:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 8px 24px rgba(249,115,22,0.4); 
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .final-score {
      font-size: 4rem;
      font-weight: 900;
      color: var(--gold);
      margin: 1rem 0;
    }
    .score-breakdown {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      min-width: 280px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: .5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-label { color: #94a3b8; font-size: .9rem; }
    .breakdown-value { font-weight: 700; }

    .sound-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 200;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all .2s ease;
    }
    .sound-toggle:hover { background: rgba(255,255,255,0.1); }
    .sound-toggle.muted { color: var(--gray-500); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dq7fpxfbc/video/upload/v1778934221/7d8234815bd1926ba3b5de274e389df9_mdvcw6.mp4" type="video/mp4"/>
</video>
<div id="videoOverlay"></div>

<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">
  <i class="ri-volume-mute-fill" id="soundIcon"></i>
</button>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden">
  <div class="hud-item">
    <div class="hud-label">Score</div>
    <div class="hud-value hud-score" id="scoreDisplay">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Time</div>
    <div class="hud-value hud-time" id="timeDisplay">60</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Combo</div>
    <div class="hud-value hud-combo" id="comboDisplay">x1</div>
  </div>
</div>

<div id="powerups"></div>

<div id="startScreen">
  <div class="screen-title">Vault Rush</div>
  <div class="screen-subtitle">Entry #<span id="attemptNum">1</span> — Round #<span id="roundNum">—</span></div>
  
  <div class="controls-info">
    <div class="control-item">
      <div class="control-icon">👆</div>
      <div class="control-text">Drag anywhere<br>to move vault</div>
    </div>
    <div class="control-item">
      <div class="control-icon">⚡</div>
      <div class="control-text">Collect coins<br>Grab power-ups</div>
    </div>
    <div class="control-item">
      <div class="control-icon">💀</div>
      <div class="control-text">Dodge red spikes<br>-200 pts on hit!</div>
    </div>
    <div class="control-item">
      <div class="control-icon">🔥</div>
      <div class="control-text">Build combos<br>Maximize score</div>
    </div>
  </div>

  <button class="btn btn-primary" id="startBtn">
    <i class="ri-play-fill"></i> START GAME
  </button>
</div>

<div id="gameOverScreen">
  <div class="screen-title">Time's Up!</div>
  <div class="final-score" id="finalScore">0</div>
  
  <div class="score-breakdown">
    <div class="breakdown-row">
      <span class="breakdown-label">Coins Collected</span>
      <span class="breakdown-value" id="statCoins">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Diamonds</span>
      <span class="breakdown-value" id="statDiamonds">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Max Combo</span>
      <span class="breakdown-value" id="statMaxCombo">x1</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Power-ups</span>
      <span class="breakdown-value" id="statPowerups">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Base Score</span>
      <span class="breakdown-value" id="statBase">0</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">Combo Bonus</span>
      <span class="breakdown-value" id="statComboBonus">0</span>
    </div>
    <div class="breakdown-row" style="border-top: 2px solid var(--orange); margin-top: .5rem; padding-top: .75rem;">
      <span class="breakdown-label" style="color: var(--gold); font-weight: 700;">FINAL SCORE</span>
      <span class="breakdown-value" style="color: var(--gold); font-size: 1.1rem;" id="statFinal">0</span>
    </div>
  </div>

  <button class="btn btn-primary" id="submitBtn">
    <i class="ri-save-line"></i> SAVE SCORE
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
  import {
    getFirestore, doc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAv6QCpopa0Q77AVTyjU5cqJEIKIE9OVTs",
    authDomain: "taskvault-412a0.firebaseapp.com",
    projectId: "taskvault-412a0",
    storageBucket: "taskvault-412a0.firebasestorage.app",
    messagingSenderId: "420716701831",
    appId: "1:420716701831:web:c987d91f7f4c8684eb7022"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const bgVideo = document.getElementById('bgVideo');
  
  let gameState = 'start';
  let score = 0;
  let timeLeft = 60;
  let combo = 0;
  let maxCombo = 1;
  let coinsCollected = 0;
  let diamondsCollected = 0;
  let powerupsCollected = 0;
  let comboBonus = 0;
  
  // Player - BIGGER, moves in ALL directions
  let player = { 
    x: 0, 
    y: 0, 
    width: 64, 
    height: 64, 
    speed: 7, 
    shield: false, 
    invincible: false 
  };
  let targetX = null;
  let targetY = null;
  
  let coins = [];
  let diamonds = [];
  let spikes = [];
  let powerups = [];
  let particles = [];
  
  let activePowerups = { double: 0, magnet: 0, shield: 0, speed: 0 };
  
  let animationId = null;
  let lastTime = 0;
  let spawnTimer = 0;
  let gameTime = 0;
  let timerInterval = null;
  
  const entryId = sessionStorage.getItem('currentEntryId');
  const roundId = sessionStorage.getItem('currentRoundId');
  const attemptNumber = parseInt(sessionStorage.getItem('currentAttempt')) || 1;

  let soundEnabled = false;

  onAuthStateChanged(auth, (user) => {
    if (!user) { location.href = 'login.html'; return; }
    if (!entryId || !roundId) { location.href = 'game-lobby.html'; return; }
    
    document.getElementById('attemptNum').textContent = attemptNumber;
    document.getElementById('roundNum').textContent = roundId.slice(-6).toUpperCase();
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('submitBtn').addEventListener('click', submitScore);
  });

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    player.y = canvas.height - 120;
    
    if (targetX === null) {
      player.x = canvas.width / 2 - player.width / 2;
      targetX = player.x;
      targetY = player.y;
    }
  }

  window.toggleSound = function() {
    soundEnabled = !soundEnabled;
    bgVideo.muted = !soundEnabled;
    document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
    document.getElementById('soundIcon').className = soundEnabled ? 'ri-volume-up-fill' : 'ri-volume-mute-fill';
    if (soundEnabled) bgVideo.play().catch(() => {});
  };

  // Touch/click - move to that position (both X and Y)
  canvas.addEventListener('touchstart', handleTouch, { passive: false });
  canvas.addEventListener('touchmove', handleTouch, { passive: false });
  canvas.addEventListener('mousedown', handleMouse);
  window.addEventListener('keydown', handleKey);

  function handleTouch(e) {
    e.preventDefault();
    const touch = e.touches[0];
    targetX = touch.clientX - player.width / 2;
    targetY = touch.clientY - player.height / 2;
  }

  function handleMouse(e) {
    targetX = e.clientX - player.width / 2;
    targetY = e.clientY - player.height / 2;
  }

  function handleKey(e) {
    const moveSpeed = activePowerups.speed > 0 ? player.speed * 1.8 : player.speed;
    if (e.key === 'ArrowLeft' || e.key === 'a') targetX = player.x - moveSpeed * 4;
    if (e.key === 'ArrowRight' || e.key === 'd') targetX = player.x + moveSpeed * 4;
    if (e.key === 'ArrowUp' || e.key === 'w') targetY = player.y - moveSpeed * 4;
    if (e.key === 'ArrowDown' || e.key === 's') targetY = player.y + moveSpeed * 4;
  }

  window.startGame = function() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    
    if (soundEnabled) {
      bgVideo.muted = false;
      bgVideo.play().catch(() => {});
    }
    
    gameState = 'playing';
    score = 0;
    timeLeft = 60;
    combo = 0;
    maxCombo = 1;
    coinsCollected = 0;
    diamondsCollected = 0;
    powerupsCollected = 0;
    comboBonus = 0;
    coins = [];
    diamonds = [];
    spikes = [];
    powerups = [];
    particles = [];
    activePowerups = { double: 0, magnet: 0, shield: 0, speed: 0 };
    gameTime = 0;
    spawnTimer = 0;
    
    // Reset player position
    player.x = canvas.width / 2 - player.width / 2;
    player.y = canvas.height - 120;
    targetX = player.x;
    targetY = player.y;
    
    updateHUD();
    lastTime = performance.now();
    animationId = requestAnimationFrame(gameLoop);
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (gameState !== 'playing') {
        clearInterval(timerInterval);
        return;
      }
      timeLeft--;
      updateHUD();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 1000);
  };

  function gameLoop(timestamp) {
    if (gameState !== 'playing') return;
    
    const dt = Math.min((timestamp - lastTime) / 16.67, 3);
    lastTime = timestamp;
    gameTime += dt;
    
    const timeScale = activePowerups.speed > 0 ? 1.6 : 1;
    const adjustedDt = dt * timeScale;
    
    update(adjustedDt);
    render();
    
    animationId = requestAnimationFrame(gameLoop);
  }

  function update(dt) {
    // Move player smoothly in BOTH directions
    const moveSpeed = activePowerups.speed > 0 ? player.speed * 1.8 : player.speed;
    
    const dx = targetX - player.x;
    player.x += dx * 0.12 * dt;
    
    const dy = targetY - player.y;
    player.y += dy * 0.12 * dt;
    
    // Clamp to screen bounds
    player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
    
    // Update power-up timers
    Object.keys(activePowerups).forEach(key => {
      if (activePowerups[key] > 0) {
        activePowerups[key] -= dt;
        if (activePowerups[key] <= 0) {
          activePowerups[key] = 0;
          if (key === 'shield') player.shield = false;
          if (key === 'speed') player.invincible = false;
          updatePowerupBadges();
        }
      }
    });
    
    // Spawn entities
    spawnTimer += dt;
    const baseSpawnRate = activePowerups.frenzy > 0 ? 20 : 32;
    if (spawnTimer >= baseSpawnRate) {
      spawnTimer = 0;
      spawnEntity();
    }
    
    // Coins and diamonds fall at normal speed
    const baseFallSpeed = activePowerups.speed > 0 ? 4.5 : 2.8;
    [...coins, ...diamonds, ...powerups].forEach(entity => {
      entity.y += baseFallSpeed * dt;
    });
    
    // SPIKES move LEFT-TO-RIGHT at SLOWER speed (not falling)
    spikes.forEach(spike => {
      spike.x += spike.vx * dt;
      // Bounce off walls
      if (spike.x <= 0 || spike.x + spike.width >= canvas.width) {
        spike.vx *= -1;
      }
      // Slow vertical drift
      spike.y += 0.3 * dt;
    });
    
    // Magnet effect
    if (activePowerups.magnet > 0) {
      [...coins, ...diamonds].forEach(entity => {
        const dist = Math.hypot(entity.x - (player.x + player.width/2), entity.y - (player.y + player.height/2));
        if (dist < 200) {
          entity.x += (player.x + player.width/2 - entity.x) * 0.06 * dt;
          entity.y += (player.y + player.height/2 - entity.y) * 0.06 * dt;
        }
      });
    }
    
    checkCollisions();
    
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / p.maxLife);
    });
    
    const offScreen = canvas.height + 100;
    coins = coins.filter(c => c.y < offScreen);
    diamonds = diamonds.filter(d => d.y < offScreen);
    spikes = spikes.filter(s => s.y < offScreen && s.x > -100 && s.x < canvas.width + 100);
    powerups = powerups.filter(p => p.y < offScreen);
  }

  function spawnEntity() {
    const padding = 60;
    const x = Math.random() * (canvas.width - padding * 2) + padding;
    const rand = Math.random();
    
    // 65% coins, 15% diamonds, 15% spikes, 5% power-ups
    if (rand < 0.65) {
      // BIGGER coins
      coins.push({ x, y: -40, width: 36, height: 36, type: 'coin' });
    } else if (rand < 0.80) {
      // BIGGER diamonds
      diamonds.push({ x, y: -40, width: 32, height: 32, type: 'diamond' });
    } else if (rand < 0.95) {
      // MUCH BIGGER spikes that move left-to-right slowly
      const direction = Math.random() > 0.5 ? 1 : -1;
      const startX = direction === 1 ? -60 : canvas.width + 60;
      spikes.push({ 
        x: startX, 
        y: Math.random() * (canvas.height * 0.6) + 50, 
        width: 56, 
        height: 56, 
        type: 'spike',
        vx: direction * (0.8 + Math.random() * 0.6) // Slow horizontal movement
      });
    } else {
      const types = ['double', 'magnet', 'speed'];
      const type = types[Math.floor(Math.random() * types.length)];
      powerups.push({ x, y: -40, width: 40, height: 40, type });
    }
  }

  function checkCollisions() {
    const isInvincible = activePowerups.speed > 0 || player.invincible;
    
    coins.forEach((coin, i) => {
      if (rectCollide(coin, player)) {
        const basePoints = 10;
        const multiplier = activePowerups.double > 0 ? 2 : 1;
        const comboMult = Math.max(1, Math.floor(combo / 10) + 1);
        const points = basePoints * multiplier * comboMult;
        
        score += points;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        coinsCollected++;
        
        createParticles(coin.x + coin.width/2, coin.y + coin.height/2, '#fbbf24');
        coins.splice(i, 1);
        updateHUD();
      }
    });
    
    diamonds.forEach((diamond, i) => {
      if (rectCollide(diamond, player)) {
        const basePoints = 50;
        const multiplier = activePowerups.double > 0 ? 2 : 1;
        const comboMult = Math.max(1, Math.floor(combo / 10) + 1);
        const points = basePoints * multiplier * comboMult;
        
        score += points;
        combo += 3;
        if (combo > maxCombo) maxCombo = combo;
        diamondsCollected++;
        
        createParticles(diamond.x + diamond.width/2, diamond.y + diamond.height/2, '#0ea5e9');
        diamonds.splice(i, 1);
        updateHUD();
      }
    });
    
    spikes.forEach((spike, i) => {
      if (rectCollide(spike, player)) {
        if (isInvincible) {
          createParticles(spike.x + spike.width/2, spike.y + spike.height/2, '#06b6d4');
          spikes.splice(i, 1);
        } else if (activePowerups.shield > 0 || player.shield) {
          activePowerups.shield = 0;
          player.shield = false;
          createParticles(spike.x + spike.width/2, spike.y + spike.height/2, '#3b82f6');
          spikes.splice(i, 1);
          updatePowerupBadges();
        } else {
          // DEDUCT 200 POINTS on hit
          combo = 0;
          score = Math.max(0, score - 200);
          createParticles(player.x + player.width/2, player.y + player.height/2, '#ef4444');
          spikes.splice(i, 1);
          
          // Screen shake
          canvas.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
          setTimeout(() => canvas.style.transform = '', 250);
          updateHUD();
        }
      }
    });
    
    powerups.forEach((powerup, i) => {
      if (rectCollide(powerup, player)) {
        activatePowerup(powerup.type);
        powerupsCollected++;
        createParticles(powerup.x + powerup.width/2, powerup.y + powerup.height/2, '#ffffff');
        powerups.splice(i, 1);
      }
    });
  }

  function rectCollide(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
  }

  function activatePowerup(type) {
    const duration = type === 'speed' ? 600 : 300;
    
    switch(type) {
      case 'double': activePowerups.double = duration; break;
      case 'magnet': activePowerups.magnet = duration; break;
      case 'shield': activePowerups.shield = duration; player.shield = true; break;
      case 'speed': 
        activePowerups.speed = duration; 
        player.invincible = true;
        break;
    }
    
    updatePowerupBadges();
  }

  function updatePowerupBadges() {
    const container = document.getElementById('powerups');
    let html = '';
    
    const icons = { double: '2x', magnet: '🧲', shield: '🛡️', speed: '⚡' };
    const labels = { double: '2x Coins', magnet: 'Magnet', shield: 'Shield', speed: 'Speed Boost' };
    
    Object.keys(activePowerups).forEach(key => {
      if (activePowerups[key] > 0) {
        html += `<div class="powerup-badge powerup-${key}">${icons[key]} ${labels[key]}</div>`;
      }
    });
    
    container.innerHTML = html;
  }

  function createParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10,
        life: 25 + Math.random() * 15,
        maxLife: 40,
        alpha: 1,
        color,
        size: Math.random() * 5 + 3
      });
    }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw coins - BIGGER
    coins.forEach(coin => {
      ctx.save();
      ctx.translate(coin.x + coin.width/2, coin.y + coin.height/2);
      
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 12;
      
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(0, 0, 16, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#f59e0b';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('$', 0, 0);
      ctx.restore();
    });
    
    // Draw diamonds - BIGGER
    diamonds.forEach(d => {
      ctx.save();
      ctx.translate(d.x + d.width/2, d.y + d.height/2);
      
      ctx.shadowColor = '#0ea5e9';
      ctx.shadowBlur = 14;
      
      ctx.fillStyle = '#0ea5e9';
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(12, 0);
      ctx.lineTo(0, 12);
      ctx.lineTo(-12, 0);
      ctx.closePath();
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    });
    
    // Draw spikes - MUCH BIGGER, moving left-to-right
    spikes.forEach(spike => {
      ctx.save();
      ctx.translate(spike.x + spike.width/2, spike.y + spike.height/2);
      
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 10;
      
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (i * Math.PI * 2 / 6) - Math.PI/2;
        const x = Math.cos(angle) * 22;
        const y = Math.sin(angle) * 22;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      
      // Inner detail
      ctx.fillStyle = '#7f1d1d';
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.restore();
    });
    
    // Draw power-ups - BIGGER
    const powerupColors = {
      double: '#fbbf24',
      magnet: '#8b5cf6',
      shield: '#3b82f6',
      speed: '#06b6d4'
    };
    
    powerups.forEach(p => {
      ctx.save();
      ctx.translate(p.x + p.width/2, p.y + p.height/2);
      
      ctx.shadowColor = powerupColors[p.type];
      ctx.shadowBlur = 16;
      
      ctx.fillStyle = powerupColors[p.type];
      ctx.beginPath();
      ctx.arc(0, 0, 17, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const icons = { double: '2x', magnet: 'M', shield: 'S', speed: '⚡' };
      ctx.fillText(icons[p.type] || '?', 0, 0);
      ctx.restore();
    });
    
    // Draw player - BIGGER
    ctx.save();
    ctx.translate(player.x + player.width/2, player.y + player.height/2);
    
    if (activePowerups.speed > 0 || player.invincible) {
      ctx.beginPath();
      ctx.arc(0, 0, 65, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(6, 182, 212, 0.15)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(6, 182, 212, 0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    
    if (activePowerups.shield > 0 || player.shield) {
      ctx.beginPath();
      ctx.arc(0, 0, 55, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    
    ctx.shadowColor = activePowerups.speed > 0 ? '#06b6d4' : '#f97316';
    ctx.shadowBlur = activePowerups.speed > 0 ? 30 : 20;
    
    ctx.fillStyle = activePowerups.speed > 0 ? '#06b6d4' : '#f97316';
    ctx.beginPath();
    roundRect(ctx, -26, -26, 52, 52, 10);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = activePowerups.speed > 0 ? '#06b6d4' : '#f97316';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
    
    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    
    // Combo popup
    if (combo > 0 && combo % 10 === 0) {
      const alpha = Math.min(1, (20 - (combo % 20)) / 10);
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.fillStyle = '#10b981';
      ctx.font = `bold ${24 + Math.min(combo/3, 36)}px Inter`;
      ctx.textAlign = 'center';
      ctx.shadowColor = '#10b981';
      ctx.shadowBlur = 20;
      ctx.fillText(`${combo}x COMBO!`, canvas.width/2, canvas.height/3);
      ctx.restore();
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function updateHUD() {
    document.getElementById('scoreDisplay').textContent = score.toLocaleString();
    document.getElementById('timeDisplay').textContent = timeLeft;
    document.getElementById('comboDisplay').textContent = `x${Math.max(1, Math.floor(combo/10) + 1)}`;
  }

  function endGame() {
    gameState = 'over';
    if (animationId) cancelAnimationFrame(animationId);
    if (timerInterval) clearInterval(timerInterval);
    
    const baseScore = score;
    const maxComboMultiplier = Math.max(1, Math.floor(maxCombo / 10));
    comboBonus = Math.floor(baseScore * (maxComboMultiplier * 0.05));
    const finalScore = baseScore + comboBonus;
    
    document.getElementById('finalScore').textContent = finalScore.toLocaleString();
    document.getElementById('statCoins').textContent = coinsCollected;
    document.getElementById('statDiamonds').textContent = diamondsCollected;
    document.getElementById('statMaxCombo').textContent = `x${maxCombo}`;
    document.getElementById('statPowerups').textContent = powerupsCollected;
    document.getElementById('statBase').textContent = baseScore.toLocaleString();
    document.getElementById('statComboBonus').textContent = `+${comboBonus.toLocaleString()}`;
    document.getElementById('statFinal').textContent = finalScore.toLocaleString();
    
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('powerups').innerHTML = '';
    document.getElementById('gameOverScreen').style.display = 'flex';
    
    bgVideo.muted = true;
  }

  window.submitScore = async function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Saving...';
    
    try {
      const finalScore = score + comboBonus;
      
      await updateDoc(doc(db, 'gameRounds', roundId, 'entries', entryId), {
        score: finalScore,
        coinsCollected: coinsCollected,
        diamondsCollected: diamondsCollected,
        maxCombo: maxCombo,
        powerupsCollected: powerupsCollected,
        submittedAt: serverTimestamp()
      });
      
      btn.innerHTML = '<i class="ri-check-line"></i> Saved!';
      setTimeout(() => {
        location.href = 'game-lobby.html';
      }, 1500);
      
    } catch (err) {
      console.error('Submit error:', err);
      btn.disabled = false;
      btn.innerHTML = '<i class="ri-restart-line"></i> Retry Save';
      alert('Failed to save score: ' + err.message);
    }
  };
</script>
